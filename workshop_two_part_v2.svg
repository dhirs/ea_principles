<?xml version="1.0" standalone="no"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 600" font-family="Arial, Helvetica, sans-serif" role="img" aria-labelledby="ttl dsc" width="980" height="600">
  <title id="ttl">Two-part AI architecture principles workshop</title>
  <desc id="dsc">Part 1 walks three scenarios then a GenAI Lens deep-dive. Part 2 demos a single sprint: starting from an assumed prioritised backlog of standards, one in-scope standard is turned into a shipped, enforceable reference implementation with governance.</desc>

  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7.5" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#888780"/></marker>
    <marker id="ahp" markerWidth="9" markerHeight="9" refX="7.5" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#7F77DD"/></marker>
  </defs>

  <!-- ============ HEADER (unchanged) ============ -->
  <text x="490" y="34" text-anchor="middle" font-size="25" font-weight="700" fill="#2C2C2A">AI Architecture Principles — A Two-Part Workshop</text>
  <text x="490" y="58" text-anchor="middle" font-size="14" fill="#5F5E5A">From the AWS GenAI Lens to a shipped reference implementation</text>

  <!-- ============ PART 1 (unchanged) ============ -->
  <rect x="40" y="80" width="94" height="26" rx="13" fill="#534AB7"/>
  <text x="87" y="98" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">PART 1</text>
  <text x="146" y="99" font-size="15" font-weight="700" fill="#2C2C2A">Why principles matter — three scenarios</text>

  <g>
    <rect x="40" y="116" width="150" height="74" rx="12" fill="#ffffff" stroke="#E24B4A" stroke-width="1.6"/>
    <circle cx="64" cy="142" r="11" fill="#E24B4A"/><text x="64" y="146" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">1</text>
    <text x="83" y="140" font-size="13.5" font-weight="700" fill="#2C2C2A">Scenario 1</text>
    <text x="83" y="158" font-size="11" fill="#A32D2D">Legal · PII leakage</text>
  </g>
  <g>
    <rect x="206" y="116" width="150" height="74" rx="12" fill="#ffffff" stroke="#378ADD" stroke-width="1.6"/>
    <circle cx="230" cy="142" r="11" fill="#378ADD"/><text x="230" y="146" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">2</text>
    <text x="249" y="140" font-size="13.5" font-weight="700" fill="#2C2C2A">Scenario 2</text>
    <text x="249" y="158" font-size="11" fill="#185FA5">CX · model drift</text>
  </g>
  <g>
    <rect x="372" y="116" width="150" height="74" rx="12" fill="#ffffff" stroke="#EF9F27" stroke-width="1.6"/>
    <circle cx="396" cy="142" r="11" fill="#EF9F27"/><text x="396" y="146" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">3</text>
    <text x="415" y="140" font-size="13.5" font-weight="700" fill="#2C2C2A">Scenario 3</text>
    <text x="415" y="158" font-size="11" fill="#854F0B">Cost · token burn</text>
  </g>

  <line x1="528" y1="153" x2="582" y2="153" stroke="#888780" stroke-width="2" marker-end="url(#ah)"/>

  <rect x="590" y="116" width="338" height="74" rx="12" fill="#EEEDFE" stroke="#7F77DD" stroke-width="2"/>
  <text x="759" y="146" text-anchor="middle" font-size="17" font-weight="700" fill="#3C3489">AWS GenAI Lens — deep-dive</text>
  <text x="759" y="166" text-anchor="middle" font-size="11.5" fill="#534AB7">how the Lens is structured &amp; read</text>

  <text x="490" y="216" text-anchor="middle" font-size="12.5" font-style="italic" fill="#5F5E5A">&#9660;&#9660;&#9660;   the GenAI Lens carries into Part 2 as the source of standards   &#9660;&#9660;&#9660;</text>
  <line x1="40" y1="232" x2="940" y2="232" stroke="#D3D1C7" stroke-width="1"/>

  <!-- ============ PART 2 (redrawn) ============ -->
  <rect x="40" y="246" width="94" height="26" rx="13" fill="#534AB7"/>
  <text x="87" y="264" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">PART 2</text>
  <text x="146" y="265" font-size="15" font-weight="700" fill="#2C2C2A">One standard &#8594; one sprint &#8594; a shipped reference implementation</text>

  <!-- Zone A: assumed / given -->
  <rect x="40" y="282" width="900" height="92" rx="12" fill="#F1F0EB" stroke="#C9C7BD" stroke-width="1.4" stroke-dasharray="5 4"/>
  <text x="56" y="303" font-size="11" font-weight="700" fill="#8A887E" letter-spacing="0.4">ASSUMED FOR THIS WORKSHOP — the catalogue work, not demoed</text>

  <rect x="60" y="312" width="240" height="50" rx="9" fill="#ffffff" stroke="#B7B4A8" stroke-width="1.3"/>
  <text x="180" y="334" text-anchor="middle" font-size="12.5" font-weight="700" fill="#5F5E5A">AWS GenAI Lens</text>
  <text x="180" y="351" text-anchor="middle" font-size="10.5" fill="#8A887E">source of standards</text>

  <line x1="300" y1="337" x2="330" y2="337" stroke="#A8A69B" stroke-width="2" marker-end="url(#ah)"/>

  <rect x="338" y="312" width="190" height="50" rx="9" fill="#ffffff" stroke="#B7B4A8" stroke-width="1.3"/>
  <text x="433" y="334" text-anchor="middle" font-size="12.5" font-weight="700" fill="#5F5E5A">Standards catalogue</text>
  <text x="433" y="351" text-anchor="middle" font-size="10.5" fill="#8A887E">already defined</text>

  <line x1="528" y1="337" x2="558" y2="337" stroke="#A8A69B" stroke-width="2" marker-end="url(#ah)"/>

  <rect x="566" y="312" width="356" height="50" rx="9" fill="#ffffff" stroke="#B7B4A8" stroke-width="1.3"/>
  <text x="744" y="332" text-anchor="middle" font-size="12.5" font-weight="700" fill="#5F5E5A">Prioritised backlog — roadmap 6 · 12 · 18</text>
  <text x="744" y="351" text-anchor="middle" font-size="10.5" fill="#8A887E">we consume this order; we don't re-derive it</text>

  <!-- pull-down into the sprint -->
  <line x1="744" y1="374" x2="744" y2="414" stroke="#534AB7" stroke-width="2.4" marker-end="url(#ahp)"/>
  <text x="756" y="400" font-size="10.5" font-style="italic" fill="#534AB7">pull one in-scope standard</text>

  <!-- Zone B: THE SPRINT -->
  <rect x="40" y="418" width="900" height="150" rx="14" fill="#F6F5FF" stroke="#7F77DD" stroke-width="1.8"/>
  <text x="64" y="443" font-size="14" font-weight="700" fill="#3C3489">THE SPRINT</text>
  <text x="151" y="443" font-size="11.5" fill="#534AB7">one standard = one mini-project = one sprint</text>

  <!-- step 1 Frame -->
  <rect x="60" y="456" width="194" height="100" rx="10" fill="#ffffff" stroke="#7F77DD" stroke-width="1.5"/>
  <circle cx="84" cy="480" r="11" fill="#534AB7"/><text x="84" y="484" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">1</text>
  <text x="103" y="485" font-size="14" font-weight="700" fill="#2C2C2A">Frame</text>
  <text x="78" y="512" font-size="10.5" fill="#5F5E5A">scope the standard;</text>
  <text x="78" y="528" font-size="10.5" fill="#5F5E5A">set acceptance</text>
  <text x="78" y="544" font-size="10.5" fill="#5F5E5A">criteria</text>

  <line x1="254" y1="506" x2="284" y2="506" stroke="#7F77DD" stroke-width="2.2" marker-end="url(#ahp)"/>

  <!-- step 2 Build the RI -->
  <rect x="282" y="456" width="194" height="100" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.8"/>
  <circle cx="306" cy="480" r="11" fill="#534AB7"/><text x="306" y="484" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">2</text>
  <text x="325" y="485" font-size="14" font-weight="700" fill="#3C3489">Build the RI</text>
  <text x="300" y="512" font-size="10.5" fill="#3C3489">artefacts, repo</text>
  <text x="300" y="528" font-size="10.5" fill="#3C3489">paths, CI gates</text>
  <text x="300" y="544" font-size="9.5" font-style="italic" fill="#7F77DD">the core of the demo</text>

  <line x1="476" y1="506" x2="506" y2="506" stroke="#7F77DD" stroke-width="2.2" marker-end="url(#ahp)"/>

  <!-- step 3 Govern -->
  <rect x="504" y="456" width="194" height="100" rx="10" fill="#ffffff" stroke="#7F77DD" stroke-width="1.5"/>
  <circle cx="528" cy="480" r="11" fill="#534AB7"/><text x="528" y="484" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">3</text>
  <text x="547" y="485" font-size="14" font-weight="700" fill="#2C2C2A">Govern</text>
  <text x="522" y="512" font-size="10.5" fill="#5F5E5A">RACI, named owner,</text>
  <text x="522" y="528" font-size="10.5" fill="#5F5E5A">budget allocation</text>

  <line x1="698" y1="506" x2="728" y2="506" stroke="#7F77DD" stroke-width="2.2" marker-end="url(#ahp)"/>

  <!-- step 4 Ship -->
  <rect x="726" y="456" width="194" height="100" rx="10" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1.8"/>
  <circle cx="750" cy="480" r="11" fill="#1D9E75"/><text x="750" y="484" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">4</text>
  <text x="769" y="485" font-size="14" font-weight="700" fill="#0F6E56">Ship</text>
  <text x="744" y="512" font-size="10.5" fill="#0F6E56">enforceable RI in repo;</text>
  <text x="744" y="528" font-size="10.5" fill="#0F6E56">acceptance met</text>
  <text x="744" y="544" font-size="9.5" font-style="italic" fill="#1D9E75">audit-ready output</text>

  <!-- closing caption -->
  <text x="490" y="588" text-anchor="middle" font-size="11.5" font-style="italic" fill="#5F5E5A">Output: a shipped, enforceable reference implementation for one standard — built and governed live.</text>
</svg>
