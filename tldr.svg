<svg viewBox="0 0 768 576" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F2EEFB"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7D03E0"/>
      <stop offset="1" stop-color="#6D28D9"/>
    </linearGradient>
  </defs>

  <rect width="768" height="576" fill="url(#bg)"/>
  <circle cx="716" cy="64" r="150" fill="#7D03E0" opacity="0.06"/>
  <circle cx="60" cy="540" r="140" fill="#2E1065" opacity="0.04"/>

  <!-- header -->
  <rect x="64" y="56" width="34" height="4" rx="2" fill="url(#brand)"/>
  <text x="106" y="61" font-size="13" font-weight="700" letter-spacing="3" fill="#6D28D9">IN ONE SLIDE</text>
  <text x="64" y="116" font-size="44" font-weight="800" fill="#2E1065" letter-spacing="1">TL;DR</text>

  <!-- spine -->
  <line x1="104" y1="280" x2="104" y2="410" stroke="#E0CFF7" stroke-width="3"/>

  <!-- 1 -->
  <circle cx="104" cy="280" r="30" fill="url(#brand)"/>
  <text x="104" y="289" font-size="22" font-weight="800" fill="#FFFFFF" text-anchor="middle">1</text>
  <text x="158" y="270" font-size="19" font-weight="800" fill="#2E1065">Enterprises need centrally-owned AI standards</text>
  <text x="158" y="294" font-size="13.5" fill="#6B6480">Owned, managed and enforced from the centre — the only way to roll out</text>
  <text x="158" y="313" font-size="13.5" fill="#6B6480">AI projects securely, efficiently and effectively.</text>

  <!-- 2 -->
  <circle cx="104" cy="410" r="30" fill="url(#brand)"/>
  <text x="104" y="419" font-size="22" font-weight="800" fill="#FFFFFF" text-anchor="middle">2</text>
  <text x="158" y="400" font-size="19" font-weight="800" fill="#2E1065">The EA function needs a structured process</text>
  <text x="158" y="422" font-size="19" font-weight="800" fill="#2E1065">for developing global AI standards</text>
  <text x="158" y="446" font-size="13.5" fill="#6B6480">Standards don't write themselves — developing them takes a</text>
  <text x="158" y="465" font-size="13.5" fill="#6B6480">repeatable, structured method, not ad-hoc judgement.</text>
</svg>
