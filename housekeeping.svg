<svg viewBox="0 0 768 576" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif">
  <defs>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7D03E0"/><stop offset="1" stop-color="#6D28D9"/>
    </linearGradient>
  </defs>
  <rect width="768" height="576" fill="#FFFFFF"/>
  <circle cx="722" cy="44" r="115" fill="#7D03E0" opacity="0.05"/>
  <circle cx="48" cy="540" r="110" fill="#2E1065" opacity="0.04"/>

  <!-- header -->
  <rect x="40" y="34" width="30" height="4" rx="2" fill="url(#brand)"/>
  <text x="78" y="39" font-size="12" font-weight="700" letter-spacing="2.5" fill="#6D28D9">HOUSEKEEPING · TODAY'S FLOW</text>
  <text x="40" y="76" font-size="27" font-weight="800" fill="#2E1065">Before We Dive In</text>

  <!-- housekeeping mini cards -->
  <g>
    <!-- c1 -->
    <rect x="40" y="96" width="164" height="84" rx="11" fill="#F7F3FD" stroke="#E6DAF7" stroke-width="1.3"/>
    <g transform="translate(66,138)" stroke="#7D03E0" stroke-width="2.2" fill="none" stroke-linecap="round"><circle r="11"/><path d="M0 -6 V0 L5 4"/></g>
    <text x="90" y="132" font-size="13" font-weight="800" fill="#2E1065">45 minutes</text>
    <text x="90" y="150" font-size="10.5" fill="#6B6480">35 talk · 10 Q&amp;A</text>
    <!-- c2 -->
    <rect x="215" y="96" width="164" height="84" rx="11" fill="#F7F3FD" stroke="#E6DAF7" stroke-width="1.3"/>
    <g transform="translate(241,138)" stroke="#7D03E0" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"><rect x="-8" y="-10" width="16" height="20" rx="2"/><line x1="-4" y1="-4" x2="4" y2="-4"/><line x1="-4" y1="1" x2="4" y2="1"/></g>
    <text x="265" y="132" font-size="13" font-weight="800" fill="#2E1065">Intro session</text>
    <text x="265" y="150" font-size="10.5" fill="#6B6480">overview, not deep-dive</text>
    <!-- c3 -->
    <rect x="390" y="96" width="164" height="84" rx="11" fill="#F7F3FD" stroke="#E6DAF7" stroke-width="1.3"/>
    <g transform="translate(409,132)" fill="#7D03E0"><rect x="-2" y="6" width="5" height="12" rx="1.5"/><rect x="6" y="0" width="5" height="18" rx="1.5"/><rect x="14" y="-6" width="5" height="24" rx="1.5"/></g>
    <text x="440" y="132" font-size="13" font-weight="800" fill="#2E1065">Technical</text>
    <text x="440" y="150" font-size="10.5" fill="#6B6480">not hands-on</text>
    <!-- c4 -->
    <rect x="565" y="96" width="164" height="84" rx="11" fill="#F7F3FD" stroke="#E6DAF7" stroke-width="1.3"/>
    <g transform="translate(583,131)" stroke="#7D03E0" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M-9 -7 h20 v13 h-12 l-5 4 v-4 h-3 z"/></g>
    <text x="615" y="132" font-size="13" font-weight="800" fill="#2E1065">Questions</text>
    <text x="615" y="150" font-size="10.5" fill="#6B6480">at the end / in chat</text>
  </g>

  <!-- agenda -->
  <text x="40" y="224" font-size="12.5" font-weight="800" letter-spacing="2" fill="#6D28D9">TODAY · FOUR SECTIONS</text>

  <!-- chevrons -->
  <g fill="#C9A6F7" font-size="22" font-weight="800" text-anchor="middle">
    <text x="209" y="340">›</text><text x="384" y="340">›</text><text x="559" y="340">›</text>
  </g>

  <!-- section cards -->
  <g>
    <!-- s1 -->
    <rect x="40" y="246" width="164" height="200" rx="12" fill="#FFFFFF" stroke="#E6DAF7" stroke-width="1.5"/>
    <rect x="40" y="246" width="164" height="5" rx="2.5" fill="url(#brand)"/>
    <circle cx="122" cy="296" r="23" fill="url(#brand)"/><text x="122" y="303" font-size="20" font-weight="800" fill="#FFFFFF" text-anchor="middle">1</text>
    <text x="122" y="346" font-size="14.5" font-weight="800" fill="#2E1065" text-anchor="middle">Setting the</text>
    <text x="122" y="365" font-size="14.5" font-weight="800" fill="#2E1065" text-anchor="middle">context</text>
    <text x="122" y="398" font-size="11" fill="#6B6480" text-anchor="middle">the enterprise problem</text>
    <!-- s2 -->
    <rect x="215" y="246" width="164" height="200" rx="12" fill="#FFFFFF" stroke="#E6DAF7" stroke-width="1.5"/>
    <rect x="215" y="246" width="164" height="5" rx="2.5" fill="url(#brand)"/>
    <circle cx="297" cy="296" r="23" fill="url(#brand)"/><text x="297" y="303" font-size="20" font-weight="800" fill="#FFFFFF" text-anchor="middle">2</text>
    <text x="297" y="346" font-size="14.5" font-weight="800" fill="#2E1065" text-anchor="middle">Review a failure</text>
    <text x="297" y="365" font-size="14.5" font-weight="800" fill="#2E1065" text-anchor="middle">scenario</text>
    <text x="297" y="398" font-size="11" fill="#6B6480" text-anchor="middle">1 real production scenario</text>
    <!-- s3 -->
    <rect x="390" y="246" width="164" height="200" rx="12" fill="#FFFFFF" stroke="#E6DAF7" stroke-width="1.5"/>
    <rect x="390" y="246" width="164" height="5" rx="2.5" fill="url(#brand)"/>
    <circle cx="472" cy="296" r="23" fill="url(#brand)"/><text x="472" y="303" font-size="20" font-weight="800" fill="#FFFFFF" text-anchor="middle">3</text>
    <text x="472" y="346" font-size="14.5" font-weight="800" fill="#2E1065" text-anchor="middle">What is</text>
    <text x="472" y="365" font-size="14.5" font-weight="800" fill="#2E1065" text-anchor="middle">the fix</text>
    <text x="472" y="398" font-size="11" fill="#6B6480" text-anchor="middle">enforceable standards</text>
    <!-- s4 -->
    <rect x="565" y="246" width="164" height="200" rx="12" fill="#FFFFFF" stroke="#E6DAF7" stroke-width="1.5"/>
    <rect x="565" y="246" width="164" height="5" rx="2.5" fill="url(#brand)"/>
    <circle cx="647" cy="296" r="23" fill="url(#brand)"/><text x="647" y="303" font-size="20" font-weight="800" fill="#FFFFFF" text-anchor="middle">4</text>
    <text x="647" y="346" font-size="14.5" font-weight="800" fill="#2E1065" text-anchor="middle">Cohort agenda</text>
    <text x="647" y="365" font-size="14.5" font-weight="800" fill="#2E1065" text-anchor="middle">overview</text>
    <text x="647" y="398" font-size="11" fill="#6B6480" text-anchor="middle">what the workshop covers</text>
  </g>

  <!-- footer -->
  <rect x="86" y="470" width="596" height="64" rx="18" fill="url(#brand)"/>
  <text x="384" y="496" font-size="13.5" font-weight="700" fill="#FFFFFF" text-anchor="middle">Focus: HOW to develop AI Architecture Standards — not why.</text>
  <text x="384" y="519" font-size="10.8" font-weight="600" fill="#E8DDF8" text-anchor="middle">Developers welcome — best suited to Senior Architects, IT Ops Managers &amp; AI Delivery Leads.</text>
</svg>
