<svg viewBox="0 0 768 576" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F2EEFB"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7D03E0"/>
      <stop offset="1" stop-color="#6D28D9"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="7" flood-color="#2E1065" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="768" height="576" fill="url(#bg)"/>
  <circle cx="712" cy="56" r="150" fill="#7D03E0" opacity="0.06"/>
  <circle cx="58" cy="548" r="150" fill="#2E1065" opacity="0.05"/>

  <!-- header -->
  <rect x="56" y="38" width="34" height="4" rx="2" fill="url(#brand)"/>
  <text x="98" y="43" font-size="13" font-weight="700" letter-spacing="3" fill="#6D28D9">IDENTIFYING THE BASELINE</text>
  <text x="56" y="82" font-size="26" font-weight="800" fill="#2E1065">Where Do the Baseline Standards Come From?</text>
  <text x="56" y="108" font-size="14" fill="#6B6480">No single source covers all three dimensions — frameworks lean technical, regulation covers legal. You compose.</text>

  <!-- COST -->
  <g transform="translate(56,128)">
    <rect width="200" height="322" rx="14" fill="#FFFFFF" filter="url(#shadow)"/>
    <rect x="0" y="0" width="200" height="6" rx="3" fill="url(#brand)"/>
    <text x="16" y="38" font-size="16" font-weight="800" fill="#2E1065">COST</text>
    <text x="16" y="57" font-size="11.5" fill="#9189A6">spend vs. value</text>
    <line x1="16" y1="70" x2="184" y2="70" stroke="#EAE2F7" stroke-width="1.5"/>
    <rect x="25" y="120" width="150" height="66" rx="14" fill="#FAF6FE" stroke="#7D03E0" stroke-width="1.6" stroke-dasharray="5 4"/>
    <text x="100" y="152" font-size="15" font-weight="800" fill="#7D03E0" text-anchor="middle">BESPOKE</text>
    <text x="100" y="172" font-size="10.5" fill="#9189A6" text-anchor="middle">first-principles</text>
    <text x="100" y="222" font-size="11.8" fill="#6B6480" text-anchor="middle">No external framework</text>
    <text x="100" y="240" font-size="11.8" fill="#6B6480" text-anchor="middle">fits — you build the</text>
    <text x="100" y="258" font-size="11.8" fill="#6B6480" text-anchor="middle">cost model yourself.</text>
  </g>

  <!-- CUSTOMER EXPERIENCE -->
  <g transform="translate(284,128)">
    <rect width="200" height="322" rx="14" fill="#FFFFFF" filter="url(#shadow)"/>
    <rect x="0" y="0" width="200" height="6" rx="3" fill="url(#brand)"/>
    <text x="16" y="38" font-size="16" font-weight="800" fill="#2E1065">CUSTOMER EXP.</text>
    <text x="16" y="57" font-size="11.5" fill="#9189A6">trust in the product</text>
    <line x1="16" y1="70" x2="184" y2="70" stroke="#EAE2F7" stroke-width="1.5"/>
    <rect x="25" y="120" width="150" height="66" rx="14" fill="#FAF6FE" stroke="#7D03E0" stroke-width="1.6" stroke-dasharray="5 4"/>
    <text x="100" y="152" font-size="15" font-weight="800" fill="#7D03E0" text-anchor="middle">BESPOKE</text>
    <text x="100" y="172" font-size="10.5" fill="#9189A6" text-anchor="middle">first-principles</text>
    <text x="100" y="222" font-size="11.8" fill="#6B6480" text-anchor="middle">No external framework</text>
    <text x="100" y="240" font-size="11.8" fill="#6B6480" text-anchor="middle">fits — you define the</text>
    <text x="100" y="258" font-size="11.8" fill="#6B6480" text-anchor="middle">CX heuristics yourself.</text>
  </g>

  <!-- LEGAL & RISK -->
  <g transform="translate(512,128)">
    <rect width="200" height="322" rx="14" fill="#FFFFFF" filter="url(#shadow)"/>
    <rect x="0" y="0" width="200" height="6" rx="3" fill="url(#brand)"/>
    <text x="16" y="38" font-size="16" font-weight="800" fill="#2E1065">LEGAL &amp; RISK</text>
    <text x="16" y="57" font-size="11.5" fill="#9189A6">what you're liable for · many sources</text>
    <line x1="16" y1="70" x2="184" y2="70" stroke="#EAE2F7" stroke-width="1.5"/>
    <!-- highlighted -->
    <g transform="translate(14,84)"><rect width="172" height="28" rx="14" fill="url(#brand)"/><text x="86" y="19" font-size="11" font-weight="800" fill="#FFFFFF" text-anchor="middle">★ EU AI Act</text></g>
    <g transform="translate(14,120)"><rect width="172" height="28" rx="14" fill="#F2EEFB"/><text x="86" y="19" font-size="11" font-weight="700" fill="#5B2A9D" text-anchor="middle">GDPR</text></g>
    <g transform="translate(14,156)"><rect width="172" height="28" rx="14" fill="#F2EEFB"/><text x="86" y="19" font-size="11" font-weight="700" fill="#5B2A9D" text-anchor="middle">FCA</text></g>
    <g transform="translate(14,192)"><rect width="172" height="28" rx="14" fill="#F2EEFB"/><text x="86" y="19" font-size="11" font-weight="700" fill="#5B2A9D" text-anchor="middle">NIST AI RMF</text></g>
    <g transform="translate(14,228)"><rect width="172" height="28" rx="14" fill="url(#brand)"/><text x="86" y="19" font-size="11" font-weight="800" fill="#FFFFFF" text-anchor="middle">★ AWS GenAI Lens</text></g>
    <g transform="translate(14,264)"><rect width="172" height="28" rx="14" fill="#F2EEFB"/><text x="86" y="19" font-size="11" font-weight="700" fill="#5B2A9D" text-anchor="middle">Internal Risk / Compliance</text></g>
  </g>

  <!-- workshop callout -->
  <rect x="56" y="464" width="656" height="84" rx="16" fill="url(#brand)"/>
  <text x="80" y="492" font-size="12" font-weight="700" letter-spacing="2" fill="#E4D3FA">THIS WORKSHOP DEMONSTRATES ONE METHOD — IN THE LEGAL CATEGORY</text>
  <g transform="translate(80,504)"><rect width="300" height="32" rx="16" fill="#FFFFFF"/><text x="150" y="21" font-size="13" font-weight="800" fill="#5B2A9D" text-anchor="middle">★ EU AI Act → obligations</text></g>
  <g transform="translate(392,504)"><rect width="300" height="32" rx="16" fill="#FFFFFF"/><text x="150" y="21" font-size="13" font-weight="800" fill="#5B2A9D" text-anchor="middle">★ GenAI Lens → technical build</text></g>
</svg>
