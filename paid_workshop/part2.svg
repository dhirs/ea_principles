<svg viewBox="0 0 980 560" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif">
  <defs>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7D03E0"/><stop offset="1" stop-color="#6D28D9"/>
    </linearGradient>
  </defs>
  <rect width="980" height="560" fill="#FFFFFF"/>
  <circle cx="920" cy="50" r="120" fill="#7D03E0" opacity="0.05"/>

  <!-- header -->
  <rect x="40" y="34" width="30" height="4" rx="2" fill="url(#brand)"/>
  <text x="78" y="39" font-size="12" font-weight="700" letter-spacing="2.5" fill="#6D28D9">PART 2 · BUILDING THE CATALOGUE</text>
  <text x="40" y="74" font-size="26" font-weight="800" fill="#2E1065">How a Candidate Becomes a Standard</text>
  <text x="40" y="97" font-size="13" fill="#6B6480">Not everything is a standard — each candidate earns its place through four steps.</text>

  <!-- chevrons -->
  <g fill="#C9A6F7" font-size="22" font-weight="800" text-anchor="middle">
    <text x="268" y="300">›</text><text x="506" y="300">›</text><text x="744" y="300">›</text>
  </g>

  <!-- CARD 1 -->
  <g>
    <rect x="40" y="118" width="218" height="388" rx="12" fill="#FFFFFF" stroke="#E6DAF7" stroke-width="1.5"/>
    <rect x="40" y="118" width="218" height="5" rx="2.5" fill="url(#brand)"/>
    <circle cx="70" cy="156" r="15" fill="url(#brand)"/><text x="70" y="161" font-size="15" font-weight="800" fill="#FFFFFF" text-anchor="middle">1</text>
    <text x="94" y="161" font-size="13.5" font-weight="800" fill="#2E1065">CHOOSE ANCHOR</text>
    <g fill="#4A4458" font-size="11.5">
      <circle cx="58" cy="200" r="2.6" fill="#7D03E0"/><text x="68" y="204">Legal/Risk → regulation</text><text x="68" y="219">+ frameworks (EU AI Act,</text><text x="68" y="234">NIST, OWASP)</text>
      <circle cx="58" cy="262" r="2.6" fill="#7D03E0"/><text x="68" y="266">CX &amp; Cost → bespoke,</text><text x="68" y="281">first-principles</text>
      <circle cx="58" cy="313" r="2.6" fill="#7D03E0"/><text x="68" y="317">Add incidents + your</text><text x="68" y="332">own risk register</text>
    </g>
  </g>

  <!-- CARD 2 -->
  <g>
    <rect x="278" y="118" width="218" height="388" rx="12" fill="#FFFFFF" stroke="#E6DAF7" stroke-width="1.5"/>
    <rect x="278" y="118" width="218" height="5" rx="2.5" fill="url(#brand)"/>
    <circle cx="308" cy="156" r="15" fill="url(#brand)"/><text x="308" y="161" font-size="15" font-weight="800" fill="#FFFFFF" text-anchor="middle">2</text>
    <text x="332" y="161" font-size="13.5" font-weight="800" fill="#2E1065">KEEP OR DROP</text>
    <g fill="#4A4458" font-size="11.5">
      <circle cx="296" cy="196" r="2.6" fill="#7D03E0"/><text x="306" y="200" font-weight="700" fill="#2E1065">GenAI-distinctive?</text><text x="306" y="215">else generic IT — drop</text>
      <circle cx="296" cy="247" r="2.6" fill="#7D03E0"/><text x="306" y="251" font-weight="700" fill="#2E1065">Already covered?</text><text x="306" y="266">crosswalk to GenAI Lens;</text><text x="306" y="281">gap → new standard</text>
      <circle cx="296" cy="313" r="2.6" fill="#7D03E0"/><text x="306" y="317" font-weight="700" fill="#2E1065">Enforceable?</text><text x="306" y="332">gateable, else guidance</text>
      <circle cx="296" cy="364" r="2.6" fill="#7D03E0"/><text x="306" y="368" font-weight="700" fill="#2E1065">Material?</text><text x="306" y="383">real harm, else drop</text>
    </g>
  </g>

  <!-- CARD 3 -->
  <g>
    <rect x="516" y="118" width="218" height="388" rx="12" fill="#FFFFFF" stroke="#E6DAF7" stroke-width="1.5"/>
    <rect x="516" y="118" width="218" height="5" rx="2.5" fill="url(#brand)"/>
    <circle cx="546" cy="156" r="15" fill="url(#brand)"/><text x="546" y="161" font-size="15" font-weight="800" fill="#FFFFFF" text-anchor="middle">3</text>
    <text x="570" y="161" font-size="13.5" font-weight="800" fill="#2E1065">SCORE SURVIVORS</text>
    <g fill="#4A4458" font-size="11.5">
      <circle cx="534" cy="204" r="2.6" fill="#7D03E0"/><text x="544" y="208">Criticality (blast radius)</text>
      <circle cx="534" cy="244" r="2.6" fill="#7D03E0"/><text x="544" y="248">Implementation difficulty</text>
      <circle cx="534" cy="284" r="2.6" fill="#7D03E0"/><text x="544" y="288">Reusability (× projects)</text>
      <circle cx="534" cy="324" r="2.6" fill="#7D03E0"/><text x="544" y="328">Enforcement cost</text><text x="544" y="343">(CI vs LLM-judge)</text>
    </g>
  </g>

  <!-- CARD 4 -->
  <g>
    <rect x="754" y="118" width="218" height="388" rx="12" fill="#FFFFFF" stroke="#E6DAF7" stroke-width="1.5"/>
    <rect x="754" y="118" width="218" height="5" rx="2.5" fill="url(#brand)"/>
    <circle cx="784" cy="156" r="15" fill="url(#brand)"/><text x="784" y="161" font-size="15" font-weight="800" fill="#FFFFFF" text-anchor="middle">4</text>
    <text x="808" y="161" font-size="13.5" font-weight="800" fill="#2E1065">WRITE STANDARD</text>
    <g fill="#4A4458" font-size="11.5">
      <circle cx="772" cy="204" r="2.6" fill="#7D03E0"/><text x="782" y="208">Statement</text>
      <circle cx="772" cy="244" r="2.6" fill="#7D03E0"/><text x="782" y="248">Enforcement gate</text>
      <circle cx="772" cy="284" r="2.6" fill="#7D03E0"/><text x="782" y="288">Required evidence</text>
      <circle cx="772" cy="324" r="2.6" fill="#7D03E0"/><text x="782" y="328">applies_to tag</text>
    </g>
  </g>

  <!-- footer -->
  <rect x="40" y="524" width="900" height="30" rx="15" fill="#F2EEFB"/>
  <text x="490" y="544" font-size="12.5" font-weight="700" fill="#5B2A9D" text-anchor="middle">A candidate becomes a standard only if it's GenAI-distinctive, uncovered, enforceable and material — then we score and sequence.</text>
</svg>
