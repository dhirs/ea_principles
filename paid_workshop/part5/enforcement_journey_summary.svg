<?xml version="1.0" standalone="no"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" font-family="var(--font-sans), 'Anthropic Sans', sans-serif" role="img" aria-labelledby="ttl dsc" width="1280" height="720">
  <title id="ttl">The Enforcement Journey — Attest → Verify → Provide</title>
  <desc id="dsc">The three rungs of enforcement, at a glance. Level 1 Attest: the project self-certifies with a guardrail YAML, every threat dispositioned and signed at the ARB; the gate is a completeness check, not efficacy; effort low, enforceable today; proves it was claimed, not that it works; most enterprises stop here. Level 2 Verify: EA fires an adversarial corpus at the running endpoint and scores it, only probe-testable controls qualify; the gate is zero successful overrides plus a false-positive rate under threshold; effort high, needs a central platform; proof replaces claim. Level 3 Provide: a central SDK and gateway do the filtering, scanning, tool-auth and logging, with enforced egress routing; the gate is egress/IAM blocking every direct model call plus routing proof, provenance and signed attestation; effort highest, needs platform and egress control; the control is non-bypassable. Each rung is stronger, costlier, and harder to commit to. The catalogue isn't the hard part — this climb is. Enable before you enforce; you earn each rung.</desc>

  <!-- ============ HEADER ============ -->
  <text x="640" y="46" text-anchor="middle" font-size="26" font-weight="700" fill="var(--color-text-primary, #141413)">The Enforcement Journey — Attest &#8594; Verify &#8594; Provide</text>
  <text x="640" y="72" text-anchor="middle" font-size="13.5" fill="var(--color-text-secondary, #3d3d3a)">Each rung is stronger, costlier, and harder to commit to. The control only gets real as you climb — you earn each rung, one at a time.</text>

  <!-- ascending label -->
  <text x="1240" y="100" text-anchor="end" font-size="11" font-weight="700" letter-spacing="0.5" fill="#8a8a85">STRONGER · COSTLIER · HARDER TO COMMIT &#8599;</text>

  <!-- ============================================================ -->
  <!-- RUNG 1 — ATTEST (gold) -->
  <!-- ============================================================ -->
  <rect x="40" y="112" width="386" height="404" rx="14" fill="var(--color-background-primary, #ffffff)" stroke="#EF9F27" stroke-width="1.8"/>
  <rect x="40" y="112" width="386" height="6" rx="3" fill="#EF9F27"/>
  <text x="58" y="146" font-size="18" font-weight="800" fill="#854F0B">LEVEL 1 · <tspan letter-spacing="1">ATTEST</tspan></text>
  <text x="58" y="172" font-size="9.5" font-weight="700" letter-spacing="0.8" fill="#8a8a85">ENFORCEMENT STRENGTH</text>
  <rect x="58" y="179" width="108" height="12" rx="3" fill="#EF9F27"/>
  <rect x="179" y="179" width="108" height="12" rx="3" fill="#F1E2C4"/>
  <rect x="300" y="179" width="108" height="12" rx="3" fill="#F1E2C4"/>
  <rect x="58" y="202" width="130" height="20" rx="6" fill="#FDF1DD"/>
  <text x="68" y="216" font-size="10.5" font-weight="700" fill="#854F0B">EFFORT: LOW</text>
  <line x1="58" y1="236" x2="408" y2="236" stroke="#E1E6F2" stroke-width="1"/>

  <text x="58" y="258" font-size="10.5" font-weight="700" letter-spacing="0.6" fill="#64748B">WHAT IT IS</text>
  <text x="58" y="278" font-size="12" fill="var(--color-text-primary, #141413)">The project self-certifies — a guardrail</text>
  <text x="58" y="295" font-size="12" fill="var(--color-text-primary, #141413)">YAML, every threat dispositioned</text>
  <text x="58" y="312" font-size="12" fill="var(--color-text-primary, #141413)">(mitigated / accepted / N-A), signed at ARB.</text>

  <rect x="50" y="328" width="366" height="76" rx="10" fill="#FDF1DD" stroke="#EF9F27" stroke-width="1.3"/>
  <text x="62" y="349" font-size="10.5" font-weight="700" fill="#854F0B">&#9733; GATE</text>
  <text x="62" y="368" font-size="11.5" fill="var(--color-text-primary, #141413)">Completeness check: every threat</text>
  <text x="62" y="384" font-size="11.5" fill="var(--color-text-primary, #141413)">dispositioned + signed.</text>
  <text x="62" y="400" font-size="11" font-weight="700" fill="#A32D2D">Not efficacy.</text>

  <rect x="50" y="416" width="366" height="88" rx="10" fill="#FBFAF7"/>
  <text x="62" y="438" font-size="11.5" font-style="italic" fill="var(--color-text-secondary, #3d3d3a)">Proves it was claimed —</text>
  <text x="62" y="455" font-size="11.5" font-style="italic" fill="var(--color-text-secondary, #3d3d3a)">not that it works.</text>
  <line x1="62" y1="468" x2="404" y2="468" stroke="#EAD9D9" stroke-width="1"/>
  <text x="62" y="489" font-size="11.5" font-weight="700" fill="#A32D2D">&#9888; Most enterprises stop here.</text>

  <!-- ============================================================ -->
  <!-- RUNG 2 — VERIFY (purple) -->
  <!-- ============================================================ -->
  <rect x="447" y="112" width="386" height="404" rx="14" fill="var(--color-background-primary, #ffffff)" stroke="#7F77DD" stroke-width="1.8"/>
  <rect x="447" y="112" width="386" height="6" rx="3" fill="#7F77DD"/>
  <text x="465" y="146" font-size="18" font-weight="800" fill="#544BB5">LEVEL 2 · <tspan letter-spacing="1">VERIFY</tspan></text>
  <text x="465" y="172" font-size="9.5" font-weight="700" letter-spacing="0.8" fill="#8a8a85">ENFORCEMENT STRENGTH</text>
  <rect x="465" y="179" width="108" height="12" rx="3" fill="#7F77DD"/>
  <rect x="586" y="179" width="108" height="12" rx="3" fill="#7F77DD"/>
  <rect x="707" y="179" width="108" height="12" rx="3" fill="#E3E0F6"/>
  <rect x="465" y="202" width="130" height="20" rx="6" fill="#EEEDFE"/>
  <text x="475" y="216" font-size="10.5" font-weight="700" fill="#544BB5">EFFORT: HIGH</text>
  <line x1="465" y1="236" x2="815" y2="236" stroke="#E1E6F2" stroke-width="1"/>

  <text x="465" y="258" font-size="10.5" font-weight="700" letter-spacing="0.6" fill="#64748B">WHAT IT IS</text>
  <text x="465" y="278" font-size="12" fill="var(--color-text-primary, #141413)">EA fires an adversarial corpus at the</text>
  <text x="465" y="295" font-size="12" fill="var(--color-text-primary, #141413)">running endpoint and scores it. Only</text>
  <text x="465" y="312" font-size="12" fill="var(--color-text-primary, #141413)">probe-testable controls qualify.</text>

  <rect x="457" y="328" width="366" height="76" rx="10" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1.3"/>
  <text x="469" y="349" font-size="10.5" font-weight="700" fill="#544BB5">&#9733; GATE</text>
  <text x="469" y="368" font-size="11.5" fill="var(--color-text-primary, #141413)">0 successful overrides on the central</text>
  <text x="469" y="384" font-size="11.5" fill="var(--color-text-primary, #141413)">corpus + false-positive rate</text>
  <text x="469" y="400" font-size="11.5" fill="var(--color-text-primary, #141413)">under threshold.</text>

  <rect x="457" y="416" width="366" height="88" rx="10" fill="#FBFAFE"/>
  <text x="469" y="438" font-size="11.5" font-style="italic" fill="var(--color-text-secondary, #3d3d3a)">Claim replaced by proof —</text>
  <text x="469" y="455" font-size="11.5" font-style="italic" fill="var(--color-text-secondary, #3d3d3a)">it actually works.</text>
  <line x1="469" y1="468" x2="811" y2="468" stroke="#E3E0F6" stroke-width="1"/>
  <text x="469" y="489" font-size="11.5" font-weight="700" fill="#544BB5">Needs a central platform.</text>

  <!-- ============================================================ -->
  <!-- RUNG 3 — PROVIDE (green) -->
  <!-- ============================================================ -->
  <rect x="854" y="112" width="386" height="404" rx="14" fill="var(--color-background-primary, #ffffff)" stroke="#1D9E75" stroke-width="1.8"/>
  <rect x="854" y="112" width="386" height="6" rx="3" fill="#1D9E75"/>
  <text x="872" y="146" font-size="18" font-weight="800" fill="#0F6E56">LEVEL 3 · <tspan letter-spacing="1">PROVIDE</tspan></text>
  <text x="872" y="172" font-size="9.5" font-weight="700" letter-spacing="0.8" fill="#8a8a85">ENFORCEMENT STRENGTH</text>
  <rect x="872" y="179" width="108" height="12" rx="3" fill="#1D9E75"/>
  <rect x="993" y="179" width="108" height="12" rx="3" fill="#1D9E75"/>
  <rect x="1114" y="179" width="108" height="12" rx="3" fill="#1D9E75"/>
  <rect x="872" y="202" width="150" height="20" rx="6" fill="#E5F5EE"/>
  <text x="882" y="216" font-size="10.5" font-weight="700" fill="#0F6E56">EFFORT: HIGHEST</text>
  <line x1="872" y1="236" x2="1222" y2="236" stroke="#E1E6F2" stroke-width="1"/>

  <text x="872" y="258" font-size="10.5" font-weight="700" letter-spacing="0.6" fill="#64748B">WHAT IT IS</text>
  <text x="872" y="278" font-size="12" fill="var(--color-text-primary, #141413)">A central SDK / gateway does the filtering,</text>
  <text x="872" y="295" font-size="12" fill="var(--color-text-primary, #141413)">scanning, tool-auth, logging. SDK alone</text>
  <text x="872" y="312" font-size="12" fill="var(--color-text-primary, #141413)">isn't L3 — only SDK + enforced routing.</text>

  <rect x="864" y="328" width="366" height="76" rx="10" fill="#E5F5EE" stroke="#1D9E75" stroke-width="1.3"/>
  <text x="876" y="349" font-size="10.5" font-weight="700" fill="#0F6E56">&#9733; GATE</text>
  <text x="876" y="368" font-size="11.5" fill="var(--color-text-primary, #141413)">Egress / IAM blocks every direct model</text>
  <text x="876" y="384" font-size="11.5" fill="var(--color-text-primary, #141413)">call — routing proof + provenance</text>
  <text x="876" y="400" font-size="11.5" fill="var(--color-text-primary, #141413)">+ signed attestation.</text>

  <rect x="864" y="416" width="366" height="88" rx="10" fill="#FAFDFB"/>
  <text x="876" y="438" font-size="11.5" font-style="italic" fill="var(--color-text-secondary, #3d3d3a)">Non-bypassable —</text>
  <text x="876" y="455" font-size="11.5" font-style="italic" fill="var(--color-text-secondary, #3d3d3a)">compliance = &#8220;routed?&#8221;</text>
  <line x1="876" y1="468" x2="1218" y2="468" stroke="#D6EBE1" stroke-width="1"/>
  <text x="876" y="489" font-size="11.5" font-weight="700" fill="#0F6E56">Needs platform + egress control.</text>

  <!-- ============================================================ -->
  <!-- FOOTER BANNER -->
  <!-- ============================================================ -->
  <rect x="40" y="536" width="1200" height="160" rx="12" fill="var(--color-background-secondary, #f7f6f3)" stroke="#7F77DD" stroke-width="1.4"/>
  <rect x="40" y="536" width="7" height="160" rx="3.5" fill="#7F77DD"/>
  <text x="640" y="572" text-anchor="middle" font-size="18" font-weight="700" fill="var(--color-text-primary, #141413)">The catalogue isn't the hard part. This climb is.</text>
  <line x1="360" y1="590" x2="920" y2="590" stroke="#D8D3EC" stroke-width="1"/>

  <g font-size="11.5" font-weight="700" text-anchor="middle">
    <rect x="150" y="604" width="230" height="28" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1.1"/><text x="265" y="622" fill="#3C3489">Architecture defines the bar</text>
    <rect x="398" y="604" width="230" height="28" rx="8" fill="#E5F5EE" stroke="#1D9E75" stroke-width="1.1"/><text x="513" y="622" fill="#0F6E56">Engineering builds the machine</text>
    <rect x="646" y="604" width="200" height="28" rx="8" fill="#E4F0FB" stroke="#378ADD" stroke-width="1.1"/><text x="746" y="622" fill="#185FA5">Product runs it</text>
    <rect x="864" y="604" width="230" height="28" rx="8" fill="#FBE7E7" stroke="#E24B4A" stroke-width="1.1"/><text x="979" y="622" fill="#A32D2D">Governance owns the verdict</text>
  </g>

  <text x="640" y="660" text-anchor="middle" font-size="13" font-weight="700" fill="var(--color-text-primary, #141413)">Enable before you enforce — enterprise AI fails when no one commits past Level 1.</text>
  <text x="640" y="682" text-anchor="middle" font-size="11.5" font-style="italic" fill="#8a8a85">Each rung is a fresh commitment: the utility built, and the estate supported onto it, before the gate turns mandatory.</text>
</svg>
