  <text x="1030" y="434" font-size="10.5" fill="var(--color-text-primary, #141413)">Staging endpoint + creds,</text>
  <text x="1030" y="449" font-size="10.5" fill="var(--color-text-primary, #141413)">the invariants / oracle, a</text>
