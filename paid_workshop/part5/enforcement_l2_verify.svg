  <text x="787" y="434" font-size="10.5" fill="var(--color-text-primary, #141413)">Runs it as a service:</text>
  <text x="787" y="449" font-size="10.5" fill="var(--color-text-primary, #141413)">schedules runs, SLA, cost</text>
  <text x="787" y="464" font-size="10.5" fill="var(--color-text-primary, #141413)">pool, reporting; tracks</text>
  <text x="787" y="479" font-size="10.5" fill="var(--color-text-primary, #141413)">verification coverage.</text>

