  <text x="70" y="614" font-size="11.5" fill="var(--color-text-primary, #141413)">Proof the control actually holds under attack · failures caught before release · an</text>
  <text x="70" y="631" font-size="11.5" fill="var(--color-text-primary, #141413)">independent, evidence-backed verdict the ARB can trust — not a self-signed claim.</text>

  <text x="70" y="658" font-size="11" font-weight="700" letter-spacing="0.6" fill="#A32D2D">CEILING &#10007;</text>
  <text x="70" y="676" font-size="11.5" fill="var(--color-text-primary, #141413)">Point-in-time, not runtime — nothing stops a bypass between runs. Only probe-testable controls qualify.</text>

  <line x1="815" y1="560" x2="815" y2="678" stroke="#D8D3EC" stroke-width="1"/>
  <rect x="840" y="576" width="380" height="104" rx="10" fill="#FDF1DD" stroke="#EF9F27" stroke-width="1.2"/>
  <text x="1030" y="602" text-anchor="middle" font-size="12" font-weight="700" fill="#854F0B">&#9881; The costly leap.</text>
  <text x="1030" y="624" text-anchor="middle" font-size="11" fill="var(--color-text-primary, #141413)">Verify needs a built platform + a living</text>
  <text x="1030" y="640" text-anchor="middle" font-size="11" fill="var(--color-text-primary, #141413)">corpus — the investment most orgs stall before.</text>
  <text x="1030" y="664" text-anchor="middle" font-size="11.5" font-weight="700" fill="#0F6E56">The runtime guarantee is next: Provide &#8594;</text>
