  <!-- ============================================================ -->
  <rect x="40" y="540" width="1200" height="158" rx="12" fill="var(--color-background-secondary, #f7f6f3)" stroke="#7F77DD" stroke-width="1.4"/>
  <rect x="40" y="540" width="7" height="158" rx="3.5" fill="#7F77DD"/>
  <text x="70" y="570" font-size="16" font-weight="700" fill="var(--color-text-primary, #141413)">What Verify buys you — and what it costs</text>

