<?xml version="1.0" standalone="no"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" font-family="var(--font-sans), 'Anthropic Sans', sans-serif" role="img" aria-labelledby="ttl dsc" width="1280" height="720">
  <title id="ttl">Level 2 · Verify — Trust, but Verify</title>
  <desc id="dsc">The second rung of the enforcement journey. EA attacks the running system rather than the paperwork. What it is: EA fires an adversarial corpus at the deployed endpoint and scores the responses; the project can't fake it, and only probe-testable controls qualify. The gate: zero successful overrides on the central corpus and a false-positive rate under threshold — efficacy, not paperwork. Who does what at Level 2: Architecture defines pass — the threshold, what counts as an override, and which controls are probe-testable; Governance owns the verdict and gate, consumes the report, certifies, and blocks release, independently; Engineering builds the harness, corpus library and generator, and the scoring/oracle engine, and keeps the corpus current; Product runs it as a service — scheduling, SLA, cost pool, reporting, coverage; the Project supplies a staging endpoint and credentials, the invariants/oracle, and a fifteen-line adapter, and fixes what fails. What Verify buys: proof the control actually holds under attack, failures caught before release, and an independent evidence-backed verdict. Its cost and ceiling: it is point-in-time not runtime, only probe-testable controls qualify, and it needs a built central platform and a maintained corpus — the costly leap most organisations stall before. The runtime guarantee comes at Level 3, Provide.</desc>

  <!-- ============ HEADER ============ -->
  <text x="640" y="46" text-anchor="middle" font-size="26" font-weight="700" fill="var(--color-text-primary, #141413)">Level 2 · Verify — Trust, but Verify</text>
  <text x="640" y="72" text-anchor="middle" font-size="13.5" fill="var(--color-text-secondary, #3d3d3a)">Rung 2 of 3 · EA attacks the running system, not the paperwork — the claim is replaced by proof. Costs a central platform.</text>

