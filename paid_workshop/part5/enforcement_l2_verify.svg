  <text x="544" y="464" font-size="10.5" fill="var(--color-text-primary, #141413)">scoring / oracle engine;</text>
  <text x="544" y="479" font-size="10.5" fill="var(--color-text-primary, #141413)">keeps the corpus current.</text>

