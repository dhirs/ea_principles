  <!-- ============================================================ -->
  <rect x="40" y="90" width="270" height="240" rx="14" fill="var(--color-background-primary, #ffffff)" stroke="#1D9E75" stroke-width="1.8"/>
  <rect x="40" y="90" width="270" height="6" rx="3" fill="#1D9E75"/>
  <text x="58" y="132" font-size="30" font-weight="800" fill="#0F6E56">LEVEL 3</text>
  <text x="58" y="156" font-size="18" font-weight="700" letter-spacing="1" fill="#15845F">PROVIDE</text>
  <text x="58" y="176" font-size="10" font-weight="700" letter-spacing="1.5" fill="#5FA98C">RUNG 3 OF 3</text>

  <text x="58" y="200" font-size="9.5" font-weight="700" letter-spacing="0.8" fill="#8a8a85">ENFORCEMENT STRENGTH</text>
  <rect x="58" y="207" width="64" height="12" rx="3" fill="#1D9E75"/>
  <rect x="132" y="207" width="64" height="12" rx="3" fill="#1D9E75"/>
  <rect x="206" y="207" width="64" height="12" rx="3" fill="#1D9E75"/>

  <line x1="58" y1="238" x2="292" y2="238" stroke="#E1E6F2" stroke-width="1"/>
  <text x="58" y="262" font-size="13.5" font-weight="700" fill="var(--color-text-primary, #141413)">Non-bypassable infra</text>
  <text x="58" y="280" font-size="11" fill="var(--color-text-secondary, #3d3d3a)">The control becomes</text>
  <text x="58" y="294" font-size="11" fill="var(--color-text-secondary, #3d3d3a)">infrastructure, not a check.</text>
  <rect x="50" y="304" width="250" height="22" rx="6" fill="#E5F5EE"/>
  <text x="62" y="319" font-size="10" font-weight="700" fill="#0F6E56">EFFORT: HIGHEST · platform + egress control</text>

  <!-- ============================================================ -->
  <!-- WHAT IT IS -->
  <!-- ============================================================ -->
  <rect x="326" y="90" width="430" height="112" rx="12" fill="var(--color-background-primary, #ffffff)" stroke="#E1E6F2" stroke-width="1.4"/>
  <text x="344" y="114" font-size="11" font-weight="700" letter-spacing="0.6" fill="#64748B">WHAT IT IS</text>
  <text x="344" y="138" font-size="12" fill="var(--color-text-primary, #141413)">A central SDK / gateway does the filtering,</text>
  <text x="344" y="156" font-size="12" fill="var(--color-text-primary, #141413)">scanning, tool-auth, and logging. SDK alone</text>
  <text x="344" y="174" font-size="12" fill="var(--color-text-primary, #141413)">isn't L3 — only SDK + enforced egress routing.</text>
  <text x="344" y="192" font-size="10.5" font-style="italic" fill="#8a8a85">The control becomes infrastructure — impossible to skip.</text>

  <!-- ============================================================ -->
  <!-- THE GATE (green, load-bearing) -->
  <!-- ============================================================ -->
  <rect x="326" y="214" width="430" height="116" rx="12" fill="#E5F5EE" stroke="#1D9E75" stroke-width="1.6"/>
  <text x="344" y="238" font-size="12" font-weight="700" letter-spacing="0.5" fill="#0F6E56">&#9733; THE GATE</text>
  <text x="344" y="260" font-size="11.5" fill="var(--color-text-primary, #141413)">Egress / IAM policy blocks every direct call to the</text>
  <text x="344" y="277" font-size="11.5" fill="var(--color-text-primary, #141413)">model — routing proof + provenance + attestation.</text>
  <text x="344" y="300" font-size="11.5" font-weight="700" fill="#0F6E56">Compliance = &#8220;routed?&#8221; — a runtime guarantee.</text>
  <text x="344" y="320" font-size="11" font-style="italic" fill="#15845F">Continuous, not point-in-time. A bypass is impossible.</text>

  <!-- ============================================================ -->
  <!-- ROUTING-PROOF EXAMPLE -->
  <!-- ============================================================ -->
  <rect x="772" y="90" width="468" height="240" rx="12" fill="#FAFDFB" stroke="#E1E6F2" stroke-width="1.4"/>
  <rect x="772" y="90" width="468" height="28" rx="12" fill="#E5F5EE"/>
  <rect x="772" y="106" width="468" height="12" fill="#E5F5EE"/>
  <circle cx="788" cy="104" r="3.5" fill="#1D9E75"/>
  <text x="802" y="108" font-size="11" font-weight="700" font-family="var(--font-mono), ui-monospace, monospace" fill="#0F6E56">routing-proof · egress policy</text>
  <text x="1224" y="108" text-anchor="end" font-size="10" font-style="italic" fill="#8a8a85">continuous</text>
  <g font-family="var(--font-mono), ui-monospace, monospace" font-size="11.5">
    <text x="790" y="142" fill="#3A445C">gateway: <tspan fill="#185FA5">ai-gateway.internal</tspan></text>
    <text x="790" y="160" fill="#3A445C">egress:  <tspan fill="#A32D2D" font-weight="700">deny-all</tspan> model endpoints</text>
    <text x="790" y="178" fill="#3A445C">allow:   [ <tspan fill="#185FA5">ai-gateway.internal</tspan> ] <tspan fill="#8a8a85"># only exit</tspan></text>
    <line x1="790" y1="190" x2="1222" y2="190" stroke="#D6EBE1" stroke-width="1"/>
    <text x="790" y="210" fill="#3A445C">direct_model_calls: <tspan fill="#0F6E56" font-weight="700">0</tspan> <tspan fill="#8a8a85"># blocked at IAM</tspan></text>
    <text x="790" y="228" fill="#3A445C">calls_via_gateway: <tspan fill="#0F6E56" font-weight="700">100%</tspan> <tspan fill="#8a8a85"># routed</tspan></text>
    <text x="790" y="246" fill="#3A445C">provenance: <tspan fill="#0F6E56" font-weight="700">signed</tspan> <tspan fill="#8a8a85"># sigstore</tspan></text>
    <line x1="790" y1="258" x2="1222" y2="258" stroke="#D6EBE1" stroke-width="1"/>
    <text x="790" y="280" fill="#3A445C">verdict: <tspan fill="#0F6E56" font-weight="700">PROVIDED</tspan> <tspan fill="#8a8a85">&#8594; non-bypassable</tspan></text>
  </g>
  <text x="790" y="312" font-size="10.5" font-style="italic" fill="#8a8a85">There is no un-routed path out. The policy, not the project, guarantees it.</text>

