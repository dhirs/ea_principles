  <rect x="40" y="372" width="228" height="5" rx="2.5" fill="#7F77DD"/>
  <text x="58" y="398" font-size="13" font-weight="700" fill="#544BB5">Architecture</text>
  <text x="58" y="413" font-size="9" font-weight="700" letter-spacing="0.8" fill="#8a8a85">DEFINE</text>
  <text x="58" y="434" font-size="10.5" fill="var(--color-text-primary, #141413)">Owns what the SDK /</text>
  <text x="58" y="449" font-size="10.5" fill="var(--color-text-primary, #141413)">gateway must enforce,</text>
  <text x="58" y="464" font-size="10.5" fill="var(--color-text-primary, #141413)">and the routing policy's</text>
  <text x="58" y="479" font-size="10.5" fill="var(--color-text-primary, #141413)">required behaviour.</text>

