  <text x="1030" y="434" font-size="10.5" fill="var(--color-text-primary, #141413)">Routes all model calls</text>
  <text x="1030" y="449" font-size="10.5" fill="var(--color-text-primary, #141413)">through the sanctioned</text>
  <text x="1030" y="464" font-size="10.5" fill="var(--color-text-primary, #141413)">client; keeps domain</text>
