  <text x="301" y="464" font-size="10.5" fill="var(--color-text-primary, #141413)">attestation. Certifies;</text>
  <text x="301" y="479" font-size="10.5" fill="var(--color-text-primary, #141413)">owns waivers for genuine</text>
