<?xml version="1.0" standalone="no"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" font-family="var(--font-sans), 'Anthropic Sans', sans-serif" role="img" aria-labelledby="ttl dsc" width="1280" height="720">
  <title id="ttl">Level 3 · Provide — Non-Bypassable Infrastructure</title>
  <desc id="dsc">The top rung of the enforcement journey. EA owns the control as non-bypassable infrastructure. What it is: a central SDK and gateway do the filtering, scanning, tool-auth and logging; an SDK alone is not Level 3 — only an SDK plus enforced egress routing. The gate: an egress/IAM policy blocks every direct call to the model, evidenced by routing proof, build provenance and signed attestation; compliance becomes the question are you routed, a continuous runtime guarantee. Who does what at Level 3: Architecture owns what the SDK and gateway must enforce and the routing policy's required behaviour; Governance's gate is routing proof plus provenance plus signed attestation, certifies, and owns waivers for genuine gaps; Engineering builds and maintains the SDK, gateway, egress/IAM enforcement, filtering and migration tooling; Product operates the gateway with SLA, adoption and brownfield migration and FinOps, enabling before enforcing; the Project routes all model calls through the sanctioned client, keeps domain-specific controls, and migrates legacy calls. What Provide buys: a non-bypassable control, a continuous runtime guarantee rather than a point-in-time check, and the compliant path as the default path. What it takes: the highest cost — platform plus egress control plus the brownfield migration of every legacy call — and you must enable before you enforce or teams route around it. This is the summit: the control enforced by infrastructure, not goodwill.</desc>

  <!-- ============ HEADER ============ -->
  <text x="640" y="46" text-anchor="middle" font-size="26" font-weight="700" fill="var(--color-text-primary, #141413)">Level 3 · Provide — Non-Bypassable Infrastructure</text>
  <text x="640" y="72" text-anchor="middle" font-size="13.5" fill="var(--color-text-secondary, #3d3d3a)">Rung 3 of 3 · EA owns the control as infrastructure — compliance = &#8220;routed?&#8221;. The summit, and the costliest to reach.</text>

