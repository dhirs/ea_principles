  <line x1="815" y1="560" x2="815" y2="678" stroke="#D6E4DC" stroke-width="1"/>
  <rect x="840" y="576" width="380" height="104" rx="10" fill="#E5F5EE" stroke="#1D9E75" stroke-width="1.2"/>
