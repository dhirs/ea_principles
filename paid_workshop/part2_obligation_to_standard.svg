<?xml version="1.0" standalone="no"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 560" font-family="Arial, Helvetica, sans-serif" role="img" aria-labelledby="ttl dsc" width="980" height="560">
  <title id="ttl">From EU AI Act obligation to catalogue standard — worked example GO1B1-01</title>
  <desc id="dsc">A left-to-right pipeline in two ownership bands. Governance/Risk owns the first two stages: the EU AI Act as the legal source of WHAT, then a three-gate funnel (drop org-level obligations, keep system-level, filter to GenAI-distinctive) producing the obligation set of 8 GenAI controls. The obligation set is handed off to Enterprise Architecture, which owns the next three stages: decompose each obligation into testable best practices sourced from OWASP, MITRE ATLAS and the NIST GenAI Profile; crosswalk each best practice to the AWS GenAI Lens (covered equals anchor, gap equals a new na standard); and write the standard with a statement, gate, evidence and applies_to tag. The worked example threaded beneath each stage is GO1B1-01, the eval-harness / golden-set standard: EU AI Act Article 15 accuracy obligation, decomposed via NIST MEASURE into ground-truth dataset best practices, crosswalked to GENOPS01-BP01 step 1 (covered, so anchored), landing as GO1B1-01. Caveat: GO1B1-01 was authored AWS-first, so the EU AI Act obligation is back-fitted as a cross-reference rather than spawning a new na standard.</desc>

  <defs>
    <marker id="arw" markerWidth="9" markerHeight="9" refX="6" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#534AB7"/>
    </marker>
  </defs>

  <!-- HEADER -->
  <text x="490" y="40" text-anchor="middle" font-size="24" font-weight="700" fill="#2C2C2A">From EU AI Act obligation to catalogue standard</text>
  <text x="490" y="64" text-anchor="middle" font-size="14" font-weight="700" fill="#7D2FDB">Worked example: GO1B1-01 — the eval-harness / golden-set standard</text>

  <!-- OWNERSHIP BANDS -->
  <rect x="38" y="84" width="358" height="392" rx="12" fill="#FBEAEA" stroke="#E6C9C9" stroke-width="1"/>
  <rect x="406" y="84" width="536" height="392" rx="12" fill="#F1E9FB" stroke="#D8C6F2" stroke-width="1"/>
  <text x="217" y="104" text-anchor="middle" font-size="12" font-weight="700" fill="#B23838" letter-spacing="0.5">GOVERNANCE / RISK OWNS — what must be met</text>
  <text x="674" y="104" text-anchor="middle" font-size="12" font-weight="700" fill="#7D2FDB" letter-spacing="0.5">ENTERPRISE ARCHITECTURE OWNS — how it's built &amp; proven</text>

  <!-- ===== STAGE BOXES (top row) ===== -->
  <!-- Stage 1: EU AI Act -->
  <rect x="52" y="118" width="158" height="96" rx="10" fill="#E24B4A"/>
  <circle cx="72" cy="138" r="11" fill="#fff"/><text x="72" y="142" text-anchor="middle" font-size="12" font-weight="700" fill="#E24B4A">1</text>
  <text x="131" y="142" text-anchor="middle" font-size="13.5" font-weight="700" fill="#fff">EU AI Act</text>
  <text x="131" y="166" text-anchor="middle" font-size="10" fill="#FBEAEA">the binding instrument</text>
  <text x="131" y="182" text-anchor="middle" font-size="10" font-style="italic" fill="#FBEAEA">the legal WHAT</text>
  <text x="131" y="202" text-anchor="middle" font-size="9" fill="#FBEAEA">(no gate, no evidence — just law)</text>

  <!-- Stage 2: Governance funnel -->
  <rect x="238" y="118" width="158" height="96" rx="10" fill="#534AB7"/>
  <circle cx="258" cy="138" r="11" fill="#fff"/><text x="258" y="142" text-anchor="middle" font-size="12" font-weight="700" fill="#534AB7">2</text>
  <text x="317" y="142" text-anchor="middle" font-size="13.5" font-weight="700" fill="#fff">3-gate funnel</text>
  <text x="317" y="162" text-anchor="middle" font-size="9" fill="#E7D8FB">drop org-level &#8594; keep</text>
  <text x="317" y="174" text-anchor="middle" font-size="9" fill="#E7D8FB">system-level &#8594; filter to</text>
  <text x="317" y="186" text-anchor="middle" font-size="9" fill="#E7D8FB">GenAI-distinctive</text>
  <text x="317" y="204" text-anchor="middle" font-size="9.5" font-weight="700" fill="#E8B23A">= 8 GenAI controls</text>

  <!-- Stage 3: Decompose -->
  <rect x="424" y="118" width="158" height="96" rx="10" fill="#7D2FDB"/>
  <circle cx="444" cy="138" r="11" fill="#fff"/><text x="444" y="142" text-anchor="middle" font-size="12" font-weight="700" fill="#7D2FDB">3</text>
  <text x="503" y="142" text-anchor="middle" font-size="13.5" font-weight="700" fill="#fff">Decompose</text>
  <text x="503" y="162" text-anchor="middle" font-size="9.5" fill="#E7D8FB">obligation &#8594; testable BPs</text>
  <text x="503" y="182" text-anchor="middle" font-size="9" font-style="italic" fill="#E7D8FB">source: OWASP · MITRE</text>
  <text x="503" y="194" text-anchor="middle" font-size="9" font-style="italic" fill="#E7D8FB">ATLAS · NIST GenAI Profile</text>
  <text x="503" y="208" text-anchor="middle" font-size="8.5" fill="#CDB6EE">(not ISO 42001)</text>

  <!-- Stage 4: Crosswalk -->
  <rect x="610" y="118" width="158" height="96" rx="10" fill="#3A445C"/>
  <circle cx="630" cy="138" r="11" fill="#fff"/><text x="630" y="142" text-anchor="middle" font-size="12" font-weight="700" fill="#3A445C">4</text>
  <text x="689" y="142" text-anchor="middle" font-size="13.5" font-weight="700" fill="#fff">Crosswalk</text>
  <text x="689" y="162" text-anchor="middle" font-size="9.5" fill="#D6DCEA">to AWS GenAI Lens</text>
  <text x="689" y="184" text-anchor="middle" font-size="9.5" fill="#9DE8B8">covered &#8594; anchor</text>
  <text x="689" y="200" text-anchor="middle" font-size="9.5" fill="#F0B6B2">gap &#8594; new 'na' standard</text>

  <!-- Stage 5: Standard -->
  <rect x="796" y="118" width="132" height="96" rx="10" fill="#fff" stroke="#E8B23A" stroke-width="2.5"/>
  <circle cx="816" cy="138" r="11" fill="#E8B23A"/><text x="816" y="142" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">5</text>
  <text x="862" y="142" text-anchor="middle" font-size="13" font-weight="700" fill="#2C2C2A">Standard</text>
  <text x="862" y="164" text-anchor="middle" font-size="9.5" fill="#3A445C">statement + gate</text>
  <text x="862" y="178" text-anchor="middle" font-size="9.5" fill="#3A445C">+ evidence</text>
  <text x="862" y="198" text-anchor="middle" font-size="9.5" font-weight="700" fill="#7D2FDB">+ applies_to</text>

  <!-- ARROWS between stages -->
  <line x1="211" y1="166" x2="235" y2="166" stroke="#534AB7" stroke-width="2.5" marker-end="url(#arw)"/>
  <line x1="397" y1="166" x2="421" y2="166" stroke="#534AB7" stroke-width="2.5" marker-end="url(#arw)"/>
  <line x1="583" y1="166" x2="607" y2="166" stroke="#534AB7" stroke-width="2.5" marker-end="url(#arw)"/>
  <line x1="769" y1="166" x2="793" y2="166" stroke="#534AB7" stroke-width="2.5" marker-end="url(#arw)"/>

  <!-- HAND-OFF label on band seam -->
  <text x="401" y="232" text-anchor="middle" font-size="8.5" font-weight="700" fill="#64748B">hand-off:</text>
  <text x="401" y="243" text-anchor="middle" font-size="8.5" font-weight="700" fill="#64748B">obligation set</text>

  <!-- ===== WORKED-EXAMPLE LANE ===== -->
  <text x="60" y="262" font-size="11" font-weight="700" fill="#7D2FDB" letter-spacing="0.5">WORKED EXAMPLE &#8212; GO1B1-01</text>
  <line x1="60" y1="268" x2="920" y2="268" stroke="#D8C6F2" stroke-width="1"/>

  <!-- WE card 1 -->
  <rect x="52" y="280" width="158" height="172" rx="9" fill="#fff" stroke="#E6C9C9" stroke-width="1"/>
  <text x="131" y="298" text-anchor="middle" font-size="9.5" font-weight="700" fill="#E24B4A">Article 15</text>
  <text x="62" y="316" font-size="9" fill="#3A445C">Accuracy, robustness</text>
  <text x="62" y="328" font-size="9" fill="#3A445C">&amp; cybersecurity.</text>
  <text x="62" y="346" font-size="9" fill="#3A445C">A high-risk system</text>
  <text x="62" y="358" font-size="9" fill="#3A445C">must meet its declared</text>
  <text x="62" y="370" font-size="9" fill="#3A445C">accuracy and not</text>
  <text x="62" y="382" font-size="9" fill="#3A445C">silently regress.</text>
  <text x="62" y="404" font-size="8.5" font-style="italic" fill="#64748B">The legal "must" —</text>
  <text x="62" y="415" font-size="8.5" font-style="italic" fill="#64748B">not yet buildable.</text>

  <!-- WE card 2 -->
  <rect x="238" y="280" width="158" height="172" rx="9" fill="#fff" stroke="#D8C6F2" stroke-width="1"/>
  <text x="317" y="298" text-anchor="middle" font-size="9.5" font-weight="700" fill="#534AB7">Obligation kept</text>
  <text x="248" y="316" font-size="9" fill="#3A445C">Accuracy is a</text>
  <text x="248" y="328" font-size="9" fill="#3A445C">system-level obligation</text>
  <text x="248" y="340" font-size="9" fill="#3A445C">&#8594; survives gate 2.</text>
  <text x="248" y="362" font-size="9" fill="#3A445C">Generic accuracy testing,</text>
  <text x="248" y="374" font-size="9" fill="#3A445C">so control_ref = null —</text>
  <text x="248" y="386" font-size="9" fill="#3A445C">but it underpins</text>
  <text x="248" y="398" font-size="9" fill="#3A445C">Control #3 (grounding</text>
  <text x="248" y="410" font-size="9" fill="#3A445C">/ factuality).</text>
  <text x="248" y="432" font-size="8.5" font-style="italic" fill="#64748B">= the obligation handed</text>
  <text x="248" y="443" font-size="8.5" font-style="italic" fill="#64748B">to EA.</text>

  <!-- WE card 3 -->
  <rect x="424" y="280" width="158" height="172" rx="9" fill="#fff" stroke="#D8C6F2" stroke-width="1"/>
  <text x="503" y="298" text-anchor="middle" font-size="9.5" font-weight="700" fill="#7D2FDB">NIST MEASURE &#8594; BPs</text>
  <text x="434" y="318" font-size="9" fill="#3A445C">&#8226; committed, versioned</text>
  <text x="442" y="329" font-size="9" fill="#3A445C">ground-truth set</text>
  <text x="434" y="347" font-size="9" fill="#3A445C">&#8226; each case: input +</text>
  <text x="442" y="358" font-size="9" fill="#3A445C">expected decision +</text>
  <text x="442" y="369" font-size="9" fill="#3A445C">expected evidence</text>
  <text x="434" y="387" font-size="9" fill="#3A445C">&#8226; eval runs on every</text>
  <text x="442" y="398" font-size="9" fill="#3A445C">change; a regression</text>
  <text x="442" y="409" font-size="9" fill="#3A445C">fails the gate</text>
  <text x="434" y="431" font-size="8.5" font-style="italic" fill="#64748B">the testable best</text>
  <text x="434" y="442" font-size="8.5" font-style="italic" fill="#64748B">practices.</text>

  <!-- WE card 4 -->
  <rect x="610" y="280" width="158" height="172" rx="9" fill="#fff" stroke="#D8C6F2" stroke-width="1"/>
  <text x="689" y="298" text-anchor="middle" font-size="9.5" font-weight="700" fill="#3A445C">Covered &#8594; anchor</text>
  <text x="620" y="318" font-size="9" fill="#3A445C">"ground-truth dataset</text>
  <text x="620" y="330" font-size="9" fill="#3A445C">exists" maps cleanly to</text>
  <text x="620" y="352" font-size="9.5" font-weight="700" fill="#2C2C2A">GENOPS01-BP01</text>
  <text x="620" y="365" font-size="9" fill="#3A445C">step 1 — Create a</text>
  <text x="620" y="377" font-size="9" fill="#3A445C">ground truth dataset.</text>
  <rect x="620" y="390" width="138" height="20" rx="5" fill="#E7F8ED"/>
  <text x="689" y="404" text-anchor="middle" font-size="9" font-weight="700" fill="#1E8A4C">COVERED — anchor, not a gap</text>
  <text x="620" y="430" font-size="8.5" font-style="italic" fill="#64748B">no new 'na' standard</text>
  <text x="620" y="441" font-size="8.5" font-style="italic" fill="#64748B">needed here.</text>

  <!-- WE card 5 -->
  <rect x="796" y="280" width="132" height="172" rx="9" fill="#FBF3DF" stroke="#E8B23A" stroke-width="2"/>
  <text x="862" y="298" text-anchor="middle" font-size="11" font-weight="700" fill="#2C2C2A">GO1B1-01</text>
  <text x="806" y="318" font-size="9" fill="#3A445C">Eval harness</text>
  <text x="806" y="330" font-size="9" fill="#3A445C">committed &amp;</text>
  <text x="806" y="342" font-size="9" fill="#3A445C">CI-gated.</text>
  <text x="806" y="364" font-size="9" fill="#3A445C">applies_to: agent</text>
  <text x="806" y="386" font-size="9" fill="#3A445C">EU AI Act =</text>
  <text x="806" y="398" font-size="9" fill="#3A445C">cross-reference</text>
  <text x="806" y="410" font-size="9" fill="#3A445C">(Art 15, unverified)</text>
  <text x="862" y="436" text-anchor="middle" font-size="8.5" font-weight="700" fill="#7D2FDB">in the catalogue</text>

  <!-- ===== FOOTER ===== -->
  <rect x="38" y="488" width="904" height="58" rx="10" fill="#2C2C2A"/>
  <text x="56" y="508" font-size="10.5" font-weight="700" fill="#E8B23A">The reusable pattern</text>
  <text x="56" y="524" font-size="10" fill="#fff">Obligation &#8594; BPs (OWASP / ATLAS / NIST) &#8594; crosswalk to Lens &#8594; covered = anchor, gap = new 'na' standard &#8594; statement + gate + evidence &#8594; tag applies_to.</text>
  <text x="56" y="539" font-size="8.5" font-style="italic" fill="#B9C0CC">Caveat: GO1B1-01 was authored AWS-first (CX bucket) — here the Art 15 obligation is back-fitted as a cross-reference onto an existing standard, not spawning a new 'na' one.</text>
</svg>
