<svg viewBox="0 0 980 560" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif">
  <defs>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7D03E0"/><stop offset="1" stop-color="#6D28D9"/>
    </linearGradient>
  </defs>
  <rect width="980" height="560" fill="#FFFFFF"/>
  <circle cx="920" cy="50" r="120" fill="#7D03E0" opacity="0.05"/>
  <circle cx="60" cy="520" r="110" fill="#2E1065" opacity="0.04"/>

  <!-- header -->
  <rect x="60" y="48" width="30" height="4" rx="2" fill="url(#brand)"/>
  <text x="98" y="53" font-size="12" font-weight="700" letter-spacing="2.5" fill="#6D28D9">PART 2 · BUILDING THE CATALOGUE</text>
  <text x="60" y="90" font-size="28" font-weight="800" fill="#2E1065">How a Candidate Becomes a Standard</text>

  <!-- spine -->
  <line x1="104" y1="170" x2="104" y2="470" stroke="#E0CFF7" stroke-width="3"/>

  <!-- 1 -->
  <circle cx="104" cy="170" r="26" fill="url(#brand)"/><text x="104" y="178" font-size="19" font-weight="800" fill="#FFFFFF" text-anchor="middle">1</text>
  <text x="150" y="164" font-size="21" font-weight="800" fill="#2E1065">Choose the Anchor</text>
  <text x="150" y="188" font-size="14" fill="#7D03E0">(which baselines we take — regulation, frameworks, or bespoke)</text>

  <!-- 2 -->
  <circle cx="104" cy="270" r="26" fill="url(#brand)"/><text x="104" y="278" font-size="19" font-weight="800" fill="#FFFFFF" text-anchor="middle">2</text>
  <text x="150" y="264" font-size="21" font-weight="800" fill="#2E1065">Keep or Drop</text>
  <text x="150" y="288" font-size="14" fill="#7D03E0">(GenAI-distinctive? already covered? enforceable? material?)</text>

  <!-- 3 -->
  <circle cx="104" cy="370" r="26" fill="url(#brand)"/><text x="104" y="378" font-size="19" font-weight="800" fill="#FFFFFF" text-anchor="middle">3</text>
  <text x="150" y="364" font-size="21" font-weight="800" fill="#2E1065">Score the Survivors</text>
  <text x="150" y="388" font-size="14" fill="#7D03E0">(criticality · difficulty · reusability · enforcement cost)</text>

  <!-- 4 -->
  <circle cx="104" cy="470" r="26" fill="url(#brand)"/><text x="104" y="478" font-size="19" font-weight="800" fill="#FFFFFF" text-anchor="middle">4</text>
  <text x="150" y="464" font-size="21" font-weight="800" fill="#2E1065">Write the Standard</text>
  <text x="150" y="488" font-size="14" fill="#7D03E0">(statement + gate + evidence + applies_to)</text>
</svg>
