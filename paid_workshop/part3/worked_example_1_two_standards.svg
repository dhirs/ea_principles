<?xml version="1.0" standalone="no"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 780" font-family="var(--font-sans), 'Anthropic Sans', sans-serif" role="img" aria-labelledby="ttl dsc" width="960" height="780">
  <title id="ttl">Worked Example — Prioritizing Two Standards</title>
  <desc id="dsc">Two real catalogue standards to be scored on the four prioritization dimensions. GS1B3-01 (permission-aware retrieval) is legal/security-critical and expensive; GC3B3-01 (prompt caching) is cost-only and cheap. The four dimensions are criticality and reusability (worth) versus difficulty and enforcement cost (cost).</desc>

  <text x="480" y="44" text-anchor="middle" font-size="24" font-weight="700" fill="var(--color-text-primary, #141413)">Worked Example — Prioritizing Two Standards</text>
  <text x="480" y="70" text-anchor="middle" font-size="14" fill="var(--color-text-secondary, #3d3d3a)">Two real catalogue standards, scored on the four dimensions over the next three slides</text>

  <!-- ===== LEFT — GS1B3-01 (security-critical) ===== -->
  <g>
    <rect x="40" y="96" width="410" height="480" rx="14" fill="var(--color-background-primary, #ffffff)" stroke="#E24B4A" stroke-width="1.6"/>
    <rect x="40" y="96" width="410" height="6" rx="3" fill="#E24B4A"/>

    <text x="64" y="146" font-size="21" font-weight="700" fill="#A32D2D">ST-GS1B3-01</text>
    <g font-size="10.5" font-weight="700" text-anchor="middle">
      <rect x="64" y="158" width="118" height="22" rx="11" fill="#FCEFEF"/><text x="123" y="173" fill="#A32D2D">P2 · Security</text>
      <rect x="188" y="158" width="74" height="22" rx="11" fill="#FCEFEF"/><text x="225" y="173" fill="#A32D2D">scaling</text>
      <rect x="268" y="158" width="110" height="22" rx="11" fill="#FCEFEF"/><text x="323" y="173" fill="#A32D2D">impact: High</text>
    </g>
    <line x1="64" y1="196" x2="426" y2="196" stroke="var(--color-border-secondary, rgba(31,30,29,0.18))" stroke-width="1"/>

    <text x="64" y="220" font-size="11" font-weight="700" letter-spacing="0.4" fill="#A32D2D">STANDARD</text>
    <text x="64" y="242" font-size="14.5" font-weight="700" fill="var(--color-text-primary, #141413)">Never let a user retrieve what</text>
    <text x="64" y="262" font-size="14.5" font-weight="700" fill="var(--color-text-primary, #141413)">they aren't allowed to see</text>

    <text x="64" y="296" font-size="11" font-weight="700" letter-spacing="0.4" fill="#A32D2D">ASPIRATION</text>
    <text x="64" y="317" font-size="12" font-style="italic" fill="var(--color-text-secondary, #3d3d3a)">"No one should learn through an AI</text>
    <text x="64" y="334" font-size="12" font-style="italic" fill="var(--color-text-secondary, #3d3d3a)">system what they couldn't learn directly."</text>

    <text x="64" y="368" font-size="11" font-weight="700" letter-spacing="0.4" fill="#A32D2D">WHAT IT IS</text>
    <text x="64" y="389" font-size="12" fill="var(--color-text-primary, #141413)">Per-query, identity-scoped retrieval from</text>
    <text x="64" y="406" font-size="12" fill="var(--color-text-primary, #141413)">shared vector stores — a central SDK applies</text>
    <text x="64" y="423" font-size="12" fill="var(--color-text-primary, #141413)">an entitlement pre-filter so a user only gets</text>
    <text x="64" y="440" font-size="12" fill="var(--color-text-primary, #141413)">chunks their roles permit.</text>

    <rect x="64" y="470" width="362" height="80" rx="10" fill="#FCEFEF" stroke="#E24B4A" stroke-width="1"/>
    <text x="82" y="494" font-size="11" font-weight="700" letter-spacing="0.4" fill="#A32D2D">PROFILE (hypothesis)</text>
    <text x="82" y="516" font-size="12.5" font-weight="700" fill="var(--color-text-primary, #141413)">Legal/security-critical · expensive to build</text>
    <text x="82" y="536" font-size="11" fill="var(--color-text-secondary, #3d3d3a)">high worth, high cost — the score has to confirm it</text>
  </g>

  <!-- ===== VS ===== -->
  <circle cx="480" cy="330" r="26" fill="var(--color-background-secondary, #f7f6f3)" stroke="#7F77DD" stroke-width="1.6"/>
  <text x="480" y="330" text-anchor="middle" dominant-baseline="central" font-size="17" font-weight="700" fill="#544BB5">vs</text>

  <!-- ===== RIGHT — GC3B3-01 (cost-only) ===== -->
  <g>
    <rect x="510" y="96" width="410" height="480" rx="14" fill="var(--color-background-primary, #ffffff)" stroke="#378ADD" stroke-width="1.6"/>
    <rect x="510" y="96" width="410" height="6" rx="3" fill="#378ADD"/>

    <text x="534" y="146" font-size="21" font-weight="700" fill="#185FA5">ST-GC3B3-01</text>
    <g font-size="10.5" font-weight="700" text-anchor="middle">
      <rect x="534" y="158" width="150" height="22" rx="11" fill="#EAF3FC"/><text x="609" y="173" fill="#185FA5">P5 · Cost Optimization</text>
      <rect x="690" y="158" width="74" height="22" rx="11" fill="#EAF3FC"/><text x="727" y="173" fill="#185FA5">scaling</text>
      <rect x="770" y="158" width="118" height="22" rx="11" fill="#EAF3FC"/><text x="829" y="173" fill="#185FA5">impact: Medium</text>
    </g>
    <line x1="534" y1="196" x2="896" y2="196" stroke="var(--color-border-secondary, rgba(31,30,29,0.18))" stroke-width="1"/>

    <text x="534" y="220" font-size="11" font-weight="700" letter-spacing="0.4" fill="#185FA5">STANDARD</text>
    <text x="534" y="242" font-size="14.5" font-weight="700" fill="var(--color-text-primary, #141413)">Don't pay twice for the same</text>
    <text x="534" y="262" font-size="14.5" font-weight="700" fill="var(--color-text-primary, #141413)">prompt content</text>

    <text x="534" y="296" font-size="11" font-weight="700" letter-spacing="0.4" fill="#185FA5">ASPIRATION</text>
    <text x="534" y="317" font-size="12" font-style="italic" fill="var(--color-text-secondary, #3d3d3a)">"The same work is never paid for twice."</text>

    <text x="534" y="368" font-size="11" font-weight="700" letter-spacing="0.4" fill="#185FA5">WHAT IT IS</text>
    <text x="534" y="389" font-size="12" fill="var(--color-text-primary, #141413)">Every prompt template declares its static-</text>
    <text x="534" y="406" font-size="12" fill="var(--color-text-primary, #141413)">prefix token count and a cache decision; a CI</text>
    <text x="534" y="423" font-size="12" fill="var(--color-text-primary, #141413)">gate fails the build when an eligible prefix is</text>
    <text x="534" y="440" font-size="12" fill="var(--color-text-primary, #141413)">left uncached or the count is faked.</text>

    <rect x="534" y="470" width="362" height="80" rx="10" fill="#EAF3FC" stroke="#378ADD" stroke-width="1"/>
    <text x="552" y="494" font-size="11" font-weight="700" letter-spacing="0.4" fill="#185FA5">PROFILE (hypothesis)</text>
    <text x="552" y="516" font-size="12.5" font-weight="700" fill="var(--color-text-primary, #141413)">Cost-only · cheap to build</text>
    <text x="552" y="536" font-size="11" fill="var(--color-text-secondary, #3d3d3a)">low worth, low cost — a cheap win, but not urgent</text>
  </g>

  <!-- ===== FOUR-DIMENSION REMINDER RIBBON ===== -->
  <rect x="40" y="596" width="880" height="140" rx="12" fill="var(--color-background-secondary, #f7f6f3)" stroke="#7F77DD" stroke-width="1.4"/>
  <rect x="40" y="596" width="7" height="140" rx="3.5" fill="#7F77DD"/>
  <text x="480" y="624" text-anchor="middle" font-size="12" font-weight="700" letter-spacing="1.2" fill="var(--color-text-secondary, #3d3d3a)">SCORED ON THE FOUR DIMENSIONS</text>

  <g font-size="12.5" font-weight="700" text-anchor="middle">
    <polygon points="168,646 162,656 174,656" fill="#7F77DD"/>
    <text x="270" y="655" font-size="11" fill="#544BB5" text-anchor="start" font-weight="700">RAISES PRIORITY — worth</text>
    <rect x="188" y="666" width="240" height="30" rx="15" fill="#EEEDFA" stroke="#B9B5E6" stroke-width="1"/><text x="308" y="686" fill="#544BB5">Criticality</text>
    <rect x="188" y="702" width="240" height="30" rx="15" fill="#EEEDFA" stroke="#B9B5E6" stroke-width="1"/><text x="308" y="722" fill="#544BB5">Reusability</text>

    <polygon points="536,656 530,646 542,646" fill="#EF9F27"/>
    <text x="638" y="655" font-size="11" fill="#854F0B" text-anchor="start" font-weight="700">WEIGHS AGAINST — cost</text>
    <rect x="556" y="666" width="240" height="30" rx="15" fill="#FDF1DD" stroke="#F0C877" stroke-width="1"/><text x="676" y="686" fill="#854F0B">Difficulty</text>
    <rect x="556" y="702" width="240" height="30" rx="15" fill="#FDF1DD" stroke="#F0C877" stroke-width="1"/><text x="676" y="722" fill="#854F0B">Enforcement cost</text>
  </g>
</svg>
