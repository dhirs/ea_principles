<?xml version="1.0" standalone="no"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 780" font-family="var(--font-sans), 'Anthropic Sans', sans-serif" role="img" aria-labelledby="ttl dsc" width="960" height="780">
  <title id="ttl">RI Blueprint vs. Concrete RI</title>
  <desc id="dsc">RI Blueprint is a wide-tolerance sizing sketch (cost, time, complexity, adoption ease) with no field-level detail, living on the backlog. A funnel shows many blueprints narrowing through the prioritization gate to one selection. Once selected, the architect authors the Concrete RI, a field-level HLD with exact schema and paths, handed to Engineering to build.</desc>

  <defs>
    <linearGradient id="gateGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F6F1FF"/><stop offset="1" stop-color="#EEEDFA"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="480" y="44" text-anchor="middle" font-size="24" font-weight="700" fill="var(--color-text-primary, #141413)">RI Blueprint vs. Concrete RI</text>
  <text x="480" y="70" text-anchor="middle" font-size="14" fill="var(--color-text-secondary, #3d3d3a)">Two different artefacts, on either side of the prioritization gate</text>

  <!-- ===== LEFT — RI BLUEPRINT ===== -->
  <g>
    <rect x="40" y="96" width="370" height="490" rx="14" fill="var(--color-background-primary, #ffffff)" stroke="#378ADD" stroke-width="1.6"/>
    <rect x="40" y="96" width="370" height="6" rx="3" fill="#378ADD"/>

    <!-- hero icon: dashed sketch rect = "just a sketch" -->
    <circle cx="225" cy="138" r="26" fill="#378ADD"/>
    <rect x="213" y="126" width="24" height="24" rx="4" fill="none" stroke="#ffffff" stroke-width="2" stroke-dasharray="4 3"/>

    <text x="225" y="186" text-anchor="middle" font-size="15" font-weight="700" letter-spacing="0.3" fill="#185FA5">RI BLUEPRINT</text>
    <text x="225" y="204" text-anchor="middle" font-size="11.5" fill="var(--color-text-secondary, #3d3d3a)">Cheap · many · lives on the backlog</text>
    <line x1="62" y1="220" x2="388" y2="220" stroke="var(--color-border-secondary, rgba(31,30,29,0.18))" stroke-width="1"/>

    <text x="62" y="244" font-size="12" font-weight="700" fill="#185FA5">Wide-tolerance estimate only</text>

    <!-- estimate pills with icons -->
    <g>
      <rect x="62" y="256" width="150" height="32" rx="16" fill="#EAF3FC"/>
      <circle cx="80" cy="272" r="9" fill="#ffffff" stroke="#378ADD" stroke-width="1"/>
      <text x="80" y="273" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="700" fill="#185FA5">$</text>
      <text x="96" y="273" dominant-baseline="central" font-size="11.5" font-weight="700" fill="#185FA5">Cost</text>

      <rect x="222" y="256" width="150" height="32" rx="16" fill="#EAF3FC"/>
      <circle cx="240" cy="272" r="9" fill="#ffffff" stroke="#378ADD" stroke-width="1"/>
      <line x1="240" y1="272" x2="240" y2="267" stroke="#185FA5" stroke-width="1.4" stroke-linecap="round"/>
      <line x1="240" y1="272" x2="244" y2="272" stroke="#185FA5" stroke-width="1.4" stroke-linecap="round"/>
      <text x="256" y="273" dominant-baseline="central" font-size="11.5" font-weight="700" fill="#185FA5">Time</text>

      <rect x="62" y="296" width="150" height="32" rx="16" fill="#EAF3FC"/>
      <circle cx="80" cy="312" r="9" fill="#ffffff" stroke="#378ADD" stroke-width="1"/>
      <path d="M76 314 l2.5 -5 l2.5 4 l2.5 -6" fill="none" stroke="#185FA5" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="96" y="313" dominant-baseline="central" font-size="11.5" font-weight="700" fill="#185FA5">Complexity</text>

      <rect x="222" y="296" width="150" height="32" rx="16" fill="#EAF3FC"/>
      <circle cx="240" cy="312" r="9" fill="#ffffff" stroke="#378ADD" stroke-width="1"/>
      <circle cx="237.5" cy="312" r="3.4" fill="none" stroke="#185FA5" stroke-width="1.1"/>
      <circle cx="242.5" cy="312" r="3.4" fill="none" stroke="#185FA5" stroke-width="1.1"/>
      <text x="256" y="313" dominant-baseline="central" font-size="11.5" font-weight="700" fill="#185FA5">Adoption ease</text>
    </g>

    <text x="62" y="354" font-size="12" font-weight="700" fill="#185FA5">Deliberately does NOT contain</text>
    <g font-size="11.5" fill="var(--color-text-primary, #141413)">
      <circle cx="69" cy="372" r="7" fill="#F1EFE8" stroke="#8a8a85" stroke-width="0.8"/>
      <path d="M66 369 l6 6 M72 369 l-6 6" stroke="#6b6b66" stroke-width="1.3" stroke-linecap="round"/>
      <text x="84" y="373" dominant-baseline="central">Field-level schema / attributes</text>

      <circle cx="69" cy="392" r="7" fill="#F1EFE8" stroke="#8a8a85" stroke-width="0.8"/>
      <path d="M66 389 l6 6 M72 389 l-6 6" stroke="#6b6b66" stroke-width="1.3" stroke-linecap="round"/>
      <text x="84" y="393" dominant-baseline="central">File / repo paths</text>

      <circle cx="69" cy="412" r="7" fill="#F1EFE8" stroke="#8a8a85" stroke-width="0.8"/>
      <path d="M66 409 l6 6 M72 409 l-6 6" stroke="#6b6b66" stroke-width="1.3" stroke-linecap="round"/>
      <text x="84" y="413" dominant-baseline="central">Validator logic or thresholds</text>

      <circle cx="69" cy="432" r="7" fill="#F1EFE8" stroke="#8a8a85" stroke-width="0.8"/>
      <path d="M66 429 l6 6 M72 429 l-6 6" stroke="#6b6b66" stroke-width="1.3" stroke-linecap="round"/>
      <text x="84" y="433" dominant-baseline="central">CI gate spec</text>
    </g>

    <line x1="62" y1="452" x2="388" y2="452" stroke="var(--color-border-secondary, rgba(31,30,29,0.18))" stroke-width="1"/>
    <text x="62" y="472" font-size="11.5" fill="var(--color-text-secondary, #3d3d3a)">Author: EA architect, continuous BAU</text>
    <text x="62" y="492" font-size="11.5" fill="var(--color-text-secondary, #3d3d3a)">Lives: main product / EA backlog</text>
    <text x="62" y="512" font-size="11.5" fill="var(--color-text-secondary, #3d3d3a)">Job: rank-able — enough to score,</text>
    <text x="62" y="530" font-size="11.5" fill="var(--color-text-secondary, #3d3d3a)">not enough to build</text>

    <rect x="62" y="546" width="326" height="26" rx="13" fill="#EAF3FC"/>
    <text x="225" y="559" text-anchor="middle" dominant-baseline="central" font-size="11.5" font-weight="700" fill="#185FA5">Input to: prioritization scoring</text>
  </g>

  <!-- ===== GATE — funnel: many blueprints narrow to one build ===== -->
  <rect x="430" y="256" width="100" height="170" rx="12" fill="url(#gateGrad)" stroke="#7F77DD" stroke-width="1.5"/>

  <circle cx="456" cy="278" r="5" fill="#378ADD"/>
  <circle cx="480" cy="278" r="5" fill="#378ADD"/>
  <circle cx="504" cy="278" r="5" fill="#378ADD"/>

  <polygon points="445,294 515,294 497,348 463,348" fill="#ffffff" stroke="#7F77DD" stroke-width="1.2"/>
  <line x1="480" y1="348" x2="480" y2="360" stroke="#E24B4A" stroke-width="2"/>
  <circle cx="480" cy="366" r="6" fill="#E24B4A"/>

  <text x="480" y="390" text-anchor="middle" font-size="11" font-weight="700" fill="#544BB5">Prioritization</text>
  <text x="480" y="404" text-anchor="middle" font-size="11" font-weight="700" fill="#544BB5">gate</text>
  <text x="480" y="418" text-anchor="middle" font-size="9.5" fill="var(--color-text-secondary, #3d3d3a)">ranked, selected</text>

  <!-- arrows: panel -> gate -> panel -->
  <line x1="410" y1="341" x2="428" y2="341" stroke="#378ADD" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="532" y1="341" x2="550" y2="341" stroke="#E24B4A" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===== RIGHT — CONCRETE RI (HLD) ===== -->
  <g>
    <rect x="550" y="96" width="370" height="490" rx="14" fill="var(--color-background-primary, #ffffff)" stroke="#E24B4A" stroke-width="1.6"/>
    <rect x="550" y="96" width="370" height="6" rx="3" fill="#E24B4A"/>

    <!-- hero icon: grid = fully specified schema -->
    <circle cx="735" cy="138" r="26" fill="#E24B4A"/>
    <rect x="723" y="126" width="24" height="24" rx="2" fill="none" stroke="#ffffff" stroke-width="1.8"/>
    <line x1="731" y1="126" x2="731" y2="150" stroke="#ffffff" stroke-width="1.1"/>
    <line x1="739" y1="126" x2="739" y2="150" stroke="#ffffff" stroke-width="1.1"/>
    <line x1="723" y1="134" x2="747" y2="134" stroke="#ffffff" stroke-width="1.1"/>
    <line x1="723" y1="142" x2="747" y2="142" stroke="#ffffff" stroke-width="1.1"/>

    <text x="735" y="186" text-anchor="middle" font-size="15" font-weight="700" letter-spacing="0.3" fill="#A32D2D">CONCRETE RI (HLD)</text>
    <text x="735" y="204" text-anchor="middle" font-size="11.5" fill="var(--color-text-secondary, #3d3d3a)">Expensive · few · funded sprint work</text>
    <line x1="572" y1="220" x2="898" y2="220" stroke="var(--color-border-secondary, rgba(31,30,29,0.18))" stroke-width="1"/>

    <text x="572" y="244" font-size="12" font-weight="700" fill="#A32D2D">Field-level detail — build-ready</text>
    <g font-size="11.5" fill="var(--color-text-primary, #141413)">
      <circle cx="579" cy="262" r="7" fill="#FCEFEF" stroke="#A32D2D" stroke-width="0.8"/>
      <path d="M576 262 l2.3 2.6 l4.5 -5.4" fill="none" stroke="#A32D2D" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="594" y="263" dominant-baseline="central">Full schema, field by field</text>

      <circle cx="579" cy="286" r="7" fill="#FCEFEF" stroke="#A32D2D" stroke-width="0.8"/>
      <path d="M576 286 l2.3 2.6 l4.5 -5.4" fill="none" stroke="#A32D2D" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="594" y="287" dominant-baseline="central">Exact file / repo paths</text>

      <circle cx="579" cy="310" r="7" fill="#FCEFEF" stroke="#A32D2D" stroke-width="0.8"/>
      <path d="M576 310 l2.3 2.6 l4.5 -5.4" fill="none" stroke="#A32D2D" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="594" y="311" dominant-baseline="central">Validator logic + threshold table</text>

      <circle cx="579" cy="334" r="7" fill="#FCEFEF" stroke="#A32D2D" stroke-width="0.8"/>
      <path d="M576 334 l2.3 2.6 l4.5 -5.4" fill="none" stroke="#A32D2D" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="594" y="335" dominant-baseline="central">CI gate spec + entrypoint contract</text>
    </g>

    <text x="572" y="358" font-size="12" font-weight="700" fill="#A32D2D">Still a design, not running code</text>
    <rect x="572" y="372" width="326" height="27" rx="13.5" fill="#FCEFEF" stroke="#E24B4A" stroke-width="1"/>
    <text x="735" y="386" text-anchor="middle" dominant-baseline="central" font-size="11.5" font-weight="700" fill="#A32D2D">Precise enough to build without</text>
    <rect x="572" y="403" width="326" height="27" rx="13.5" fill="#FCEFEF" stroke="#E24B4A" stroke-width="1"/>
    <text x="735" y="417" text-anchor="middle" dominant-baseline="central" font-size="11.5" font-weight="700" fill="#A32D2D">further architecture decisions</text>

    <line x1="572" y1="450" x2="898" y2="450" stroke="var(--color-border-secondary, rgba(31,30,29,0.18))" stroke-width="1"/>
    <text x="572" y="470" font-size="11.5" fill="var(--color-text-secondary, #3d3d3a)">Author: EA architect, on selection</text>
    <text x="572" y="490" font-size="11.5" fill="var(--color-text-secondary, #3d3d3a)">Handoff: to Engineering to build</text>
    <text x="572" y="510" font-size="11.5" fill="var(--color-text-secondary, #3d3d3a)">Job: define — Engineering builds</text>
    <text x="572" y="528" font-size="11.5" fill="var(--color-text-secondary, #3d3d3a)">from it, no new design calls</text>

    <rect x="572" y="544" width="326" height="26" rx="13" fill="#FCEFEF"/>
    <text x="735" y="557" text-anchor="middle" dominant-baseline="central" font-size="11.5" font-weight="700" fill="#A32D2D">Output: HLD handed to Engineering</text>
  </g>

  <!-- ===== FOOTER TAKEAWAY ===== -->
  <rect x="40" y="606" width="880" height="128" rx="12" fill="var(--color-background-secondary, #f7f6f3)" stroke="#7F77DD" stroke-width="1.4"/>
  <rect x="40" y="606" width="7" height="128" rx="3.5" fill="#7F77DD"/>
  <text x="480" y="642" text-anchor="middle" font-size="15" font-weight="700" fill="var(--color-text-primary, #141413)">Same standard, two different artefacts.</text>
  <text x="480" y="672" text-anchor="middle" font-size="13" fill="var(--color-text-primary, #141413)">Blueprint sizes it so it can be <tspan font-weight="700" fill="#185FA5">ranked</tspan>. Concrete RI specifies it so it can be <tspan font-weight="700" fill="#A32D2D">built</tspan>.</text>
  <text x="480" y="702" text-anchor="middle" font-size="12.5" fill="var(--color-text-secondary, #3d3d3a)">Building the concrete RI's actual code/infra is Part 4 — this slide stops at the HLD handoff.</text>
</svg>
