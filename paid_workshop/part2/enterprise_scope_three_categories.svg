<?xml version="1.0" standalone="no"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 720" font-family="var(--font-sans), 'Anthropic Sans', sans-serif" role="img" aria-labelledby="ttl dsc" width="960" height="720">
  <title id="ttl">Three categories of standards in the enterprise AI catalogue</title>
  <desc id="dsc">A central hub labelled Standards with three spokes: Legal and Compliance, Customer Experience, and Cost — the three non-functional dimensions every standard serves.</desc>

  <text x="480" y="48" text-anchor="middle" font-size="25" font-weight="700" fill="var(--color-text-primary, #141413)">Enterprise AI — Three Categories of Standards</text>
  <text x="480" y="74" text-anchor="middle" font-size="14" fill="var(--color-text-secondary, #3d3d3a)">Every standard serves exactly one of three non-functional dimensions</text>

  <!-- spokes -->
  <g stroke="var(--color-border-secondary, rgba(31,30,29,0.3))" stroke-width="2" stroke-dasharray="2 6" stroke-linecap="round">
    <line x1="480" y1="400" x2="480" y2="268"/>
    <line x1="480" y1="400" x2="208" y2="520"/>
    <line x1="480" y1="400" x2="752" y2="520"/>
  </g>

  <!-- hub -->
  <circle cx="480" cy="400" r="86" fill="var(--color-background-primary, #ffffff)" stroke="#7F77DD" stroke-width="2.5"/>
  <circle cx="480" cy="400" r="76" fill="none" stroke="#7F77DD" stroke-width="1" opacity="0.4"/>
  <text x="480" y="384" text-anchor="middle" font-size="11" letter-spacing="1.5" fill="var(--color-text-secondary, #3d3d3a)">ENTERPRISE AI</text>
  <text x="480" y="408" text-anchor="middle" font-size="20" font-weight="700" fill="var(--color-text-primary, #141413)">Standards</text>
  <text x="480" y="428" text-anchor="middle" font-size="10.5" fill="var(--color-text-secondary, #3d3d3a)">three non-functional dimensions</text>

  <!-- ===== CARD 1 — LEGAL & COMPLIANCE (top) ===== -->
  <g>
    <rect x="335" y="90" width="290" height="170" rx="14" fill="var(--color-background-primary, #ffffff)" stroke="#E24B4A" stroke-width="1.6"/>
    <rect x="335" y="90" width="290" height="6" rx="3" fill="#E24B4A"/>
    <text x="350" y="124" font-size="13.5" font-weight="700" letter-spacing="0.8" fill="#A32D2D">LEGAL &amp; COMPLIANCE</text>
    <g font-size="12.5" fill="var(--color-text-primary, #141413)">
      <circle cx="357" cy="152" r="2.6" fill="#E24B4A"/><text x="369" y="156">GDPR — data privacy &amp; retention</text>
      <circle cx="357" cy="175" r="2.6" fill="#E24B4A"/><text x="369" y="179">EU AI Act &amp; sector regs (FCA, HIPAA)</text>
      <circle cx="357" cy="198" r="2.6" fill="#E24B4A"/><text x="369" y="202">Auditability &amp; evidence trail</text>
      <circle cx="357" cy="221" r="2.6" fill="#E24B4A"/><text x="369" y="225">IP &amp; copyright exposure</text>
    </g>
  </g>

  <!-- ===== CARD 2 — CUSTOMER EXPERIENCE (bottom-left) ===== -->
  <g>
    <rect x="40" y="520" width="300" height="170" rx="14" fill="var(--color-background-primary, #ffffff)" stroke="#378ADD" stroke-width="1.6"/>
    <rect x="40" y="520" width="300" height="6" rx="3" fill="#378ADD"/>
    <text x="55" y="554" font-size="13.5" font-weight="700" letter-spacing="0.8" fill="#185FA5">CUSTOMER EXPERIENCE</text>
    <g font-size="12.5" fill="var(--color-text-primary, #141413)">
      <circle cx="62" cy="582" r="2.6" fill="#378ADD"/><text x="74" y="586">Accuracy &amp; hallucination</text>
      <circle cx="62" cy="605" r="2.6" fill="#378ADD"/><text x="74" y="609">Latency &amp; responsiveness</text>
      <circle cx="62" cy="628" r="2.6" fill="#378ADD"/><text x="74" y="632">Consistency / model drift</text>
      <circle cx="62" cy="651" r="2.6" fill="#378ADD"/><text x="74" y="655">Safety &amp; brand trust</text>
    </g>
  </g>

  <!-- ===== CARD 3 — COST (bottom-right) ===== -->
  <g>
    <rect x="620" y="520" width="300" height="170" rx="14" fill="var(--color-background-primary, #ffffff)" stroke="#EF9F27" stroke-width="1.6"/>
    <rect x="620" y="520" width="300" height="6" rx="3" fill="#EF9F27"/>
    <text x="635" y="554" font-size="13.5" font-weight="700" letter-spacing="0.8" fill="#854F0B">COST</text>
    <g font-size="12.5" fill="var(--color-text-primary, #141413)">
      <circle cx="642" cy="582" r="2.6" fill="#EF9F27"/><text x="654" y="586">Capex — platform &amp; build investment</text>
      <circle cx="642" cy="605" r="2.6" fill="#EF9F27"/><text x="654" y="609">Opex — token / inference &amp; hosting</text>
      <circle cx="642" cy="628" r="2.6" fill="#EF9F27"/><text x="654" y="632">Engineering toil &amp; duplication</text>
      <circle cx="642" cy="651" r="2.6" fill="#EF9F27"/><text x="654" y="655">Incident &amp; remediation cost</text>
    </g>
  </g>
</svg>
