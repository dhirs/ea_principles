<?xml version="1.0" standalone="no"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 720" font-family="var(--font-sans), 'Anthropic Sans', sans-serif" role="img" aria-labelledby="ttl dsc" width="960" height="720">
  <title id="ttl">Step 2 — Crosswalk each best practice to the AWS GenAI Lens</title>
  <desc id="dsc">The Lens is structured Pillar to Question to Best Practice to Implementation Step, and standards anchor at the step level. Covered best practices anchor; gaps become new standards with mapping_state na. For Art 15, B1/B3/B5/B6 anchor to GENSEC04, B4 to P21, and B2 is a gap.</desc>

  <text x="480" y="44" text-anchor="middle" font-size="24" font-weight="700" fill="var(--color-text-primary, #141413)"><tspan fill="#C77A05">Step 2 · Crosswalk</tspan> — Map Each BP to the AWS GenAI Lens</text>
  <text x="480" y="70" text-anchor="middle" font-size="13.5" fill="var(--color-text-secondary, #3d3d3a)">Covered by the Lens → anchor · no analogue → a new standard</text>

  <!-- ===== LEFT — LENS STRUCTURE ===== -->
  <rect x="40" y="96" width="430" height="440" rx="14" fill="var(--color-background-primary, #ffffff)" stroke="#EF9F27" stroke-width="1.6"/>
  <rect x="40" y="96" width="430" height="6" rx="3" fill="#EF9F27"/>
  <text x="62" y="128" font-size="13" font-weight="700" letter-spacing="0.5" fill="#854F0B">THE AWS GENAI LENS — STRUCTURE</text>
  <text x="62" y="146" font-size="11.5" fill="var(--color-text-secondary, #3d3d3a)">Standards anchor at the implementation-step level</text>
  <line x1="62" y1="156" x2="448" y2="156" stroke="var(--color-border-secondary, rgba(31,30,29,0.18))" stroke-width="1"/>

  <g font-family="var(--font-mono), ui-monospace, monospace" font-size="12.5" fill="var(--color-text-primary, #141413)">
    <text x="64" y="190" font-weight="700">AWS GenAI Lens</text>
    <text x="82" y="220">└─ Pillar — <tspan font-weight="700" fill="#854F0B">GENSEC</tspan> (Security)</text>
    <text x="104" y="250">└─ Question — <tspan font-weight="700" fill="#854F0B">GENSEC04</tspan> (Prompt Security)</text>
    <text x="126" y="280">└─ Best Practice</text>
    <text x="148" y="310">└─ Implementation Step</text>
    <text x="170" y="340">└─ <tspan font-weight="700" fill="#A32D2D">OUR STANDARD</tspan></text>
  </g>
  <rect x="148" y="296" width="300" height="20" rx="6" fill="none" stroke="#EF9F27" stroke-width="1.4" stroke-dasharray="4 3"/>
  <text x="452" y="310" text-anchor="end" font-size="10.5" font-weight="700" fill="#C77A05"> ◀ anchor here</text>

  <rect x="56" y="368" width="398" height="150" rx="10" fill="#FDF1DD"/>
  <text x="72" y="392" font-size="12" font-weight="700" fill="#854F0B">Each implementation step gets a due-diligence pass:</text>
  <g font-size="11.5" fill="var(--color-text-primary, #141413)">
    <circle cx="79" cy="414" r="2.6" fill="#1F9D57"/><text x="92" y="418"><tspan font-weight="700">promote</tspan> → becomes a standalone standard</text>
    <circle cx="79" cy="438" r="2.6" fill="#8a8a85"/><text x="92" y="442"><tspan font-weight="700">not_promote</tspan> → absorbed by a sibling / no distinct content</text>
    <circle cx="79" cy="462" r="2.6" fill="#EF9F27"/><text x="92" y="466"><tspan font-weight="700">pending</tspan> → not yet reviewed</text>
  </g>
  <text x="72" y="500" font-size="11" fill="var(--color-text-secondary, #3d3d3a)">AWS defines the subject matter; our standard adds the</text>
  <text x="72" y="514" font-size="11" fill="var(--color-text-secondary, #3d3d3a)">WHERE / WHO / WHEN / HOW-you-prove-it.</text>

  <!-- ===== RIGHT — THE DECISION + ART 15 MAP ===== -->
  <rect x="490" y="96" width="430" height="440" rx="14" fill="var(--color-background-primary, #ffffff)" stroke="#EF9F27" stroke-width="1.6"/>
  <rect x="490" y="96" width="430" height="6" rx="3" fill="#EF9F27"/>
  <text x="512" y="128" font-size="13" font-weight="700" letter-spacing="0.5" fill="#854F0B">THE DECISION — PER BEST PRACTICE</text>
  <text x="512" y="146" font-size="11.5" fill="var(--color-text-secondary, #3d3d3a)">Every BP lands one of two ways</text>
  <line x1="512" y1="156" x2="898" y2="156" stroke="var(--color-border-secondary, rgba(31,30,29,0.18))" stroke-width="1"/>

  <rect x="512" y="170" width="386" height="34" rx="9" fill="#E7F6EE" stroke="#1F9D57" stroke-width="1.2"/>
  <text x="530" y="191" font-size="12" font-weight="700" fill="#157F45">✓ Covered by a Lens step → anchor to it</text>
  <rect x="512" y="212" width="386" height="34" rx="9" fill="#FCEFEF" stroke="#E24B4A" stroke-width="1.2"/>
  <text x="530" y="233" font-size="12" font-weight="700" fill="#A32D2D">✕ No analogue → new standard, mapping_state "na"</text>

  <text x="512" y="278" font-size="12" font-weight="700" letter-spacing="0.4" fill="#545450">ART 15 · B1–B6 CROSSWALKED</text>
  <g font-size="12.5">
    <rect x="512" y="292" width="386" height="40" rx="9" fill="#F3FAF5" stroke="#1F9D57" stroke-width="1"/>
    <text x="530" y="317" fill="var(--color-text-primary, #141413)"><tspan font-weight="700">B1 · B3 · B5 · B6</tspan>  →  <tspan font-weight="700" fill="#157F45">GENSEC04</tspan> (anchor)</text>
    <rect x="512" y="340" width="386" height="40" rx="9" fill="#F1F7FD" stroke="#378ADD" stroke-width="1"/>
    <text x="530" y="365" fill="var(--color-text-primary, #141413)"><tspan font-weight="700">B4</tspan>  →  <tspan font-weight="700" fill="#185FA5">P21 · Identity &amp; Access</tspan> (anchor)</text>
    <rect x="512" y="388" width="386" height="40" rx="9" fill="#FDF2F2" stroke="#E24B4A" stroke-width="1.4"/>
    <text x="530" y="413" fill="var(--color-text-primary, #141413)"><tspan font-weight="700">B2</tspan> (indirect / RAG injection)  →  <tspan font-weight="700" fill="#A32D2D">GAP → new "na"</tspan></text>
  </g>
  <text x="512" y="456" font-size="11.5" fill="var(--color-text-secondary, #3d3d3a)">The Lens covers direct user injection under Prompt Security;</text>
  <text x="512" y="472" font-size="11.5" fill="var(--color-text-secondary, #3d3d3a)">indirect injection via retrieved / tool content has no clean BP —</text>
  <text x="512" y="488" font-size="11.5" fill="var(--color-text-secondary, #3d3d3a)">so B2 becomes the new standard written in Step 3.</text>

  <!-- ===== BOTTOM BANNER ===== -->
  <rect x="40" y="552" width="880" height="120" rx="12" fill="var(--color-background-secondary, #f7f6f3)" stroke="#7F77DD" stroke-width="1.4"/>
  <rect x="40" y="552" width="7" height="120" rx="3.5" fill="#7F77DD"/>
  <text x="480" y="590" text-anchor="middle" font-size="14.5" font-weight="700" fill="var(--color-text-primary, #141413)">Covered BPs anchor to the Lens; the gap becomes a new standard.</text>
  <text x="480" y="620" text-anchor="middle" font-size="12.5" fill="var(--color-text-secondary, #3d3d3a)">The gap is where the catalogue earns its keep — it extends beyond AWS (mapping_state "na").</text>
  <text x="480" y="646" text-anchor="middle" font-size="12.5" fill="var(--color-text-secondary, #3d3d3a)">AWS would place many such gaps in its separate Responsible AI Lens.</text>
</svg>
