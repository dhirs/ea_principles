<?xml version="1.0" standalone="no"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 720" font-family="var(--font-sans), 'Anthropic Sans', sans-serif" role="img" aria-labelledby="ttl dsc" width="960" height="720">
  <title id="ttl">Worked example — EU AI Act obligations, keep vs drop</title>
  <desc id="dsc">System-level, GenAI-distinctive EU AI Act obligations become catalogue standards; org-level obligations and generic infosec are dropped to ISO 42001 / Governance or already covered.</desc>

  <text x="480" y="46" text-anchor="middle" font-size="24" font-weight="700" fill="var(--color-text-primary, #141413)">Worked Example — EU AI Act: Keep vs Drop</text>
  <text x="480" y="72" text-anchor="middle" font-size="14" fill="var(--color-text-secondary, #3d3d3a)">Filtering high-risk obligations into catalogue standards</text>

  <!-- ===== LEFT — KEEP ===== -->
  <g>
    <rect x="40" y="100" width="410" height="356" rx="14" fill="var(--color-background-primary, #ffffff)" stroke="#E24B4A" stroke-width="1.6"/>
    <rect x="40" y="100" width="410" height="6" rx="3" fill="#E24B4A"/>
    <circle cx="66" cy="134" r="12" fill="#1F7A46"/>
    <path d="M60 134 l4 4 l8 -8" fill="none" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="86" y="132" font-size="13.5" font-weight="700" letter-spacing="0.5" fill="#A32D2D">KEEP → BECOMES A STANDARD</text>
    <text x="86" y="149" font-size="11" fill="var(--color-text-secondary, #3d3d3a)">System-level &amp; GenAI-distinctive</text>
    <line x1="62" y1="166" x2="428" y2="166" stroke="var(--color-border-secondary, rgba(31,30,29,0.18))" stroke-width="1"/>
    <g fill="var(--color-text-primary, #141413)">
      <text x="62" y="196" font-size="12.5" font-weight="700" fill="#A32D2D">Art 12 · Record-keeping</text>
      <text x="62" y="214" font-size="12">→ Trace every prompt, retrieval &amp; output</text>
      <text x="62" y="252" font-size="12.5" font-weight="700" fill="#A32D2D">Art 13 · Transparency</text>
      <text x="62" y="270" font-size="12">→ Disclose AI use; outputs cite their sources</text>
      <text x="62" y="308" font-size="12.5" font-weight="700" fill="#A32D2D">Art 14 · Human oversight</text>
      <text x="62" y="326" font-size="12">→ High-risk actions need human sign-off</text>
      <text x="62" y="364" font-size="12.5" font-weight="700" fill="#A32D2D">Art 15 · Accuracy &amp; robustness</text>
      <text x="62" y="382" font-size="12">→ Grounding gate: answers backed by context</text>
    </g>
    <text x="62" y="428" font-size="12.5" font-style="italic" font-weight="700" fill="#A32D2D">Each earns a gated standard in the catalogue.</text>
  </g>

  <!-- ===== RIGHT — DROP ===== -->
  <g>
    <rect x="510" y="100" width="410" height="356" rx="14" fill="var(--color-background-primary, #ffffff)" stroke="#7F77DD" stroke-width="1.6"/>
    <rect x="510" y="100" width="410" height="6" rx="3" fill="#7F77DD"/>
    <circle cx="536" cy="134" r="12" fill="#6B6B66"/>
    <path d="M531 129 l10 10 M541 129 l-10 10" fill="none" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round"/>
    <text x="556" y="132" font-size="13.5" font-weight="700" letter-spacing="0.5" fill="#544BB5">DROP → NOT A STANDARD</text>
    <text x="556" y="149" font-size="11" fill="var(--color-text-secondary, #3d3d3a)">Org-level, or already covered</text>
    <line x1="532" y1="166" x2="898" y2="166" stroke="var(--color-border-secondary, rgba(31,30,29,0.18))" stroke-width="1"/>
    <g fill="var(--color-text-primary, #141413)">
      <text x="532" y="196" font-size="12.5" font-weight="700" fill="#544BB5">Art 11 · Technical documentation</text>
      <text x="532" y="214" font-size="12">→ ISO 42001 (Governance owns it)</text>
      <text x="532" y="252" font-size="12.5" font-weight="700" fill="#544BB5">Art 17 · Quality management system</text>
      <text x="532" y="270" font-size="12">→ ISO 42001 / Governance process</text>
      <text x="532" y="308" font-size="12.5" font-weight="700" fill="#544BB5">Art 43 &amp; 49 · Conformity + registration</text>
      <text x="532" y="326" font-size="12">→ Governance process, not code</text>
      <text x="532" y="364" font-size="12.5" font-weight="700" fill="#544BB5">Art 15 · Encryption, access control</text>
      <text x="532" y="382" font-size="12">→ Generic infosec, already covered</text>
    </g>
    <text x="532" y="428" font-size="12.5" font-style="italic" font-weight="700" fill="#544BB5">Each belongs to Governance, not EA.</text>
  </g>

  <!-- ===== SPLIT CALLOUT / BANNER ===== -->
  <rect x="40" y="482" width="880" height="128" rx="12" fill="var(--color-background-secondary, #f7f6f3)" stroke="#7F77DD" stroke-width="1.4"/>
  <rect x="40" y="482" width="7" height="128" rx="3.5" fill="#7F77DD"/>
  <text x="480" y="522" text-anchor="middle" font-size="15" font-weight="700" fill="var(--color-text-primary, #141413)">One article can split in two.</text>
  <text x="480" y="552" text-anchor="middle" font-size="13" fill="var(--color-text-primary, #141413)">Art 15 → <tspan font-weight="700" fill="#A32D2D">keep</tspan> the grounding gate (GenAI-distinctive)  ·  <tspan font-weight="700" fill="#544BB5">drop</tspan> the generic cybersecurity (already covered)</text>
  <text x="480" y="584" text-anchor="middle" font-size="12.5" fill="var(--color-text-secondary, #3d3d3a)">Filter by the control, not the article: keep what a model implements and is unique to GenAI.</text>

  <text x="480" y="646" text-anchor="middle" font-size="11" fill="var(--color-text-secondary, #3d3d3a)">Article references: EU AI Act, Chapter III (high-risk AI systems).</text>
</svg>
