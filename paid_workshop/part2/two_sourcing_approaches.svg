<?xml version="1.0" standalone="no"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 720" font-family="var(--font-sans), 'Anthropic Sans', sans-serif" role="img" aria-labelledby="ttl dsc" width="960" height="720">
  <title id="ttl">Same catalogue, two different sourcing approaches</title>
  <desc id="dsc">Cost and Customer Experience standards are org-specific and authored from first principles; Legal and Compliance standards are inherited from external regulation and derived into testable controls.</desc>

  <text x="480" y="46" text-anchor="middle" font-size="25" font-weight="700" fill="var(--color-text-primary, #141413)">Same Catalogue, Two Sourcing Approaches</text>
  <text x="480" y="72" text-anchor="middle" font-size="14" fill="var(--color-text-secondary, #3d3d3a)">Only one of the three categories comes with an external source of truth</text>

  <!-- ===== LEFT — COST & CX (bespoke) ===== -->
  <g>
    <rect x="60" y="100" width="400" height="440" rx="14" fill="var(--color-background-primary, #ffffff)" stroke="#378ADD" stroke-width="1.6"/>
    <rect x="60" y="100" width="400" height="6" rx="3" fill="#378ADD"/>
    <text x="84" y="138" font-size="13" font-weight="700" letter-spacing="0.8" fill="#185FA5">COST &amp; CUSTOMER EXPERIENCE</text>
    <rect x="84" y="150" width="108" height="21" rx="10.5" fill="#EFF5FC" stroke="#378ADD" stroke-width="1"/>
    <text x="138" y="164.5" text-anchor="middle" font-size="10.5" font-weight="700" letter-spacing="0.6" fill="#185FA5">ORG-SPECIFIC</text>
    <text x="84" y="204" font-size="19" font-weight="700" fill="var(--color-text-primary, #141413)">You set the bar</text>
    <line x1="84" y1="222" x2="436" y2="222" stroke="var(--color-border-secondary, rgba(31,30,29,0.18))" stroke-width="1"/>
    <g font-size="12.5" fill="var(--color-text-primary, #141413)">
      <circle cx="91" cy="248" r="2.6" fill="#378ADD"/><text x="104" y="252">No external authority defines "good"</text>
      <circle cx="91" cy="274" r="2.6" fill="#378ADD"/><text x="104" y="278">Set by your traffic, margins, model mix, tone</text>
      <circle cx="91" cy="300" r="2.6" fill="#378ADD"/><text x="104" y="304">Reckless for one workload, trivial for another</text>
    </g>
    <rect x="76" y="330" width="368" height="194" rx="10" fill="#EFF5FC"/>
    <text x="94" y="360" font-size="11" font-weight="700" letter-spacing="1" fill="#185FA5">APPROACH · AUTHORED</text>
    <g font-size="12.5" fill="var(--color-text-primary, #141413)">
      <circle cx="99" cy="388" r="2.6" fill="#378ADD"/><text x="112" y="392">Built from first principles + heuristics</text>
      <circle cx="99" cy="414" r="2.6" fill="#378ADD"/><text x="112" y="418">Lens shapes the build, not where your line sits</text>
    </g>
    <text x="94" y="472" font-size="14" font-weight="700" font-style="italic" fill="#185FA5">Built, not adopted.</text>
  </g>

  <!-- ===== RIGHT — LEGAL & COMPLIANCE (inherited) ===== -->
  <g>
    <rect x="500" y="100" width="400" height="440" rx="14" fill="var(--color-background-primary, #ffffff)" stroke="#E24B4A" stroke-width="1.6"/>
    <rect x="500" y="100" width="400" height="6" rx="3" fill="#E24B4A"/>
    <text x="524" y="138" font-size="13" font-weight="700" letter-spacing="0.8" fill="#A32D2D">LEGAL &amp; COMPLIANCE</text>
    <rect x="524" y="150" width="118" height="21" rx="10.5" fill="#FCEFEF" stroke="#E24B4A" stroke-width="1"/>
    <text x="583" y="164.5" text-anchor="middle" font-size="10.5" font-weight="700" letter-spacing="0.6" fill="#A32D2D">EXTERNALLY SET</text>
    <text x="524" y="204" font-size="19" font-weight="700" fill="var(--color-text-primary, #141413)">The bar is set for you</text>
    <line x1="524" y1="222" x2="876" y2="222" stroke="var(--color-border-secondary, rgba(31,30,29,0.18))" stroke-width="1"/>
    <g font-size="12.5" fill="var(--color-text-primary, #141413)">
      <circle cx="531" cy="248" r="2.6" fill="#E24B4A"/><text x="544" y="252">You don't get to invent the baseline</text>
      <circle cx="531" cy="274" r="2.6" fill="#E24B4A"/><text x="544" y="278">Inherited from what creates liability</text>
      <circle cx="531" cy="300" r="2.6" fill="#E24B4A"/><text x="544" y="304">EU AI Act, GDPR, FCA, sector regs</text>
    </g>
    <rect x="516" y="330" width="368" height="194" rx="10" fill="#FCEFEF"/>
    <text x="534" y="360" font-size="11" font-weight="700" letter-spacing="1" fill="#A32D2D">APPROACH · DERIVED</text>
    <g font-size="12.5" fill="var(--color-text-primary, #141413)">
      <circle cx="539" cy="388" r="2.6" fill="#E24B4A"/><text x="552" y="392">Trace each obligation to a testable standard</text>
      <circle cx="539" cy="414" r="2.6" fill="#E24B4A"/><text x="552" y="418">Governance owns "what", EA owns "how"</text>
    </g>
    <text x="534" y="472" font-size="14" font-weight="700" font-style="italic" fill="#A32D2D">Derived, not authored.</text>
  </g>

  <!-- ===== BOTTOM BANNER ===== -->
  <rect x="60" y="562" width="840" height="96" rx="12" fill="var(--color-background-secondary, #f7f6f3)" stroke="#7F77DD" stroke-width="1.4"/>
  <rect x="60" y="562" width="7" height="96" rx="3.5" fill="#7F77DD"/>
  <text x="480" y="600" text-anchor="middle" font-size="14.5" font-weight="700" fill="var(--color-text-primary, #141413)">Cost &amp; CX you iterate on — you own the bar.</text>
  <text x="480" y="628" text-anchor="middle" font-size="14.5" font-weight="700" fill="var(--color-text-primary, #141413)">Legal you inherit — non-negotiable, and where catalogue-building begins.</text>
</svg>
