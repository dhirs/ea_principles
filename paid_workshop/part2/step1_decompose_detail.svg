<?xml version="1.0" standalone="no"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 760" font-family="var(--font-sans), 'Anthropic Sans', sans-serif" role="img" aria-labelledby="ttl dsc" width="1280" height="760">
  <title id="ttl">Step 1 — Decompose the control into best practices</title>
  <desc id="dsc">The control is decomposed into testable best practices, sourced from OWASP Top 10 for LLM Apps, MITRE ATLAS, and the NIST GenAI Profile — not ISO 42001. Art 15 yields six best practices B1 to B6. A comparison table shows the different job each source framework does.</desc>

  <text x="640" y="42" text-anchor="middle" font-size="24" font-weight="700" fill="var(--color-text-primary, #141413)"><tspan fill="#378ADD">Step 1 · Decompose</tspan> — Break the Control into Best Practices</text>
  <text x="640" y="67" text-anchor="middle" font-size="13.5" fill="var(--color-text-secondary, #3d3d3a)">Turn the legal "must" into testable, enforceable BP statements</text>

  <!-- input pill -->
  <rect x="40" y="82" width="1200" height="40" rx="10" fill="#FCEFEF" stroke="#E24B4A" stroke-width="1.3"/>
  <rect x="56" y="92" width="60" height="20" rx="10" fill="#E24B4A"/><text x="86" y="106" text-anchor="middle" font-size="10.5" font-weight="700" fill="#ffffff">INPUT</text>
  <text x="130" y="107" font-size="12.5" font-weight="700" fill="var(--color-text-primary, #141413)">Art 15 — "the system must resist prompt injection &amp; jailbreaks"</text>

  <!-- ===== LEFT — SOURCE FRAMEWORKS ===== -->
  <rect x="40" y="136" width="600" height="340" rx="14" fill="var(--color-background-primary, #ffffff)" stroke="#378ADD" stroke-width="1.6"/>
  <rect x="40" y="136" width="600" height="6" rx="3" fill="#378ADD"/>
  <text x="62" y="168" font-size="13" font-weight="700" letter-spacing="0.5" fill="#185FA5">SOURCE FRAMEWORKS</text>
  <text x="62" y="186" font-size="11.5" fill="var(--color-text-secondary, #3d3d3a)">System-level technical frameworks the decomposition draws on</text>
  <line x1="62" y1="196" x2="618" y2="196" stroke="var(--color-border-secondary, rgba(31,30,29,0.18))" stroke-width="1"/>

  <g>
    <text x="62" y="224" font-size="13.5" font-weight="700" fill="var(--color-text-primary, #141413)">OWASP Top 10 for LLM Apps</text>
    <text x="62" y="244" font-size="11.5" fill="var(--color-text-secondary, #3d3d3a)">The common LLM failure classes — prompt injection, insecure</text>
    <text x="62" y="260" font-size="11.5" fill="var(--color-text-secondary, #3d3d3a)">output handling, excessive agency.</text>

    <text x="62" y="296" font-size="13.5" font-weight="700" fill="var(--color-text-primary, #141413)">MITRE ATLAS</text>
    <text x="62" y="316" font-size="11.5" fill="var(--color-text-secondary, #3d3d3a)">Adversarial ML tactics &amp; techniques — the "ATT&amp;CK"</text>
    <text x="62" y="332" font-size="11.5" fill="var(--color-text-secondary, #3d3d3a)">catalogue for attacks on AI systems.</text>

    <text x="62" y="368" font-size="13.5" font-weight="700" fill="var(--color-text-primary, #141413)">NIST GenAI Profile (AI 600-1)</text>
    <text x="62" y="388" font-size="11.5" fill="var(--color-text-secondary, #3d3d3a)">Risk-management actions specific to generative AI, mapped</text>
    <text x="62" y="404" font-size="11.5" fill="var(--color-text-secondary, #3d3d3a)">to the NIST AI RMF functions.</text>
  </g>
  <rect x="56" y="426" width="568" height="40" rx="10" fill="#FCEFEF"/>
  <text x="72" y="445" font-size="12" font-weight="700" fill="#A32D2D">Not ISO 42001.</text>
  <text x="188" y="445" font-size="11.5" fill="var(--color-text-primary, #141413)">The org-level management layer Governance already owns — it drags the work up a level.</text>

  <!-- ===== RIGHT — OUTPUT: BEST PRACTICES ===== -->
  <rect x="680" y="136" width="560" height="340" rx="14" fill="var(--color-background-primary, #ffffff)" stroke="#378ADD" stroke-width="1.6"/>
  <rect x="680" y="136" width="560" height="6" rx="3" fill="#378ADD"/>
  <text x="702" y="168" font-size="13" font-weight="700" letter-spacing="0.5" fill="#185FA5">OUTPUT · SIX BEST PRACTICES</text>
  <text x="702" y="186" font-size="11.5" fill="var(--color-text-secondary, #3d3d3a)">Each is a testable, enforceable control statement</text>
  <line x1="702" y1="196" x2="1218" y2="196" stroke="var(--color-border-secondary, rgba(31,30,29,0.18))" stroke-width="1"/>

  <g font-size="12.5" fill="var(--color-text-primary, #141413)">
    <circle cx="712" cy="228" r="10" fill="#EAF3FC"/><text x="712" y="232" text-anchor="middle" font-size="10" font-weight="700" fill="#185FA5">B1</text><text x="732" y="232">Instruction hierarchy enforced</text>
    <circle cx="712" cy="278" r="10" fill="#EAF3FC"/><text x="712" y="282" text-anchor="middle" font-size="10" font-weight="700" fill="#185FA5">B2</text><text x="732" y="276">Sanitise untrusted input —</text><text x="732" y="292">incl. indirect / RAG injection</text>
    <circle cx="712" cy="328" r="10" fill="#EAF3FC"/><text x="712" y="332" text-anchor="middle" font-size="10" font-weight="700" fill="#185FA5">B3</text><text x="732" y="332">Output constrained to a schema / allow-list</text>
    <circle cx="712" cy="372" r="10" fill="#EAF3FC"/><text x="712" y="376" text-anchor="middle" font-size="10" font-weight="700" fill="#185FA5">B4</text><text x="732" y="376">Downstream tools run least-privilege</text>
    <circle cx="712" cy="416" r="10" fill="#EAF3FC"/><text x="712" y="420" text-anchor="middle" font-size="10" font-weight="700" fill="#185FA5">B5</text><text x="732" y="420">Adversarial red-team passes before deploy</text>
    <circle cx="712" cy="454" r="10" fill="#EAF3FC"/><text x="712" y="458" text-anchor="middle" font-size="10" font-weight="700" fill="#185FA5">B6</text><text x="732" y="458">Injection attempts detected &amp; logged at runtime</text>
  </g>

  <!-- ===== COMPARISON TABLE — the work behind decompose ===== -->
  <text x="640" y="494" text-anchor="middle" font-size="13.5" font-weight="700" fill="var(--color-text-primary, #141413)">The work behind decompose — three frameworks, three different jobs</text>

  <rect x="40" y="504" width="1200" height="204" rx="12" fill="var(--color-background-primary, #ffffff)" stroke="#378ADD" stroke-width="1.6"/>
  <rect x="40" y="504" width="1200" height="6" rx="3" fill="#378ADD"/>

  <!-- header band -->
  <rect x="200" y="510" width="1040" height="42" fill="#EAF3FC"/>
  <!-- label column shade -->
  <rect x="40" y="552" width="160" height="156" fill="var(--color-background-secondary, #f7f6f3)"/>

  <!-- column dividers -->
  <line x1="200" y1="510" x2="200" y2="708" stroke="var(--color-border-secondary, rgba(31,30,29,0.18))" stroke-width="1"/>
  <line x1="547" y1="510" x2="547" y2="708" stroke="var(--color-border-secondary, rgba(31,30,29,0.18))" stroke-width="1"/>
  <line x1="894" y1="510" x2="894" y2="708" stroke="var(--color-border-secondary, rgba(31,30,29,0.18))" stroke-width="1"/>
  <!-- row dividers -->
  <line x1="40" y1="552" x2="1240" y2="552" stroke="var(--color-border-secondary, rgba(31,30,29,0.28))" stroke-width="1.1"/>
  <line x1="40" y1="591" x2="1240" y2="591" stroke="var(--color-border-secondary, rgba(31,30,29,0.14))" stroke-width="1"/>
  <line x1="40" y1="630" x2="1240" y2="630" stroke="var(--color-border-secondary, rgba(31,30,29,0.14))" stroke-width="1"/>
  <line x1="40" y1="669" x2="1240" y2="669" stroke="var(--color-border-secondary, rgba(31,30,29,0.14))" stroke-width="1"/>

  <!-- header cells -->
  <g text-anchor="middle">
    <text x="373" y="530" font-size="12.5" font-weight="700" fill="#185FA5">OWASP LLM Top 10</text>
    <text x="373" y="546" font-size="10.5" fill="var(--color-text-secondary, #3d3d3a)">top-10 risk list</text>
    <text x="720" y="530" font-size="12.5" font-weight="700" fill="#185FA5">MITRE ATLAS</text>
    <text x="720" y="546" font-size="10.5" fill="var(--color-text-secondary, #3d3d3a)">attack-technique matrix</text>
    <text x="1067" y="530" font-size="12.5" font-weight="700" fill="#185FA5">NIST GenAI 600-1</text>
    <text x="1067" y="546" font-size="10.5" fill="var(--color-text-secondary, #3d3d3a)">risk-management profile</text>
  </g>

  <!-- row labels -->
  <g font-size="11.5" font-weight="700" fill="var(--color-text-primary, #141413)">
    <text x="52" y="576">Answers</text>
    <text x="52" y="615">Perspective</text>
    <text x="52" y="654">Unit</text>
    <text x="52" y="693">Role in Step 1</text>
  </g>

  <!-- cells -->
  <g font-size="11.5" fill="var(--color-text-primary, #141413)">
    <!-- Answers -->
    <text x="214" y="576">What tends to go wrong?</text>
    <text x="561" y="576">How would an attacker do it?</text>
    <text x="908" y="576">What must the org do?</text>
    <!-- Perspective -->
    <text x="214" y="615">Defender / app builder</text>
    <text x="561" y="615">Attacker / red team</text>
    <text x="908" y="615">Governance / risk manager</text>
    <!-- Unit -->
    <text x="214" y="654">Risk class (LLM01–LLM10)</text>
    <text x="561" y="654">Tactic → technique + case study</text>
    <text x="908" y="654">Risk category → RMF action</text>
    <!-- Role -->
    <text x="214" y="693" font-weight="700" fill="#185FA5">Names the failure class</text>
    <text x="561" y="693" font-weight="700" fill="#185FA5">Supplies the attack to test</text>
    <text x="908" y="693" font-weight="700" fill="#185FA5">Supplies mitigation + audit</text>
  </g>

  <!-- worked-example footer -->
  <rect x="40" y="716" width="1200" height="38" rx="10" fill="var(--color-background-secondary, #f7f6f3)" stroke="#7F77DD" stroke-width="1.4"/>
  <rect x="40" y="716" width="7" height="38" rx="3.5" fill="#7F77DD"/>
  <text x="643" y="740" text-anchor="middle" font-size="11.5" fill="var(--color-text-primary, #141413)"><tspan font-weight="700">Worked example · indirect prompt injection:  </tspan>OWASP LLM01 names it  →  ATLAS gives the RAG-poisoning attack  →  NIST prescribes adversarial testing + logging</text>
</svg>
