<?xml version="1.0" standalone="no"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 720" font-family="var(--font-sans), 'Anthropic Sans', sans-serif" role="img" aria-labelledby="ttl dsc" width="960" height="720">
  <title id="ttl">Worked example — converting Art 15 into a concrete standard</title>
  <desc id="dsc">Art 15 (resist prompt injection) decomposes into six best practices; four anchor to the Lens GENSEC04, one to IAM P21, and the indirect-injection gap B2 becomes a new standard ST-GENSEC04-12 with a gate and evidence.</desc>

  <text x="480" y="42" text-anchor="middle" font-size="23" font-weight="700" fill="var(--color-text-primary, #141413)">Worked Example — Art 15 → a Concrete Standard</text>
  <text x="480" y="66" text-anchor="middle" font-size="13.5" fill="var(--color-text-secondary, #3d3d3a)">One obligation, decomposed and crosswalked, becomes a gated catalogue standard</text>

  <!-- ===== OBLIGATION RIBBON ===== -->
  <rect x="40" y="82" width="880" height="52" rx="12" fill="#FCEFEF" stroke="#E24B4A" stroke-width="1.5"/>
  <rect x="40" y="82" width="7" height="52" rx="3.5" fill="#E24B4A"/>
  <rect x="62" y="97" width="66" height="22" rx="11" fill="#E24B4A"/>
  <text x="95" y="112" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">ART 15</text>
  <text x="142" y="104" font-size="10.5" font-weight="700" letter-spacing="0.7" fill="#A32D2D">STARTING POINT — THE OBLIGATION EA RECEIVES (a legal "must")</text>
  <text x="142" y="124" font-size="13" font-weight="700" fill="var(--color-text-primary, #141413)">"The system must resist prompt injection &amp; jailbreaks"</text>

  <!-- ===== LEFT — DECOMPOSE + CROSSWALK ===== -->
  <rect x="40" y="150" width="468" height="378" rx="14" fill="var(--color-background-primary, #ffffff)" stroke="#378ADD" stroke-width="1.6"/>
  <rect x="40" y="150" width="468" height="6" rx="3" fill="#378ADD"/>
  <text x="62" y="182" font-size="13" font-weight="700" letter-spacing="0.5" fill="#185FA5">STEPS 1·2 — DECOMPOSE → CROSSWALK</text>
  <text x="62" y="200" font-size="11.5" fill="var(--color-text-secondary, #3d3d3a)">Six best practices, each mapped to the AWS GenAI Lens</text>
  <line x1="62" y1="210" x2="486" y2="210" stroke="var(--color-border-secondary, rgba(31,30,29,0.18))" stroke-width="1"/>

  <g font-size="12" fill="var(--color-text-primary, #141413)">
    <text x="62" y="240"><tspan font-weight="700">B1</tspan>  Instruction hierarchy enforced</text>
    <text x="62" y="282"><tspan font-weight="700">B2</tspan>  Sanitise indirect / RAG injection</text>
    <text x="62" y="324"><tspan font-weight="700">B3</tspan>  Output constrained to a schema</text>
    <text x="62" y="366"><tspan font-weight="700">B4</tspan>  Tools run least-privilege</text>
    <text x="62" y="408"><tspan font-weight="700">B5</tspan>  Adversarial red-team pre-deploy</text>
    <text x="62" y="450"><tspan font-weight="700">B6</tspan>  Runtime detection + logging</text>
  </g>

  <!-- crosswalk badges -->
  <g font-size="11" font-weight="700" text-anchor="middle">
    <rect x="360" y="226" width="126" height="22" rx="11" fill="#E7F6EE" stroke="#1F9D57" stroke-width="1"/><text x="423" y="241" fill="#157F45">GENSEC04</text>
    <rect x="360" y="268" width="126" height="22" rx="11" fill="#FCEFEF" stroke="#E24B4A" stroke-width="1.4"/><text x="423" y="283" fill="#A32D2D">GAP → new</text>
    <rect x="360" y="310" width="126" height="22" rx="11" fill="#E7F6EE" stroke="#1F9D57" stroke-width="1"/><text x="423" y="325" fill="#157F45">GENSEC04</text>
    <rect x="360" y="352" width="126" height="22" rx="11" fill="#EAF3FC" stroke="#378ADD" stroke-width="1"/><text x="423" y="367" fill="#185FA5">P21 · IAM</text>
    <rect x="360" y="394" width="126" height="22" rx="11" fill="#E7F6EE" stroke="#1F9D57" stroke-width="1"/><text x="423" y="409" fill="#157F45">GENSEC04</text>
    <rect x="360" y="436" width="126" height="22" rx="11" fill="#E7F6EE" stroke="#1F9D57" stroke-width="1"/><text x="423" y="451" fill="#157F45">GENSEC04</text>
  </g>

  <!-- legend -->
  <g font-size="10.5" fill="var(--color-text-secondary, #3d3d3a)">
    <circle cx="66" cy="494" r="4" fill="#1F9D57"/><text x="76" y="498">Lens anchor</text>
    <circle cx="176" cy="494" r="4" fill="#378ADD"/><text x="186" y="498">IAM anchor</text>
    <circle cx="286" cy="494" r="4" fill="#E24B4A"/><text x="296" y="498">gap → new standard</text>
  </g>

  <!-- gap connector to the standard -->
  <g fill="#E24B4A" stroke="#E24B4A">
    <line x1="490" y1="279" x2="524" y2="279" stroke-width="2.4"/><path d="M522 273 l11 6 l-11 6 z" stroke="none"/>
  </g>
  <text x="512" y="268" text-anchor="middle" font-size="10" font-weight="700" fill="#A32D2D">B2</text>

  <!-- ===== RIGHT — THE STANDARD ===== -->
  <rect x="530" y="150" width="390" height="378" rx="14" fill="var(--color-background-primary, #ffffff)" stroke="#E24B4A" stroke-width="1.8"/>
  <rect x="530" y="150" width="390" height="6" rx="3" fill="#E24B4A"/>
  <text x="548" y="182" font-size="10.5" font-weight="700" letter-spacing="0.6" fill="#A32D2D">STEPS 3·4 — WRITE + TAG · THE STANDARD</text>
  <text x="548" y="208" font-size="16" font-weight="700" font-family="var(--font-mono), ui-monospace, monospace" fill="var(--color-text-primary, #141413)">ST-GENSEC04-12</text>
  <g font-size="10.5" font-weight="700" text-anchor="middle">
    <rect x="548" y="218" width="150" height="22" rx="11" fill="#FCEFEF" stroke="#E24B4A" stroke-width="1"/><text x="623" y="233" fill="#A32D2D">mapping_state: na</text>
    <rect x="706" y="218" width="196" height="22" rx="11" fill="#E7F6EE" stroke="#1F9D57" stroke-width="1"/><text x="804" y="233" fill="#157F45">applies_to {LLM, agent}</text>
  </g>
  <line x1="548" y1="252" x2="902" y2="252" stroke="var(--color-border-secondary, rgba(31,30,29,0.18))" stroke-width="1"/>

  <text x="548" y="272" font-size="10.5" font-weight="700" letter-spacing="0.6" fill="#545450">STATEMENT</text>
  <g font-size="11.5" fill="var(--color-text-primary, #141413)">
    <text x="548" y="290">Retrieved &amp; tool-returned content is treated as</text>
    <text x="548" y="306">untrusted and sanitised before it enters the model</text>
    <text x="548" y="322">context — it cannot carry instructions that alter</text>
    <text x="548" y="338">system behaviour.</text>
  </g>

  <text x="548" y="364" font-size="10.5" font-weight="700" letter-spacing="0.6" fill="#A32D2D">GATE (pass / fail)</text>
  <g font-size="11.5" fill="var(--color-text-primary, #141413)">
    <text x="548" y="382">Red-team suite injects adversarial payloads into the</text>
    <text x="548" y="398">RAG corpus + tool responses; 0 instruction overrides</text>
    <text x="548" y="414">allowed to pass the deploy gate.</text>
  </g>

  <text x="548" y="440" font-size="10.5" font-weight="700" letter-spacing="0.6" fill="#545450">EVIDENCE</text>
  <g font-size="11.5" fill="var(--color-text-primary, #141413)">
    <text x="548" y="458">Red-team report + runtime injection-detection logs</text>
    <text x="548" y="474">(links B6).</text>
  </g>

  <text x="548" y="500" font-size="10.5" font-style="italic" fill="#8a8a85">Note: Lens covers direct injection; this extends it to indirect (RAG / tool).</text>

  <!-- ===== BOTTOM BANNER ===== -->
  <rect x="40" y="544" width="880" height="120" rx="12" fill="var(--color-background-secondary, #f7f6f3)" stroke="#7F77DD" stroke-width="1.4"/>
  <rect x="40" y="544" width="7" height="120" rx="3.5" fill="#7F77DD"/>
  <text x="480" y="582" text-anchor="middle" font-size="14.5" font-weight="700" fill="var(--color-text-primary, #141413)">Four BPs anchor to the Lens, one to IAM — the indirect-injection gap becomes a new standard.</text>
  <text x="480" y="612" text-anchor="middle" font-size="12.5" fill="var(--color-text-secondary, #3d3d3a)">The gap (B2) is exactly where the Lens stops and your catalogue earns its keep — recorded mapping_state "na".</text>
  <text x="480" y="640" text-anchor="middle" font-size="12.5" fill="var(--color-text-secondary, #3d3d3a)">Tagged {LLM, agent}: a pure ML model has no prompt, so it is excluded.</text>
</svg>
