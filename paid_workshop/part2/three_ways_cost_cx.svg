<?xml version="1.0" standalone="no"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 720" font-family="var(--font-sans), 'Anthropic Sans', sans-serif" role="img" aria-labelledby="ttl dsc" width="960" height="720">
  <title id="ttl">Three ways to build Cost and CX standards</title>
  <desc id="dsc">First principles (top-down), engineering best-practice frameworks such as the AWS GenAI Lens (scaffold), and production failures (bottom-up).</desc>

  <text x="480" y="46" text-anchor="middle" font-size="25" font-weight="700" fill="var(--color-text-primary, #141413)">Building Cost &amp; CX Standards — Three Ways</text>
  <text x="480" y="72" text-anchor="middle" font-size="14" fill="var(--color-text-secondary, #3d3d3a)">No external baseline hands you these — you source them yourself</text>

  <!-- ===== CARD 1 — FIRST PRINCIPLES ===== -->
  <g>
    <rect x="40" y="100" width="280" height="500" rx="14" fill="var(--color-background-primary, #ffffff)" stroke="#7F77DD" stroke-width="1.6"/>
    <rect x="40" y="100" width="280" height="6" rx="3" fill="#7F77DD"/>
    <circle cx="80" cy="150" r="18" fill="#7F77DD"/>
    <text x="80" y="156" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff">1</text>
    <text x="62" y="205" font-size="12.5" font-weight="700" letter-spacing="0.8" fill="#544BB5">FIRST PRINCIPLES</text>
    <text x="62" y="232" font-size="17" font-weight="700" fill="var(--color-text-primary, #141413)">Set your own bar</text>
    <line x1="62" y1="250" x2="298" y2="250" stroke="var(--color-border-secondary, rgba(31,30,29,0.18))" stroke-width="1"/>
    <g font-size="12" fill="var(--color-text-primary, #141413)">
      <circle cx="69" cy="282" r="2.4" fill="#7F77DD"/><text x="81" y="286">Start from margins, latency,</text><text x="81" y="303">brand voice, risk appetite</text>
      <circle cx="69" cy="333" r="2.4" fill="#7F77DD"/><text x="81" y="337">Reason forward from</text><text x="81" y="354">"what is good for us"</text>
      <circle cx="69" cy="384" r="2.4" fill="#7F77DD"/><text x="81" y="388">You write the threshold</text>
    </g>
    <rect x="56" y="556" width="248" height="28" rx="14" fill="#EEEDFA"/>
    <text x="180" y="574" text-anchor="middle" font-size="11" font-weight="700" letter-spacing="0.5" fill="#544BB5">TOP-DOWN · AUTHORED</text>
  </g>

  <!-- ===== CARD 2 — BEST-PRACTICE FRAMEWORKS ===== -->
  <g>
    <rect x="340" y="100" width="280" height="500" rx="14" fill="var(--color-background-primary, #ffffff)" stroke="#378ADD" stroke-width="1.6"/>
    <rect x="340" y="100" width="280" height="6" rx="3" fill="#378ADD"/>
    <circle cx="380" cy="150" r="18" fill="#378ADD"/>
    <text x="380" y="156" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff">2</text>
    <text x="362" y="205" font-size="12.5" font-weight="700" letter-spacing="0.8" fill="#185FA5">BEST-PRACTICE FRAMEWORKS</text>
    <text x="362" y="232" font-size="17" font-weight="700" fill="var(--color-text-primary, #141413)">Adopt the pattern</text>
    <line x1="362" y1="250" x2="598" y2="250" stroke="var(--color-border-secondary, rgba(31,30,29,0.18))" stroke-width="1"/>
    <g font-size="12" fill="var(--color-text-primary, #141413)">
      <circle cx="369" cy="282" r="2.4" fill="#378ADD"/><text x="381" y="286">AWS GenAI Lens gives the</text><text x="381" y="303">proven shape of a control</text>
      <circle cx="369" cy="333" r="2.4" fill="#378ADD"/><text x="381" y="337">What to measure,</text><text x="381" y="354">what knobs exist</text>
      <circle cx="369" cy="384" r="2.4" fill="#378ADD"/><text x="381" y="388">Adopt the pattern,</text><text x="381" y="405">then set your number</text>
    </g>
    <rect x="356" y="556" width="248" height="28" rx="14" fill="#EAF3FC"/>
    <text x="480" y="574" text-anchor="middle" font-size="11" font-weight="700" letter-spacing="0.5" fill="#185FA5">ENGINEERING SCAFFOLD</text>
  </g>

  <!-- ===== CARD 3 — PRODUCTION FAILURES ===== -->
  <g>
    <rect x="640" y="100" width="280" height="500" rx="14" fill="var(--color-background-primary, #ffffff)" stroke="#EF9F27" stroke-width="1.6"/>
    <rect x="640" y="100" width="280" height="6" rx="3" fill="#EF9F27"/>
    <circle cx="680" cy="150" r="18" fill="#EF9F27"/>
    <text x="680" y="156" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff">3</text>
    <text x="662" y="205" font-size="12.5" font-weight="700" letter-spacing="0.8" fill="#854F0B">PRODUCTION FAILURES</text>
    <text x="662" y="232" font-size="17" font-weight="700" fill="var(--color-text-primary, #141413)">Learn from failures</text>
    <line x1="662" y1="250" x2="898" y2="250" stroke="var(--color-border-secondary, rgba(31,30,29,0.18))" stroke-width="1"/>
    <g font-size="12" fill="var(--color-text-primary, #141413)">
      <circle cx="669" cy="282" r="2.4" fill="#EF9F27"/><text x="681" y="286">Mine incidents, postmortems,</text><text x="681" y="303">near-misses</text>
      <circle cx="669" cy="333" r="2.4" fill="#EF9F27"/><text x="681" y="337">Each failure =</text><text x="681" y="354">a candidate standard</text>
      <circle cx="669" cy="384" r="2.4" fill="#EF9F27"/><text x="681" y="388">Evidence-driven,</text><text x="681" y="405">hard to argue with</text>
    </g>
    <rect x="656" y="556" width="248" height="28" rx="14" fill="#FDF1DD"/>
    <text x="780" y="574" text-anchor="middle" font-size="11" font-weight="700" letter-spacing="0.5" fill="#854F0B">BOTTOM-UP · EVIDENCE</text>
  </g>

  <!-- ===== BOTTOM BANNER ===== -->
  <rect x="40" y="626" width="880" height="62" rx="12" fill="var(--color-background-secondary, #f7f6f3)" stroke="#7F77DD" stroke-width="1.4"/>
  <rect x="40" y="626" width="7" height="62" rx="3.5" fill="#7F77DD"/>
  <text x="480" y="663" text-anchor="middle" font-size="14" font-weight="700" fill="var(--color-text-primary, #141413)">First principles is top-down, failures bottom-up — the Lens is the scaffold in between.</text>
</svg>
