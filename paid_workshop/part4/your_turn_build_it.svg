<?xml version="1.0" standalone="no"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" font-family="var(--font-sans), 'Anthropic Sans', sans-serif" role="img" aria-labelledby="ttl dsc" width="1280" height="720">
  <title id="ttl">Your Turn — Build the Standard You Selected</title>
  <desc id="dsc">The hands-on brief. Two tasks. Task 1: fill in all 12 taxonomy fields for the standard you selected — Statement, Problem, Solution, Maturity, Applicability, Criticality, Ownership, Change Control, Framework Mappings, and the two that carry it, Enforcement Gate and ARB Evidence, plus Reference Implementation. Task 2: develop the reference implementation, deciding who does what. The Central AI Factory builds it once for everyone — builds the validator, threshold table, entrypoint contract and shared SDK; operates versioning and the CI gate as a service; owns the standard, gate and evidence contract. Local project teams wire in, not rebuild — configure the entrypoint and adapter, populate project inputs, and consume the central gate in CI while producing ARB evidence. The interface contract is the standard.</desc>

  <!-- ============ HEADER ============ -->
  <text x="640" y="46" text-anchor="middle" font-size="26" font-weight="700" fill="var(--color-text-primary, #141413)">Your Turn — Build the Standard You Selected</text>
  <text x="640" y="72" text-anchor="middle" font-size="14" fill="var(--color-text-secondary, #3d3d3a)">Two tasks: fill in every taxonomy field, then develop the reference implementation — central builds, local wires in.</text>

  <!-- ============================================================ -->
  <!-- TASK 1 — FILL THE TAXONOMY (purple) -->
  <!-- ============================================================ -->
  <rect x="40" y="90" width="1200" height="206" rx="14" fill="var(--color-background-primary, #ffffff)" stroke="#7F77DD" stroke-width="1.6"/>
  <rect x="40" y="90" width="1200" height="6" rx="3" fill="#7F77DD"/>
  <circle cx="70" cy="124" r="16" fill="#7F77DD"/>
  <text x="70" y="124" text-anchor="middle" dominant-baseline="central" font-size="16" font-weight="700" fill="#ffffff">1</text>
  <text x="96" y="120" font-size="17" font-weight="700" fill="#544BB5">Fill in the taxonomy — every field</text>
  <text x="96" y="140" font-size="12" fill="var(--color-text-secondary, #3d3d3a)">Complete all 12 fields of the anatomy for the standard you selected — crowdsource each one, as a room.</text>

  <!-- 12 field chips: 2 rows of 6 -->
  <g font-size="10.5" font-weight="700" text-anchor="middle">
    <!-- row 1 -->
    <rect x="64" y="158" width="180" height="26" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1.1"/><text x="154" y="175" fill="#3C3489">Statement</text>
    <rect x="254" y="158" width="180" height="26" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1.1"/><text x="344" y="175" fill="#3C3489">Problem</text>
    <rect x="444" y="158" width="180" height="26" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1.1"/><text x="534" y="175" fill="#3C3489">Solution</text>
    <rect x="634" y="158" width="180" height="26" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1.1"/><text x="724" y="175" fill="#3C3489">Maturity Level</text>
    <rect x="824" y="158" width="180" height="26" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1.1"/><text x="914" y="175" fill="#3C3489">Applicability</text>
    <rect x="1014" y="158" width="180" height="26" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1.1"/><text x="1104" y="175" fill="#3C3489">Criticality</text>
    <!-- row 2 -->
    <rect x="64" y="194" width="180" height="26" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1.1"/><text x="154" y="211" fill="#3C3489">Ownership</text>
    <rect x="254" y="194" width="180" height="26" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1.1"/><text x="344" y="211" fill="#3C3489">Change Control</text>
    <rect x="444" y="194" width="180" height="26" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1.1"/><text x="534" y="211" fill="#3C3489">Framework Mappings</text>
    <rect x="634" y="194" width="180" height="26" rx="8" fill="#FDF1DD" stroke="#EF9F27" stroke-width="1.5"/><text x="724" y="211" fill="#854F0B">&#9733; Enforcement Gate</text>
    <rect x="824" y="194" width="180" height="26" rx="8" fill="#FDF1DD" stroke="#EF9F27" stroke-width="1.5"/><text x="914" y="211" fill="#854F0B">&#9733; ARB Evidence</text>
    <rect x="1014" y="194" width="180" height="26" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1.1"/><text x="1104" y="211" fill="#3C3489">Reference Impl.</text>
  </g>
  <text x="64" y="248" font-size="12" fill="var(--color-text-primary, #141413)"><tspan font-weight="700" fill="#854F0B">Don't skip the two gold fields</tspan> — Enforcement Gate (an objective pass/fail test) and ARB Evidence (what proves it passed). No gate, no standard — just a wish.</text>

  <!-- ============================================================ -->
  <!-- TASK 2 — DEVELOP THE REFERENCE IMPLEMENTATION (green) -->
  <!-- ============================================================ -->
  <rect x="40" y="312" width="1200" height="374" rx="14" fill="var(--color-background-primary, #ffffff)" stroke="#1D9E75" stroke-width="1.8"/>
  <rect x="40" y="312" width="1200" height="6" rx="3" fill="#1D9E75"/>
  <circle cx="70" cy="346" r="16" fill="#1D9E75"/>
  <text x="70" y="346" text-anchor="middle" dominant-baseline="central" font-size="16" font-weight="700" fill="#ffffff">2</text>
  <text x="96" y="342" font-size="17" font-weight="700" fill="#0F6E56">Develop the reference implementation</text>
  <text x="96" y="362" font-size="12" fill="var(--color-text-secondary, #3d3d3a)">Build once, wire in many — decide who does what across the two teams.</text>

  <!-- vertical divider -->
  <line x1="640" y1="384" x2="640" y2="596" stroke="#E1E6F2" stroke-width="1.2"/>

  <!-- LEFT — CENTRAL AI FACTORY -->
  <text x="64" y="406" font-size="15" font-weight="700" fill="#0F6E56">CENTRAL AI FACTORY</text>
  <text x="64" y="424" font-size="11" font-style="italic" fill="#8a8a85">build it once · for everyone</text>
  <text x="64" y="454" font-size="11" font-weight="700" letter-spacing="1.2" fill="#157F45">BUILDS</text>
  <text x="64" y="472" font-size="11.5" fill="var(--color-text-primary, #141413)">the validator, threshold table, entrypoint contract, shared SDK — the machine.</text>
  <text x="64" y="506" font-size="11" font-weight="700" letter-spacing="1.2" fill="#157F45">OPERATES</text>
  <text x="64" y="524" font-size="11.5" fill="var(--color-text-primary, #141413)">semver, N-1 support, patches; runs the CI gate as a service with an SLA.</text>
  <text x="64" y="558" font-size="11" font-weight="700" letter-spacing="1.2" fill="#157F45">OWNS</text>
  <text x="64" y="576" font-size="11.5" fill="var(--color-text-primary, #141413)">the standard, the gate, and the evidence contract.</text>

  <!-- RIGHT — LOCAL / PROJECT TEAMS -->
  <text x="668" y="406" font-size="15" font-weight="700" fill="#544BB5">LOCAL / PROJECT TEAMS</text>
  <text x="668" y="424" font-size="11" font-style="italic" fill="#8a8a85">wire in · don't rebuild</text>
  <text x="668" y="454" font-size="11" font-weight="700" letter-spacing="1.2" fill="#6A4BC7">CONFIGURES</text>
  <text x="668" y="472" font-size="11.5" fill="var(--color-text-primary, #141413)">routes every call through the one declared entrypoint; supplies config + adapter.</text>
  <text x="668" y="506" font-size="11" font-weight="700" letter-spacing="1.2" fill="#6A4BC7">POPULATES</text>
  <text x="668" y="524" font-size="11.5" fill="var(--color-text-primary, #141413)">project-specific inputs, scenarios, and data.</text>
  <text x="668" y="558" font-size="11" font-weight="700" letter-spacing="1.2" fill="#6A4BC7">CONSUMES</text>
  <text x="668" y="576" font-size="11.5" fill="var(--color-text-primary, #141413)">runs the central gate in CI, produces ARB evidence — doesn't fork the control.</text>

  <!-- bottom strip -->
  <line x1="64" y1="606" x2="1216" y2="606" stroke="#E1E6F2" stroke-width="1"/>
  <text x="640" y="632" text-anchor="middle" font-size="13.5" font-weight="700" fill="var(--color-text-primary, #141413)">The interface contract IS the standard — the gate proves compliance, it doesn't trust it.</text>
  <text x="640" y="656" text-anchor="middle" font-size="12" fill="var(--color-text-secondary, #3d3d3a)">Outcome: one concrete RI — owned by the Central AI Factory, enforced at CI/CD gates, fully auditable.</text>
</svg>
