<?xml version="1.0" standalone="no"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" font-family="var(--font-sans), 'Anthropic Sans', sans-serif" role="img" aria-labelledby="ttl dsc" width="1280" height="720">
  <title id="ttl">Part 4 — Hands-On Lab (agenda)</title>
  <desc id="dsc">The roadmap for Part 4. Five beats run left to right: (1) learn the 12-field anatomy of a standard, (2) put three candidates on the table — one per dimension, (3) score them on the Part 3 prioritization gate, (4) select the target, and (5) build it live, field by field, into one concrete gated auditable reference implementation. Beats 1 to 4 are sub-part 4.1 (select the standard); beat 5 is sub-part 4.2 (build it live). The whole room builds one standard together.</desc>

  <defs>
    <marker id="flow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ============ HEADER ============ -->
  <text x="640" y="46" text-anchor="middle" font-size="26" font-weight="700" fill="var(--color-text-primary, #141413)">Part 4 — Hands-On Lab</text>
  <text x="640" y="72" text-anchor="middle" font-size="14" fill="var(--color-text-secondary, #3d3d3a)">The room builds a standard together — the five-beat arc from taxonomy to a built, gated RI.</text>

  <!-- ============ SUB-PART BRACKETS ============ -->
  <!-- 4.1 over beats 1-4 -->
  <text x="516" y="112" text-anchor="middle" font-size="12" font-weight="700" letter-spacing="0.4" fill="#3A445C">4.1 · Select the standard</text>
  <path d="M40 130 L40 122 L992 122 L992 130" fill="none" stroke="#C7CDDA" stroke-width="1.3"/>
  <!-- 4.2 over beat 5 -->
  <text x="1136" y="112" text-anchor="middle" font-size="12" font-weight="700" letter-spacing="0.4" fill="#0F6E56">4.2 · Build it live</text>
  <path d="M1032 130 L1032 122 L1240 122 L1240 130" fill="none" stroke="#9FD8C6" stroke-width="1.3"/>

  <!-- ============ FLOW ARROWS (between cards) ============ -->
  <g stroke="#94A3B8" stroke-width="2.2">
    <line x1="253" y1="290" x2="283" y2="290" marker-end="url(#flow)"/>
    <line x1="501" y1="290" x2="531" y2="290" marker-end="url(#flow)"/>
    <line x1="749" y1="290" x2="779" y2="290" marker-end="url(#flow)"/>
    <line x1="997" y1="290" x2="1027" y2="290" marker-end="url(#flow)"/>
  </g>

  <!-- ============================================================ -->
  <!-- CARD 1 — ANATOMY (purple) -->
  <!-- ============================================================ -->
  <rect x="40" y="146" width="208" height="300" rx="14" fill="var(--color-background-primary, #ffffff)" stroke="#7F77DD" stroke-width="1.6"/>
  <rect x="40" y="146" width="208" height="6" rx="3" fill="#7F77DD"/>
  <circle cx="144" cy="192" r="22" fill="#7F77DD"/>
  <text x="144" y="192" text-anchor="middle" dominant-baseline="central" font-size="20" font-weight="700" fill="#ffffff">1</text>
  <text x="144" y="242" text-anchor="middle" font-size="15" font-weight="700" fill="#544BB5">Anatomy of</text>
  <text x="144" y="262" text-anchor="middle" font-size="15" font-weight="700" fill="#544BB5">a standard</text>
  <line x1="64" y1="280" x2="224" y2="280" stroke="#E1E6F2" stroke-width="1"/>
  <text x="144" y="306" text-anchor="middle" font-size="11" fill="var(--color-text-primary, #141413)">Learn the 12-field</text>
  <text x="144" y="324" text-anchor="middle" font-size="11" fill="var(--color-text-primary, #141413)">taxonomy — the metadata</text>
  <text x="144" y="342" text-anchor="middle" font-size="11" fill="var(--color-text-primary, #141413)">every standard carries.</text>
  <text x="144" y="424" text-anchor="middle" font-size="10.5" font-style="italic" fill="#8a8a85">the template</text>

  <!-- ============================================================ -->
  <!-- CARD 2 — THREE CANDIDATES (slate + tri dots) -->
  <!-- ============================================================ -->
  <rect x="288" y="146" width="208" height="300" rx="14" fill="var(--color-background-primary, #ffffff)" stroke="#B8C0CE" stroke-width="1.6"/>
  <rect x="288" y="146" width="208" height="6" rx="3" fill="#64748B"/>
  <circle cx="392" cy="192" r="22" fill="#64748B"/>
  <text x="392" y="192" text-anchor="middle" dominant-baseline="central" font-size="20" font-weight="700" fill="#ffffff">2</text>
  <text x="392" y="242" text-anchor="middle" font-size="15" font-weight="700" fill="#3A445C">Three</text>
  <text x="392" y="262" text-anchor="middle" font-size="15" font-weight="700" fill="#3A445C">candidates</text>
  <line x1="312" y1="280" x2="472" y2="280" stroke="#E1E6F2" stroke-width="1"/>
  <text x="392" y="306" text-anchor="middle" font-size="11" fill="var(--color-text-primary, #141413)">One per dimension on</text>
  <text x="392" y="324" text-anchor="middle" font-size="11" fill="var(--color-text-primary, #141413)">the table — see all</text>
  <text x="392" y="342" text-anchor="middle" font-size="11" fill="var(--color-text-primary, #141413)">three, build one.</text>
  <!-- tri-dimension dots -->
  <g>
    <circle cx="360" cy="374" r="5" fill="#E24B4A"/>
    <circle cx="392" cy="374" r="5" fill="#378ADD"/>
    <circle cx="424" cy="374" r="5" fill="#EF9F27"/>
  </g>
  <text x="392" y="398" text-anchor="middle" font-size="9" fill="#8a8a85">Legal &amp; Risk · CX · Cost</text>
  <text x="392" y="424" text-anchor="middle" font-size="10.5" font-style="italic" fill="#8a8a85">the three dimensions</text>

  <!-- ============================================================ -->
  <!-- CARD 3 — SCORE ON THE GATE (gold) -->
  <!-- ============================================================ -->
  <rect x="536" y="146" width="208" height="300" rx="14" fill="var(--color-background-primary, #ffffff)" stroke="#F0C877" stroke-width="1.6"/>
  <rect x="536" y="146" width="208" height="6" rx="3" fill="#EF9F27"/>
  <circle cx="640" cy="192" r="22" fill="#EF9F27"/>
  <text x="640" y="192" text-anchor="middle" dominant-baseline="central" font-size="20" font-weight="700" fill="#ffffff">3</text>
  <text x="640" y="242" text-anchor="middle" font-size="15" font-weight="700" fill="#854F0B">Score on</text>
  <text x="640" y="262" text-anchor="middle" font-size="15" font-weight="700" fill="#854F0B">the gate</text>
  <line x1="560" y1="280" x2="720" y2="280" stroke="#E1E6F2" stroke-width="1"/>
  <text x="640" y="306" text-anchor="middle" font-size="11" fill="var(--color-text-primary, #141413)">Rank them on the Part 3</text>
  <text x="640" y="324" text-anchor="middle" font-size="11" fill="var(--color-text-primary, #141413)">lens — <tspan font-weight="700" fill="#544BB5">worth &#9650;</tspan> weighed</text>
  <text x="640" y="342" text-anchor="middle" font-size="11" fill="var(--color-text-primary, #141413)">against <tspan font-weight="700" fill="#854F0B">cost &#9660;</tspan>.</text>
  <text x="640" y="424" text-anchor="middle" font-size="10.5" font-style="italic" fill="#8a8a85">callback to 3.1</text>

  <!-- ============================================================ -->
  <!-- CARD 4 — SELECT THE TARGET (red) -->
  <!-- ============================================================ -->
  <rect x="784" y="146" width="208" height="300" rx="14" fill="var(--color-background-primary, #ffffff)" stroke="#E24B4A" stroke-width="1.6"/>
  <rect x="784" y="146" width="208" height="6" rx="3" fill="#E24B4A"/>
  <circle cx="888" cy="192" r="22" fill="#E24B4A"/>
  <text x="888" y="192" text-anchor="middle" dominant-baseline="central" font-size="20" font-weight="700" fill="#ffffff">4</text>
  <text x="888" y="242" text-anchor="middle" font-size="15" font-weight="700" fill="#A32D2D">Select</text>
  <text x="888" y="262" text-anchor="middle" font-size="15" font-weight="700" fill="#A32D2D">the target</text>
  <line x1="808" y1="280" x2="968" y2="280" stroke="#E1E6F2" stroke-width="1"/>
  <text x="888" y="306" text-anchor="middle" font-size="11" fill="var(--color-text-primary, #141413)">Criticality gates the</text>
  <text x="888" y="324" text-anchor="middle" font-size="11" fill="var(--color-text-primary, #141413)">queue — the room picks</text>
  <text x="888" y="342" text-anchor="middle" font-size="11" fill="var(--color-text-primary, #141413)">one to build.</text>
  <text x="888" y="424" text-anchor="middle" font-size="10.5" font-style="italic" fill="#8a8a85">the winner</text>

  <!-- ============================================================ -->
  <!-- CARD 5 — BUILD IT LIVE (green) -->
  <!-- ============================================================ -->
  <rect x="1032" y="146" width="208" height="300" rx="14" fill="var(--color-background-primary, #ffffff)" stroke="#1D9E75" stroke-width="1.8"/>
  <rect x="1032" y="146" width="208" height="6" rx="3" fill="#1D9E75"/>
  <circle cx="1136" cy="192" r="22" fill="#1D9E75"/>
  <text x="1136" y="192" text-anchor="middle" dominant-baseline="central" font-size="20" font-weight="700" fill="#ffffff">5</text>
  <text x="1136" y="242" text-anchor="middle" font-size="15" font-weight="700" fill="#0F6E56">Build</text>
  <text x="1136" y="262" text-anchor="middle" font-size="15" font-weight="700" fill="#0F6E56">it live</text>
  <line x1="1056" y1="280" x2="1216" y2="280" stroke="#E1E6F2" stroke-width="1"/>
  <text x="1136" y="306" text-anchor="middle" font-size="11" fill="var(--color-text-primary, #141413)">Fill every field together</text>
  <text x="1136" y="324" text-anchor="middle" font-size="11" fill="var(--color-text-primary, #141413)">&#8594; one concrete, gated,</text>
  <text x="1136" y="342" text-anchor="middle" font-size="11" fill="var(--color-text-primary, #141413)">auditable RI.</text>
  <text x="1136" y="424" text-anchor="middle" font-size="10.5" font-style="italic" fill="#0F6E56">the centrepiece</text>

  <!-- ============================================================ -->
  <!-- FRAMING BANNER -->
  <!-- ============================================================ -->
  <rect x="40" y="474" width="1200" height="200" rx="12" fill="var(--color-background-secondary, #f7f6f3)" stroke="#7F77DD" stroke-width="1.4"/>
  <rect x="40" y="474" width="7" height="200" rx="3.5" fill="#7F77DD"/>
  <text x="640" y="524" text-anchor="middle" font-size="18" font-weight="700" fill="var(--color-text-primary, #141413)">The whole room builds ONE standard together — live, field by field.</text>
  <line x1="360" y1="546" x2="920" y2="546" stroke="#D8D3EC" stroke-width="1"/>
  <text x="640" y="580" text-anchor="middle" font-size="13.5" fill="var(--color-text-primary, #141413)">Breadth is exposure to all three dimensions; depth is taking <tspan font-weight="700">one the whole way</tspan>.</text>
  <text x="640" y="610" text-anchor="middle" font-size="13.5" fill="var(--color-text-secondary, #3d3d3a)">The payoff is Monday-morning capability — not knowing <tspan font-style="italic">about</tspan> standards, but producing one.</text>
  <text x="640" y="646" text-anchor="middle" font-size="12" font-style="italic" fill="#8a8a85">Output: a concrete, gated, auditable reference implementation — owned by the Central AI Factory.</text>
</svg>
