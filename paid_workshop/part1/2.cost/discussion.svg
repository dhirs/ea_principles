<svg viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',Helvetica,Arial,sans-serif" role="img">
<title>Discussion — what standard would you build for governed caching?</title>
<desc>A discussion prompt before the solution. The challenge: a caching saving turned itself off silently and invisibly for a quarter; now picture dozens of AI projects each with its own one-line cache flag owned by no one. The question to the room: how would you design a standard that guarantees this saving can't silently disappear for every project, not just one? Five things to weigh, and an open space to capture the room's ideas before the proposed fix.</desc>

<defs>
<linearGradient id="hdr" x1="0" y1="0" x2="1" y2="0">
<stop offset="0" stop-color="#7D2FDB"/><stop offset="1" stop-color="#9B57E8"/>
</linearGradient>
</defs>

<style>
.h1{fill:#fff;font-size:38px;font-weight:800;}
.hsub{fill:#E7D8FB;font-size:16px;}
.lbl{fill:#7D2FDB;font-size:13px;font-weight:700;letter-spacing:2px;}
.setup{fill:#64748B;font-size:15px;}
.q{fill:#3A445C;font-size:24px;font-weight:800;}
.weigh{fill:#3A445C;font-size:14.5px;}
.boardlbl{fill:#B07D14;font-size:13px;font-weight:700;letter-spacing:2px;}
</style>

<rect width="1280" height="720" fill="#fff"/>

<!-- header -->
<rect x="0" y="0" width="1280" height="96" fill="url(#hdr)"/>
<text x="56" y="50" class="h1">Your turn</text>
<text x="56" y="78" class="hsub">Before we show the fix — you design the standard.</text>

<!-- ===== left: the challenge + question ===== -->
<rect x="48" y="120" width="700" height="560" rx="14" fill="#F4F6FB" stroke="#E1E6F2" stroke-width="1.5"/>

<text x="76" y="158" class="lbl">THE CHALLENGE</text>
<text x="76" y="190" class="setup">A caching saving turned itself off — silently, invisibly, for a quarter.</text>
<text x="76" y="212" class="setup">Now picture dozens of AI projects, each with its own one-line cache flag,</text>
<text x="76" y="234" class="setup">owned by no one and watched by nothing.</text>

<line x1="76" y1="256" x2="720" y2="256" stroke="#E1E6F2" stroke-width="1.3"/>

<text x="76" y="300" class="q">How would you design a</text>
<text x="76" y="332" class="q">standard that guarantees this</text>
<text x="76" y="364" class="q">saving <tspan fill="#C0392B">can't silently disappear</tspan></text>
<text x="76" y="396" class="q">— for <tspan fill="#7D2FDB">every</tspan> project, not just one?</text>

<text x="76" y="452" class="lbl">THINGS TO WEIGH</text>
<g>
<circle cx="90" cy="484" r="5" fill="#7D2FDB"/>
<text x="110" y="489" class="weigh">What must be checked before a prompt change ships?</text>
<circle cx="90" cy="518" r="5" fill="#7D2FDB"/>
<text x="110" y="523" class="weigh">Who owns the prompt's structure and its cacheable prefix?</text>
<circle cx="90" cy="552" r="5" fill="#7D2FDB"/>
<text x="110" y="557" class="weigh">What's monitored continuously, vs checked once?</text>
<circle cx="90" cy="586" r="5" fill="#7D2FDB"/>
<text x="110" y="591" class="weigh">What's enforced automatically vs left to goodwill?</text>
<circle cx="90" cy="620" r="5" fill="#7D2FDB"/>
<text x="110" y="625" class="weigh">What's set centrally, and what stays with each team?</text>
</g>

<!-- ===== right: ideas board ===== -->
<rect x="764" y="120" width="468" height="560" rx="14" fill="#FBF6EC" stroke="#E8B23A" stroke-width="1.6"/>
<text x="792" y="158" class="boardlbl">THE ROOM'S IDEAS</text>
<g stroke="#EAD8AE" stroke-width="1.3">
<line x1="792" y1="206" x2="1204" y2="206"/>
<line x1="792" y1="256" x2="1204" y2="256"/>
<line x1="792" y1="306" x2="1204" y2="306"/>
<line x1="792" y1="356" x2="1204" y2="356"/>
<line x1="792" y1="406" x2="1204" y2="406"/>
<line x1="792" y1="456" x2="1204" y2="456"/>
<line x1="792" y1="506" x2="1204" y2="506"/>
<line x1="792" y1="556" x2="1204" y2="556"/>
<line x1="792" y1="606" x2="1204" y2="606"/>
<line x1="792" y1="656" x2="1204" y2="656"/>
</g>
</svg>
