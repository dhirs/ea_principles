<svg viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',Helvetica,Arial,sans-serif" role="img">
<title>Architecture — how governed prompt caching is enforced</title>
<desc>Two lanes. Pre-merge: the project declares its cacheable prefix and breakpoint in a project-owned cache.yaml; a platform CI lint checks the breakpoint is bounded and that no volatile token sits above it, passing or blocking the merge. Runtime: each call sends the static prefix to the provider cache (hit at $1.25, miss at $2.50); telemetry emits cache-read tokens; a platform hit-rate dashboard tracks every prompt fleet-wide and alerts the owner when the hit-rate drops below threshold so they fix the prefix fast.</desc>

<defs>
<linearGradient id="hdr" x1="0" y1="0" x2="1" y2="0">
<stop offset="0" stop-color="#7D2FDB"/><stop offset="1" stop-color="#9B57E8"/>
</linearGradient>
<marker id="arrG" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
<path d="M0,0 L8,3 L0,6 Z" fill="#64748B"/></marker>
</defs>

<style>
.h1{fill:#fff;font-size:30px;font-weight:800;}
.hsub{fill:#E7D8FB;font-size:14px;}
.lane{fill:#7D2FDB;font-size:13px;font-weight:800;letter-spacing:1px;}
.bx{fill:#3A445C;font-size:14px;font-weight:700;}
.bxs{fill:#64748B;font-size:11px;}
.step{fill:#64748B;font-size:11px;font-weight:700;}
.legend{fill:#64748B;font-size:12.5px;}
</style>

<rect width="1280" height="720" fill="#fff"/>

<!-- header -->
<rect x="0" y="0" width="1280" height="84" fill="url(#hdr)"/>
<text x="48" y="44" class="h1">Architecture — how it's enforced</text>
<text x="48" y="70" class="hsub">Catch a poisoned prefix before it ships · and watch the live cache so it can't quietly turn off.</text>

<!-- ===================== LANE 1: PRE-MERGE ===================== -->
<rect x="40" y="100" width="1200" height="232" rx="14" fill="#FAFBFD" stroke="#E1E6F2" stroke-width="1.3"/>
<text x="60" y="126" class="lane">PRE-MERGE  —  block a poisoned prefix before it ships</text>

<!-- cache.yaml (project, dark) -->
<rect x="60" y="142" width="400" height="170" rx="10" fill="#2C3142"/>
<text x="78" y="166" font-family="'Courier New',monospace" font-size="11.5" fill="#9AA3B2"># cache.yaml  — project-owned</text>
<text x="78" y="186" font-family="'Courier New',monospace" font-size="11.5" fill="#E7E9F0"><tspan fill="#9B7BE0">prompt:</tspan> support_agent_v3</text>
<text x="78" y="204" font-family="'Courier New',monospace" font-size="11.5" fill="#E7E9F0"><tspan fill="#9B7BE0">cacheable_prefix:</tspan> [system, tools, few_shot]</text>
<text x="78" y="222" font-family="'Courier New',monospace" font-size="11.5" fill="#E7E9F0"><tspan fill="#9B7BE0">breakpoint_after:</tspan> few_shot</text>
<text x="78" y="240" font-family="'Courier New',monospace" font-size="11.5" fill="#E7E9F0"><tspan fill="#9B7BE0">forbid_above_breakpoint:</tspan></text>
<text x="78" y="258" font-family="'Courier New',monospace" font-size="11.5" fill="#E8B23A">  [timestamp, session_id, user_id]</text>
<text x="78" y="278" font-family="'Courier New',monospace" font-size="11.5" fill="#E7E9F0"><tspan fill="#9B7BE0">alert_hit_rate_below:</tspan> 0.85</text>
<text x="78" y="300" font-family="'Courier New',monospace" font-size="10" fill="#9AA3B2">declares the prefix, the breakpoint, and what may never sit above it</text>

<line x1="460" y1="227" x2="520" y2="227" stroke="#64748B" stroke-width="2" marker-end="url(#arrG)"/>
<text x="464" y="218" class="step">1 · read</text>

<!-- CI lint (platform) -->
<rect x="522" y="160" width="300" height="134" rx="10" fill="#EFEAFA" stroke="#7D2FDB" stroke-width="2"/>
<text x="542" y="188" class="bx" fill="#7D2FDB">CI Lint  (deterministic)</text>
<text x="542" y="210" class="bxs">platform-owned · runs on every PR</text>
<text x="542" y="234" class="bxs">• is the breakpoint correctly bounded?</text>
<text x="542" y="254" class="bxs">• any volatile token above it?</text>
<text x="542" y="274" class="bxs">• is a cache-eligible prompt actually cached?</text>

<line x1="822" y1="200" x2="884" y2="200" stroke="#64748B" stroke-width="2" marker-end="url(#arrG)"/>
<line x1="822" y1="254" x2="884" y2="254" stroke="#64748B" stroke-width="2" marker-end="url(#arrG)"/>

<rect x="886" y="178" width="320" height="44" rx="8" fill="#2E9E5B"/>
<text x="906" y="205" fill="#fff" font-size="14" font-weight="800">PASS → merge</text>
<rect x="886" y="232" width="320" height="44" rx="8" fill="#C0392B"/>
<text x="906" y="259" fill="#fff" font-size="14" font-weight="800">FAIL → blocked</text>
<text x="1206" y="300" text-anchor="end" class="bxs">a timestamp above the breakpoint never reaches production</text>

<!-- ===================== LANE 2: RUNTIME ===================== -->
<rect x="40" y="352" width="1200" height="244" rx="14" fill="#FAFBFD" stroke="#E1E6F2" stroke-width="1.3"/>
<text x="60" y="378" class="lane">RUNTIME  —  make the invisible cache visible</text>

<!-- prompt call (project) -->
<rect x="60" y="406" width="196" height="120" rx="10" fill="#FBF6EC" stroke="#E8B23A" stroke-width="1.8"/>
<text x="158" y="452" text-anchor="middle" class="bx">Reused prompt</text>
<text x="158" y="474" text-anchor="middle" class="bxs">sends the ~8k static</text>
<text x="158" y="490" text-anchor="middle" class="bxs">prefix on every call</text>

<line x1="256" y1="466" x2="304" y2="466" stroke="#64748B" stroke-width="2" marker-end="url(#arrG)"/>
<text x="258" y="457" class="step">2 · call</text>

<!-- provider cache -->
<rect x="306" y="406" width="210" height="120" rx="10" fill="#F4F6FB" stroke="#CBD5E1" stroke-width="1.6"/>
<text x="411" y="448" text-anchor="middle" class="bx">Provider cache</text>
<text x="411" y="472" text-anchor="middle" class="bxs" fill="#2E9E5B">hit → $1.25 / 1M</text>
<text x="411" y="492" text-anchor="middle" class="bxs" fill="#C0392B">miss → $2.50 / 1M</text>

<line x1="516" y1="466" x2="564" y2="466" stroke="#64748B" stroke-width="2" marker-end="url(#arrG)"/>
<text x="560" y="457" class="step">3 · emit</text>

<!-- telemetry -->
<rect x="566" y="406" width="180" height="120" rx="10" fill="#F4F6FB" stroke="#CBD5E1" stroke-width="1.6"/>
<text x="656" y="452" text-anchor="middle" class="bx">Telemetry</text>
<text x="656" y="474" text-anchor="middle" class="bxs">cache_read_tokens</text>
<text x="656" y="490" text-anchor="middle" class="bxs">per prompt</text>

<line x1="746" y1="466" x2="794" y2="466" stroke="#64748B" stroke-width="2" marker-end="url(#arrG)"/>

<!-- hit-rate monitor (platform) -->
<rect x="796" y="406" width="200" height="120" rx="10" fill="#EFEAFA" stroke="#7D2FDB" stroke-width="2"/>
<text x="896" y="448" text-anchor="middle" class="bx" fill="#7D2FDB">Hit-rate dashboard</text>
<text x="896" y="472" text-anchor="middle" class="bxs">platform-owned</text>
<text x="896" y="490" text-anchor="middle" class="bxs">every prompt, fleet-wide</text>

<line x1="996" y1="466" x2="1044" y2="466" stroke="#64748B" stroke-width="2" marker-end="url(#arrG)"/>
<text x="1040" y="457" class="step">4 · alert</text>

<!-- alert owner (project) -->
<rect x="1046" y="406" width="170" height="120" rx="10" fill="#FBF6EC" stroke="#E8B23A" stroke-width="1.8"/>
<text x="1131" y="446" text-anchor="middle" class="bx">Alert → owner</text>
<text x="1131" y="470" text-anchor="middle" class="bxs">hit-rate &lt; 85%</text>
<text x="1131" y="488" text-anchor="middle" class="bxs">→ fix the prefix, fast</text>

<text x="60" y="558" class="bxs">The leak that used to surface a quarter late on the invoice now trips an alert the day the hit-rate drops.</text>

<!-- legend -->
<rect x="40" y="624" width="16" height="16" rx="4" fill="#EFEAFA" stroke="#7D2FDB" stroke-width="1.6"/>
<text x="64" y="637" class="legend">Platform / central owns (lint + monitor)</text>
<rect x="360" y="624" width="16" height="16" rx="4" fill="#FBF6EC" stroke="#E8B23A" stroke-width="1.8"/>
<text x="384" y="637" class="legend">Project owns (cache.yaml + prompt + acting on alerts)</text>
<rect x="800" y="624" width="16" height="16" rx="4" fill="#F4F6FB" stroke="#CBD5E1" stroke-width="1.6"/>
<text x="824" y="637" class="legend">Provider / infrastructure</text>
</svg>
