<svg viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',Helvetica,Arial,sans-serif" role="img">
<title>Fix — the standard, the split of responsibility, and its framework anchors</title>
<desc>The fix: every agent ships with a committed, gated eval harness whose decisions are checked against owned ground truth before release. The central team provides the standard harness shape and SDK, the CI gate, proof it ran on real data, one bar across the fleet, and independent sign-off. Each local team owns its labelled cases, its definition of correct, keeping the set true, a callable harness, and running it where it belongs. The standard (GO1B1-01) is anchored in the AWS Generative AI Lens GENOPS01-BP01, and cross-referenced to AIGP Domain III.B and EU AI Act Article 15.</desc>

<defs>
<linearGradient id="hdr" x1="0" y1="0" x2="1" y2="0">
<stop offset="0" stop-color="#7D2FDB"/><stop offset="1" stop-color="#9B57E8"/>
</linearGradient>
</defs>

<style>
.h1{fill:#fff;font-size:34px;font-weight:800;}
.hsub{fill:#E7D8FB;font-size:15px;}
.cruxlbl{fill:#7D2FDB;font-size:12px;font-weight:700;letter-spacing:2px;}
.crux{fill:#3A445C;font-size:18px;font-weight:700;}
.ptitle{font-size:15px;font-weight:800;letter-spacing:1.2px;}
.chipt{fill:#3A445C;font-size:16px;font-weight:700;}
.chips{fill:#64748B;font-size:12.5px;}
.fwlbl{fill:#7D2FDB;font-size:12px;font-weight:700;letter-spacing:1.5px;}
.fwt{fill:#3A445C;font-size:12.5px;font-weight:700;}
.fws{fill:#64748B;font-size:11px;}
</style>

<rect width="1280" height="720" fill="#fff"/>

<!-- header -->
<rect x="0" y="0" width="1280" height="84" fill="url(#hdr)"/>
<text x="48" y="44" class="h1">Fix</text>
<text x="48" y="70" class="hsub">Make the safety net a standard — owned, committed, and gated for every agent.</text>

<!-- crux strip -->
<rect x="48" y="98" width="1184" height="80" rx="12" fill="#F4F6FB" stroke="#E1E6F2" stroke-width="1.5"/>
<text x="70" y="124" class="cruxlbl">THE STANDARD, IN ONE LINE</text>
<text x="70" y="148" class="crux">Every agent ships with a committed, gated eval harness —</text>
<text x="70" y="170" class="crux">decisions checked against owned ground truth before release.</text>

<!-- ===== central panel ===== -->
<rect x="48" y="194" width="568" height="426" rx="14" fill="#EFEAFA" stroke="#7D2FDB" stroke-width="1.6"/>
<text x="74" y="230" class="ptitle" fill="#7D2FDB">CENTRAL TEAM PROVIDES</text>
<line x1="74" y1="242" x2="590" y2="242" stroke="#D6C6F2" stroke-width="1.2"/>
<g>
<circle cx="90" cy="276" r="5.5" fill="#7D2FDB"/>
<text x="112" y="274" class="chipt">One harness shape + SDK</text>
<text x="112" y="294" class="chips">every project speaks the same interface</text>
<circle cx="90" cy="334" r="5.5" fill="#7D2FDB"/>
<text x="112" y="332" class="chipt">The gate every project plugs into</text>
<text x="112" y="352" class="chips">a required check, not an optional habit</text>
<circle cx="90" cy="392" r="5.5" fill="#7D2FDB"/>
<text x="112" y="390" class="chipt">Proof it ran on real data</text>
<text x="112" y="410" class="chips">called + executed on the committed set</text>
<circle cx="90" cy="450" r="5.5" fill="#7D2FDB"/>
<text x="112" y="448" class="chipt">One bar across the whole fleet</text>
<text x="112" y="468" class="chips">same rule for every agent — no exceptions</text>
<circle cx="90" cy="508" r="5.5" fill="#7D2FDB"/>
<text x="112" y="506" class="chipt">Independent sign-off + audit</text>
<text x="112" y="526" class="chips">so a refresh can't rubber-stamp itself</text>
</g>

<!-- center seam -->
<line x1="640" y1="210" x2="640" y2="604" stroke="#E1E6F2" stroke-width="1.5" stroke-dasharray="5 5"/>
<circle cx="640" cy="407" r="24" fill="#fff" stroke="#E1E6F2" stroke-width="1.5"/>
<path d="M640 383 A24 24 0 0 1 640 431 Z" fill="#E8B23A" opacity="0.85"/>
<path d="M640 383 A24 24 0 0 0 640 431 Z" fill="#7D2FDB" opacity="0.85"/>
<text x="640" y="411" text-anchor="middle" fill="#3A445C" font-size="11" font-weight="800">vs</text>

<!-- ===== local panel ===== -->
<rect x="664" y="194" width="568" height="426" rx="14" fill="#FBF6EC" stroke="#E8B23A" stroke-width="1.6"/>
<text x="690" y="230" class="ptitle" fill="#B07D14">EACH LOCAL TEAM OWNS</text>
<line x1="690" y1="242" x2="1206" y2="242" stroke="#EFD9A6" stroke-width="1.2"/>
<g>
<circle cx="706" cy="276" r="5.5" fill="#E8B23A"/>
<text x="728" y="274" class="chipt">Your labelled cases</text>
<text x="728" y="294" class="chips">the ground truth only you can write</text>
<circle cx="706" cy="334" r="5.5" fill="#E8B23A"/>
<text x="728" y="332" class="chipt">What "correct" means here</text>
<text x="728" y="352" class="chips">your domain, your pass bar</text>
<circle cx="706" cy="392" r="5.5" fill="#E8B23A"/>
<text x="728" y="390" class="chipt">Keeping the set true</text>
<text x="728" y="410" class="chips">refresh it as the policy changes</text>
<circle cx="706" cy="450" r="5.5" fill="#E8B23A"/>
<text x="728" y="448" class="chipt">A callable harness</text>
<text x="728" y="468" class="chips">wired so the central gate can trigger it</text>
<circle cx="706" cy="508" r="5.5" fill="#E8B23A"/>
<text x="728" y="506" class="chipt">Running it where it belongs</text>
<text x="728" y="526" class="chips">fast at commit, full replay on release</text>
</g>

<!-- ===== framework anchors strip ===== -->
<rect x="48" y="634" width="1184" height="66" rx="12" fill="#F4F6FB" stroke="#E1E6F2" stroke-width="1.5"/>
<text x="70" y="662" class="fwlbl">ANCHORED IN</text>
<text x="70" y="682" fill="#3A445C" font-size="13" font-weight="800">GO1B1-01</text>

<!-- primary: GenAI Lens -->
<rect x="190" y="648" width="332" height="40" rx="8" fill="#EFEAFA" stroke="#7D2FDB" stroke-width="1.4"/>
<text x="206" y="666" class="fwt" fill="#7D2FDB">AWS Generative AI Lens · GENOPS01-BP01</text>
<text x="206" y="681" class="fws">primary anchor — "Create a ground-truth dataset"</text>

<!-- aigp -->
<rect x="534" y="648" width="300" height="40" rx="8" fill="#fff" stroke="#E1E6F2" stroke-width="1.4"/>
<text x="550" y="666" class="fwt">AIGP · Domain III.B</text>
<text x="550" y="681" class="fws">governing data used in testing</text>

<!-- eu ai act -->
<rect x="846" y="648" width="372" height="40" rx="8" fill="#fff" stroke="#E1E6F2" stroke-width="1.4"/>
<text x="862" y="666" class="fwt">EU AI Act · Article 15</text>
<text x="862" y="681" class="fws">accuracy &amp; robustness (high-risk) — cross-reference</text>
</svg>
