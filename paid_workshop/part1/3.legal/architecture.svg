<svg viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',Helvetica,Arial,sans-serif" role="img">
<title>How the bot works — the RAG pipeline, and where fabrication gets through</title>
<desc>The bot is a fixed linear RAG pipeline: a customer question is embedded and used to retrieve relevant policy passages from the document store; the question and passages are assembled into a prompt; the LLM generates an answer; the answer goes to the customer. The retrieved passages are the ground truth the answer must stick to. The danger point is the generate step, where the model can produce a fluent answer not supported by the passages, and today nothing sits between the LLM output and the customer to check it.</desc>

<defs>
<linearGradient id="hdr" x1="0" y1="0" x2="1" y2="0">
<stop offset="0" stop-color="#7D2FDB"/><stop offset="1" stop-color="#9B57E8"/>
</linearGradient>
<marker id="arr" markerWidth="11" markerHeight="11" refX="8" refY="3" orient="auto">
<path d="M0,0 L8,3 L0,6 Z" fill="#64748B"/></marker>
</defs>

<style>
.h1{fill:#fff;font-size:30px;font-weight:800;}
.hsub{fill:#E7D8FB;font-size:14px;}
.bx{fill:#3A445C;font-size:14.5px;font-weight:700;}
.bxs{fill:#64748B;font-size:11.5px;}
.step{fill:#64748B;font-size:11px;font-weight:700;}
.lane{fill:#7D2FDB;font-size:12.5px;font-weight:800;letter-spacing:1px;}
</style>

<rect width="1280" height="720" fill="#fff"/>

<!-- header -->
<rect x="0" y="0" width="1280" height="84" fill="url(#hdr)"/>
<text x="48" y="44" class="h1">How the bot works — the RAG pipeline</text>
<text x="48" y="70" class="hsub">A fixed, linear flow: retrieve the policy passages, then trust the model to stay faithful to them.</text>

<!-- ===== pipeline lane ===== -->
<rect x="40" y="112" width="1200" height="196" rx="14" fill="#FAFBFD" stroke="#E1E6F2" stroke-width="1.3"/>
<text x="60" y="138" class="lane">THE PIPELINE  —  same steps, every question</text>

<!-- 1 question -->
<rect x="60" y="156" width="176" height="120" rx="10" fill="#EFEAFA" stroke="#7D2FDB" stroke-width="1.6"/>
<text x="148" y="206" text-anchor="middle" class="bx">Customer</text>
<text x="148" y="226" text-anchor="middle" class="bx">question</text>
<text x="148" y="250" text-anchor="middle" class="bxs">"am I covered abroad?"</text>

<line x1="236" y1="216" x2="278" y2="216" stroke="#64748B" stroke-width="2" marker-end="url(#arr)"/>

<!-- 2 retrieve -->
<rect x="280" y="156" width="200" height="120" rx="10" fill="#EFEAFA" stroke="#7D2FDB" stroke-width="1.6"/>
<text x="380" y="196" text-anchor="middle" class="bx">Embed + Retrieve</text>
<text x="380" y="220" text-anchor="middle" class="bxs">vector search over the</text>
<text x="380" y="236" text-anchor="middle" class="bxs">policy document store</text>
<text x="380" y="260" text-anchor="middle" class="step" fill="#2E9E5B">→ the retrieved passages</text>

<line x1="480" y1="216" x2="522" y2="216" stroke="#64748B" stroke-width="2" marker-end="url(#arr)"/>

<!-- 3 assemble -->
<rect x="524" y="156" width="184" height="120" rx="10" fill="#EFEAFA" stroke="#7D2FDB" stroke-width="1.6"/>
<text x="616" y="200" text-anchor="middle" class="bx">Assemble prompt</text>
<text x="616" y="224" text-anchor="middle" class="bxs">question +</text>
<text x="616" y="240" text-anchor="middle" class="bxs">retrieved passages</text>

<line x1="708" y1="216" x2="750" y2="216" stroke="#64748B" stroke-width="2" marker-end="url(#arr)"/>

<!-- 4 generate -->
<rect x="752" y="156" width="184" height="120" rx="10" fill="#FBF6EC" stroke="#E8B23A" stroke-width="2"/>
<text x="844" y="196" text-anchor="middle" class="bx">LLM generates</text>
<text x="844" y="220" text-anchor="middle" class="bxs">writes the answer</text>
<text x="844" y="236" text-anchor="middle" class="bxs">over the passages</text>
<text x="844" y="260" text-anchor="middle" class="step" fill="#C0392B">← the danger point</text>

<line x1="936" y1="216" x2="978" y2="216" stroke="#64748B" stroke-width="2" marker-end="url(#arr)"/>

<!-- 5 answer -->
<rect x="980" y="156" width="180" height="120" rx="10" fill="#EFEAFA" stroke="#7D2FDB" stroke-width="1.6"/>
<text x="1070" y="206" text-anchor="middle" class="bx">Answer to</text>
<text x="1070" y="226" text-anchor="middle" class="bx">the customer</text>
<text x="1070" y="250" text-anchor="middle" class="bxs">straight through</text>

<!-- gap marker between generate and answer -->
<rect x="946" y="286" width="24" height="24" rx="5" fill="#FBEEEC" stroke="#C0392B" stroke-width="1.4"/>
<text x="958" y="303" text-anchor="middle" fill="#C0392B" font-size="15" font-weight="800">!</text>
<text x="980" y="303" class="bxs" fill="#C0392B">nothing checks the answer here</text>

<!-- ===== two annotations ===== -->
<!-- ground truth -->
<rect x="40" y="340" width="590" height="150" rx="12" fill="#F7FBF8" stroke="#2E9E5B" stroke-width="1.6"/>
<text x="64" y="370" fill="#2E9E5B" font-size="14.5" font-weight="800">The retrieved passages are the ground truth</text>
<text x="64" y="398" fill="#3A445C" font-size="13.5">The answer is only allowed to be based on what retrieval</text>
<text x="64" y="418" fill="#3A445C" font-size="13.5">pulled from the insurer's own policy documents.</text>
<text x="64" y="446" fill="#64748B" font-size="12.5">If it's not in the passages, the bot has no business asserting it.</text>
<text x="64" y="470" fill="#64748B" font-size="12.5">Retrieval is usually fine — it finds the right documents.</text>

<!-- danger -->
<rect x="650" y="340" width="590" height="150" rx="12" fill="#FDF7F6" stroke="#C0392B" stroke-width="1.6"/>
<text x="674" y="370" fill="#C0392B" font-size="14.5" font-weight="800">The generate step can go off-book</text>
<text x="674" y="398" fill="#3A445C" font-size="13.5">The LLM can write a fluent, confident answer that <tspan font-weight="700">isn't</tspan></text>
<text x="674" y="418" fill="#3A445C" font-size="13.5">supported by the retrieved passages — a fabrication.</text>
<text x="674" y="446" fill="#64748B" font-size="12.5">And there's no step between the model's output and the</text>
<text x="674" y="470" fill="#64748B" font-size="12.5">customer that checks the answer against those passages.</text>

<!-- ===== takeaway ===== -->
<rect x="40" y="518" width="1200" height="158" rx="12" fill="#EFEAFA" stroke="#7D2FDB" stroke-width="1.6"/>
<text x="64" y="548" fill="#7D2FDB" font-size="14" font-weight="800">THE GAP</text>
<text x="64" y="582" fill="#3A445C" font-size="18" font-weight="700">The pipeline retrieves the right documents — then trusts the model to stay faithful to them,</text>
<text x="64" y="608" fill="#3A445C" font-size="18" font-weight="700">with nothing verifying that it did.</text>
<line x1="64" y1="626" x2="1216" y2="626" stroke="#D6C6F2" stroke-width="1.2"/>
<text x="64" y="652" fill="#3A445C" font-size="14">That empty slot at the output — between the LLM and the customer — is exactly where "covered abroad" gets through,</text>
<text x="64" y="672" fill="#3A445C" font-size="14">and exactly where the grounding gate will later drop in.</text>
</svg>
