<svg viewBox="0 0 768 576" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#EEF3F4"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#16B0A6"/>
      <stop offset="1" stop-color="#0E8F93"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#0F2A38" flood-opacity="0.10"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="768" height="576" fill="url(#bg)"/>
  <circle cx="700" cy="60" r="180" fill="#16B0A6" opacity="0.05"/>
  <circle cx="70" cy="540" r="150" fill="#0F2A38" opacity="0.04"/>

  <!-- header -->
  <g>
    <rect x="56" y="58" width="34" height="4" rx="2" fill="url(#accent)"/>
    <text x="98" y="63" font-size="13" font-weight="700" letter-spacing="3" fill="#0E8F93">THE CENTRAL EA FUNCTION</text>
    <text x="56" y="104" font-size="34" font-weight="800" fill="#0F2A38">What the Central EA Team Does</text>
    <text x="56" y="134" font-size="16" fill="#5B6B73">One function, three jobs — set centrally, enforced everywhere.</text>
  </g>

  <!-- cards -->
  <g>
    <!-- Card 1 -->
    <g transform="translate(56,182)">
      <rect width="208" height="300" rx="16" fill="#FFFFFF" filter="url(#shadow)"/>
      <rect x="0" y="0" width="208" height="6" rx="3" fill="url(#accent)"/>
      <circle cx="40" cy="56" r="26" fill="#0F2A38"/>
      <text x="40" y="63" font-size="20" font-weight="800" fill="#FFFFFF" text-anchor="middle">01</text>
      <!-- magnifier icon -->
      <g transform="translate(150,40)" stroke="#16B0A6" stroke-width="3" fill="none" stroke-linecap="round">
        <circle cx="11" cy="11" r="11"/>
        <line x1="19" y1="19" x2="30" y2="30"/>
      </g>
      <text x="28" y="128" font-size="20" font-weight="800" letter-spacing="1" fill="#0F2A38">IDENTIFY</text>
      <rect x="28" y="142" width="40" height="3" rx="1.5" fill="#16B0A6"/>
      <text x="28" y="178" font-size="15.5" font-weight="700" fill="#21333C">Identify the standards</text>
      <text x="28" y="210" font-size="13.5" fill="#5B6B73">Define what "production-</text>
      <text x="28" y="230" font-size="13.5" fill="#5B6B73">ready" means — the cross-</text>
      <text x="28" y="250" font-size="13.5" fill="#5B6B73">cutting concerns no single</text>
      <text x="28" y="270" font-size="13.5" fill="#5B6B73">project owns or tests.</text>
    </g>

    <!-- Card 2 -->
    <g transform="translate(280,182)">
      <rect width="208" height="300" rx="16" fill="#FFFFFF" filter="url(#shadow)"/>
      <rect x="0" y="0" width="208" height="6" rx="3" fill="url(#accent)"/>
      <circle cx="40" cy="56" r="26" fill="#0F2A38"/>
      <text x="40" y="63" font-size="20" font-weight="800" fill="#FFFFFF" text-anchor="middle">02</text>
      <!-- bars icon -->
      <g transform="translate(146,30)" fill="#16B0A6">
        <rect x="0" y="20" width="7" height="20" rx="2"/>
        <rect x="12" y="10" width="7" height="30" rx="2"/>
        <rect x="24" y="0" width="7" height="40" rx="2"/>
      </g>
      <text x="28" y="128" font-size="20" font-weight="800" letter-spacing="1" fill="#0F2A38">PRIORITIZE</text>
      <rect x="28" y="142" width="40" height="3" rx="1.5" fill="#16B0A6"/>
      <text x="28" y="178" font-size="15.5" font-weight="700" fill="#21333C">Prioritize what to build</text>
      <text x="28" y="210" font-size="13.5" fill="#5B6B73">Rank candidates by risk</text>
      <text x="28" y="230" font-size="13.5" fill="#5B6B73">and value — the gate that</text>
      <text x="28" y="250" font-size="13.5" fill="#5B6B73">sets each quarter's build</text>
      <text x="28" y="270" font-size="13.5" fill="#5B6B73">agenda.</text>
    </g>

    <!-- Card 3 -->
    <g transform="translate(504,182)">
      <rect width="208" height="300" rx="16" fill="#FFFFFF" filter="url(#shadow)"/>
      <rect x="0" y="0" width="208" height="6" rx="3" fill="url(#accent)"/>
      <circle cx="40" cy="56" r="26" fill="#0F2A38"/>
      <text x="40" y="63" font-size="20" font-weight="800" fill="#FFFFFF" text-anchor="middle">03</text>
      <!-- blueprint/build icon -->
      <g transform="translate(144,32)" stroke="#16B0A6" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <rect x="0" y="2" width="32" height="32" rx="4"/>
        <line x1="0" y1="13" x2="32" y2="13"/>
        <line x1="11" y1="13" x2="11" y2="34"/>
      </g>
      <text x="28" y="128" font-size="20" font-weight="800" letter-spacing="1" fill="#0F2A38">DEVELOP</text>
      <rect x="28" y="142" width="40" height="3" rx="1.5" fill="#16B0A6"/>
      <text x="28" y="178" font-size="15.5" font-weight="700" fill="#21333C">Reference implementations</text>
      <text x="28" y="210" font-size="13.5" fill="#5B6B73">Turn each standard into a</text>
      <text x="28" y="230" font-size="13.5" fill="#5B6B73">concrete, reusable blueprint</text>
      <text x="28" y="250" font-size="13.5" fill="#5B6B73">— gated in CI, audit-ready.</text>
    </g>

    <!-- connectors -->
    <g fill="#0F2A38">
      <circle cx="272" cy="332" r="12"/>
      <path d="M269 327 l6 5 l-6 5" fill="none" stroke="#FFFFFF" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="496" cy="332" r="12"/>
      <path d="M493 327 l6 5 l-6 5" fill="none" stroke="#FFFFFF" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- footer tagline -->
  <text x="384" y="528" font-size="14.5" font-weight="600" fill="#0E8F93" text-anchor="middle" letter-spacing="0.5">Set centrally · enforced per project — the central team decides what "production-ready" means.</text>
</svg>
