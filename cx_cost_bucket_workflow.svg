<svg xmlns="http://www.w3.org/2000/svg" width="680" height="480" viewBox="0 0 680 480" role="img">
<title>Workflow for the customer-experience and cost buckets</title>
<desc>Three-stage pipeline: define the failure modes, source controls from GenAI Lens, build the standard and gate. No legal source of truth — you set the bar; AI Act and NIST do not apply, ISO 42001 is optional.</desc>
<style>
.th{font-family:Arial,Helvetica,sans-serif;font-size:14px;font-weight:500}
.ts{font-family:Arial,Helvetica,sans-serif;font-size:12px;font-weight:400}
</style>
<rect x="0" y="0" width="680" height="480" fill="#FFFFFF"/>

<text class="th" x="40" y="30" fill="#2C2C2A">Customer-experience &amp; cost buckets — a different spine</text>
<text class="ts" x="40" y="52" fill="#5F5E5A">purple = you set the bar   ·   teal = source &amp; build   ·   grey = supporting</text>

<rect x="40" y="96" width="100" height="28" rx="6" fill="#CECBF6" stroke="#7F77DD" stroke-width="0.5"/>
<text class="th" x="90" y="114" text-anchor="middle" fill="#26215C">define</text>
<rect x="160" y="78" width="460" height="64" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5"/>
<text class="th" x="178" y="106" fill="#3C3489">1 · Define the failure modes</text>
<text class="ts" x="178" y="126" fill="#534AB7">what bad looks like — product goals + incidents</text>
<line x1="390" y1="142" x2="390" y2="162" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="40" y="182" width="100" height="28" rx="6" fill="#9FE1CB" stroke="#1D9E75" stroke-width="0.5"/>
<text class="th" x="90" y="200" text-anchor="middle" fill="#04342C">source</text>
<rect x="160" y="164" width="460" height="64" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
<text class="th" x="178" y="192" fill="#085041">2 · Source from GenAI Lens</text>
<text class="ts" x="178" y="212" fill="#0F6E56">CX: Reliability / Performance  ·  Cost: Cost pillar</text>
<line x1="390" y1="228" x2="390" y2="248" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="40" y="268" width="100" height="28" rx="6" fill="#9FE1CB" stroke="#1D9E75" stroke-width="0.5"/>
<text class="th" x="90" y="286" text-anchor="middle" fill="#04342C">build</text>
<rect x="160" y="250" width="460" height="64" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
<text class="th" x="178" y="278" fill="#085041">3 · Build the standard + gate</text>
<text class="ts" x="178" y="298" fill="#0F6E56">your baseline; iterate from observed failures</text>

<rect x="40" y="336" width="600" height="48" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5"/>
<text class="th" x="58" y="365" fill="#3C3489">Rule: no legal source — you set the bar. AI Act &amp; NIST don't apply.</text>

<rect x="40" y="400" width="600" height="60" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text class="ts" x="58" y="426" fill="#5F5E5A">ISO 42001 optional — governance discipline only.</text>
<text class="ts" x="58" y="446" fill="#5F5E5A">Contrast: the legal bucket anchors on the law; these on your standards.</text>

<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
</svg>
