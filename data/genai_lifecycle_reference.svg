<svg viewBox="0 0 1320 820" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif" role="img" aria-labelledby="ttl dsc">
  <title id="ttl">GenAI model lifecycle — AWS Well-Architected Lens, vendor-neutral</title>
  <desc id="dsc">The generative-AI model lifecycle as the spine: Select, Ground and customize, Evaluate, Guard and secure, Deploy and serve, Operate and monitor, with an iterate loop. Beneath it, the five AWS Well-Architected GenAI Lens pillars (Operational Excellence, Security, Reliability, Performance Efficiency, Cost Optimization) shown as cross-cutting bands spanning every stage.</desc>

  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7.5" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#9AA0A6"/></marker>
    <marker id="ahL" markerWidth="11" markerHeight="11" refX="9" refY="5.5" orient="auto"><path d="M0,0 L11,5.5 L0,11 z" fill="#4F46E5"/></marker>
  </defs>

  <rect x="0" y="0" width="1320" height="820" fill="#FBFAF8"/>

  <!-- title -->
  <text x="660" y="42" text-anchor="middle" font-size="27" font-weight="700" fill="#1F2933">The GenAI Model Lifecycle</text>
  <text x="660" y="68" text-anchor="middle" font-size="14.5" fill="#5F6B76">AWS Well-Architected Generative AI Lens &#8212; the model lifecycle, not a generic application stack</text>

  <!-- iterate loop arrow -->
  <path d="M 1182 150 C 1182 92, 138 92, 138 150" fill="none" stroke="#4F46E5" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#ahL)"/>
  <text x="660" y="104" text-anchor="middle" font-size="12.5" font-weight="700" fill="#4F46E5">iterate &#8212; evaluation &amp; monitoring feed the next cycle</text>

  <text x="40" y="138" font-size="13" font-weight="700" fill="#8A6D1B" letter-spacing="0.6">GENAI MODEL LIFECYCLE</text>

  <!-- ===== stage cards ===== -->
  <!-- 1 Select -->
  <rect x="40" y="150" width="195" height="230" rx="11" fill="#ffffff" stroke="#4F46E5" stroke-width="1.4"/>
  <rect x="40" y="150" width="195" height="44" rx="11" fill="#4F46E5"/>
  <circle cx="60" cy="172" r="11" fill="#ffffff"/><text x="60" y="176" text-anchor="middle" font-size="12" font-weight="700" fill="#4F46E5">1</text>
  <text x="78" y="177" font-size="13.5" font-weight="700" fill="#ffffff">Select</text>
  <g font-size="11.5" fill="#33414E">
    <text x="56" y="220">&#8226; Choose a foundation model</text>
    <text x="56" y="242">&#8226; Right-size to the task</text>
    <text x="56" y="264">&#8226; Prompt vs fine-tune vs buy</text>
    <text x="56" y="286">&#8226; Record selection rationale</text>
  </g>

  <!-- 2 Ground & Customize -->
  <rect x="249" y="150" width="195" height="230" rx="11" fill="#ffffff" stroke="#4F46E5" stroke-width="1.4"/>
  <rect x="249" y="150" width="195" height="44" rx="11" fill="#4F46E5"/>
  <circle cx="269" cy="172" r="11" fill="#ffffff"/><text x="269" y="176" text-anchor="middle" font-size="12" font-weight="700" fill="#4F46E5">2</text>
  <text x="287" y="170" font-size="13.5" font-weight="700" fill="#ffffff">Ground &amp;</text>
  <text x="287" y="186" font-size="13.5" font-weight="700" fill="#ffffff">Customize</text>
  <g font-size="11.5" fill="#33414E">
    <text x="265" y="220">&#8226; Prompt engineering</text>
    <text x="265" y="242">&#8226; RAG retrieval grounding</text>
    <text x="265" y="264">&#8226; Embeddings &amp; vector store</text>
    <text x="265" y="286">&#8226; Fine-tuning / adaptation</text>
    <text x="265" y="308">&#8226; Vetted training data</text>
  </g>

  <!-- 3 Evaluate -->
  <rect x="458" y="150" width="195" height="230" rx="11" fill="#ffffff" stroke="#4F46E5" stroke-width="1.4"/>
  <rect x="458" y="150" width="195" height="44" rx="11" fill="#4F46E5"/>
  <circle cx="478" cy="172" r="11" fill="#ffffff"/><text x="478" y="176" text-anchor="middle" font-size="12" font-weight="700" fill="#4F46E5">3</text>
  <text x="496" y="177" font-size="13.5" font-weight="700" fill="#ffffff">Evaluate</text>
  <g font-size="11.5" fill="#33414E">
    <text x="474" y="220">&#8226; Functional quality eval</text>
    <text x="474" y="242">&#8226; Worst group, not average</text>
    <text x="474" y="264">&#8226; One consistent yardstick</text>
    <text x="474" y="286">&#8226; Prove behaviour pre-ship</text>
    <text x="474" y="308">&#8226; Responsible-AI checks</text>
  </g>

  <!-- 4 Guard & Secure -->
  <rect x="667" y="150" width="195" height="230" rx="11" fill="#ffffff" stroke="#4F46E5" stroke-width="1.4"/>
  <rect x="667" y="150" width="195" height="44" rx="11" fill="#4F46E5"/>
  <circle cx="687" cy="172" r="11" fill="#ffffff"/><text x="687" y="176" text-anchor="middle" font-size="12" font-weight="700" fill="#4F46E5">4</text>
  <text x="705" y="170" font-size="13.5" font-weight="700" fill="#ffffff">Guard &amp;</text>
  <text x="705" y="186" font-size="13.5" font-weight="700" fill="#ffffff">Secure</text>
  <g font-size="11.5" fill="#33414E">
    <text x="683" y="220">&#8226; Screen prompt input</text>
    <text x="683" y="242">&#8226; Validate model response</text>
    <text x="683" y="264">&#8226; Control agent actions</text>
    <text x="683" y="286">&#8226; Retrieval access control</text>
    <text x="683" y="308">&#8226; Injection / PII defence</text>
  </g>

  <!-- 5 Deploy & Serve -->
  <rect x="876" y="150" width="195" height="230" rx="11" fill="#ffffff" stroke="#4F46E5" stroke-width="1.4"/>
  <rect x="876" y="150" width="195" height="44" rx="11" fill="#4F46E5"/>
  <circle cx="896" cy="172" r="11" fill="#ffffff"/><text x="896" y="176" text-anchor="middle" font-size="12" font-weight="700" fill="#4F46E5">5</text>
  <text x="914" y="170" font-size="13.5" font-weight="700" fill="#ffffff">Deploy &amp;</text>
  <text x="914" y="186" font-size="13.5" font-weight="700" fill="#ffffff">Serve</text>
  <g font-size="11.5" fill="#33414E">
    <text x="892" y="220">&#8226; Inference right-sizing</text>
    <text x="892" y="242">&#8226; Cost-aware prompting</text>
    <text x="892" y="264">&#8226; Prompt / response caching</text>
    <text x="892" y="286">&#8226; Agent spend limits</text>
    <text x="892" y="308">&#8226; Lifecycle automation</text>
  </g>

  <!-- 6 Operate & Monitor -->
  <rect x="1085" y="150" width="195" height="230" rx="11" fill="#ffffff" stroke="#4F46E5" stroke-width="1.4"/>
  <rect x="1085" y="150" width="195" height="44" rx="11" fill="#4F46E5"/>
  <circle cx="1105" cy="172" r="11" fill="#ffffff"/><text x="1105" y="176" text-anchor="middle" font-size="12" font-weight="700" fill="#4F46E5">6</text>
  <text x="1123" y="170" font-size="13.5" font-weight="700" fill="#ffffff">Operate &amp;</text>
  <text x="1123" y="186" font-size="13.5" font-weight="700" fill="#ffffff">Monitor</text>
  <g font-size="11.5" fill="#33414E">
    <text x="1101" y="220">&#8226; One observability channel</text>
    <text x="1101" y="242">&#8226; Trace data governance</text>
    <text x="1101" y="264">&#8226; Drift detection</text>
    <text x="1101" y="286">&#8226; Token &amp; cost telemetry</text>
    <text x="1101" y="308">&#8226; Graceful recovery / fallback</text>
  </g>

  <!-- stage flow arrows -->
  <g>
    <line x1="235" y1="200" x2="249" y2="200" stroke="#9AA0A6" stroke-width="2" marker-end="url(#ah)"/>
    <line x1="444" y1="200" x2="458" y2="200" stroke="#9AA0A6" stroke-width="2" marker-end="url(#ah)"/>
    <line x1="653" y1="200" x2="667" y2="200" stroke="#9AA0A6" stroke-width="2" marker-end="url(#ah)"/>
    <line x1="862" y1="200" x2="876" y2="200" stroke="#9AA0A6" stroke-width="2" marker-end="url(#ah)"/>
    <line x1="1071" y1="200" x2="1085" y2="200" stroke="#9AA0A6" stroke-width="2" marker-end="url(#ah)"/>
  </g>

  <!-- ===== cross-cutting pillars ===== -->
  <text x="40" y="430" font-size="13" font-weight="700" fill="#8A6D1B" letter-spacing="0.6">CROSS-CUTTING PILLARS &#8212; apply across every stage above</text>

  <!-- GENOPS -->
  <rect x="40" y="442" width="1240" height="58" rx="9" fill="#ffffff" stroke="#7C3AED" stroke-width="1.3"/>
  <rect x="40" y="442" width="232" height="58" rx="9" fill="#7C3AED"/>
  <text x="58" y="467" font-size="11" font-weight="700" fill="#E9D8FD">GENOPS</text>
  <text x="58" y="486" font-size="14" font-weight="700" fill="#ffffff">Operational Excellence</text>
  <text x="288" y="467" font-size="11.5" font-style="italic" fill="#5F6B76">See what's happening, ship safely, recover when it breaks.</text>
  <text x="288" y="487" font-size="11.5" font-weight="600" fill="#33414E">evaluation &#183; traceability &#183; observability &#183; lifecycle automation &#183; drift</text>

  <!-- GENSEC -->
  <rect x="40" y="506" width="1240" height="58" rx="9" fill="#ffffff" stroke="#DC2626" stroke-width="1.3"/>
  <rect x="40" y="506" width="232" height="58" rx="9" fill="#DC2626"/>
  <text x="58" y="531" font-size="11" font-weight="700" fill="#FBD5D5">GENSEC</text>
  <text x="58" y="550" font-size="14" font-weight="700" fill="#ffffff">Security</text>
  <text x="288" y="531" font-size="11.5" font-style="italic" fill="#5F6B76">Access controlled, prompts protected, actions bounded.</text>
  <text x="288" y="551" font-size="11.5" font-weight="600" fill="#33414E">endpoint access &#183; prompt security &#183; response validation &#183; excessive agency &#183; data poisoning</text>

  <!-- GENREL -->
  <rect x="40" y="570" width="1240" height="58" rx="9" fill="#ffffff" stroke="#0D9488" stroke-width="1.3"/>
  <rect x="40" y="570" width="232" height="58" rx="9" fill="#0D9488"/>
  <text x="58" y="595" font-size="11" font-weight="700" fill="#C7F0EA">GENREL</text>
  <text x="58" y="614" font-size="14" font-weight="700" fill="#ffffff">Reliability</text>
  <text x="288" y="595" font-size="11.5" font-style="italic" fill="#5F6B76">When a model provider or upstream fails, the workload survives.</text>
  <text x="288" y="615" font-size="11.5" font-weight="600" fill="#33414E">foundation-model resilience &#183; prompt remediation &amp; recovery &#183; graceful fallback</text>

  <!-- GENPERF -->
  <rect x="40" y="634" width="1240" height="58" rx="9" fill="#ffffff" stroke="#D97706" stroke-width="1.3"/>
  <rect x="40" y="634" width="232" height="58" rx="9" fill="#D97706"/>
  <text x="58" y="659" font-size="11" font-weight="700" fill="#FBE7C6">GENPERF</text>
  <text x="58" y="678" font-size="14" font-weight="700" fill="#ffffff">Performance Efficiency</text>
  <text x="288" y="659" font-size="11.5" font-style="italic" fill="#5F6B76">Runs efficiently at production scale.</text>
  <text x="288" y="679" font-size="11.5" font-weight="600" fill="#33414E">model right-sizing &#183; state &amp; throughput management &#183; vector-store optimization</text>

  <!-- GENCOST -->
  <rect x="40" y="698" width="1240" height="58" rx="9" fill="#ffffff" stroke="#2563EB" stroke-width="1.3"/>
  <rect x="40" y="698" width="232" height="58" rx="9" fill="#2563EB"/>
  <text x="58" y="723" font-size="11" font-weight="700" fill="#CFE0FC">GENCOST</text>
  <text x="58" y="742" font-size="14" font-weight="700" fill="#ffffff">Cost Optimization</text>
  <text x="288" y="723" font-size="11.5" font-style="italic" fill="#5F6B76">Spending efficiently on tokens, compute, and vendors.</text>
  <text x="288" y="743" font-size="11.5" font-weight="600" fill="#33414E">inference cost &#183; cost-aware prompting &#183; caching &#183; agent budgets &#183; vendor consolidation</text>

  <!-- footer -->
  <text x="660" y="792" text-anchor="middle" font-size="11.5" fill="#8A95A1">Sustainability (GENSUS) intentionally omitted &#8212; its concerns distribute across Cost, Operational Excellence, and Security.</text>
</svg>
