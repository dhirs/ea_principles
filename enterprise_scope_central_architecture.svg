<title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Inter, ui-sans-serif, system-ui, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">The ideal state</title>
<desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Inter, ui-sans-serif, system-ui, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">A central EA team publishes a catalogue of reference implementations built on EA principles. They are enforced at two points: automated CI/CD gates, which stop the project-level failure, and the ARB audit, which stops the portfolio-level failure. The result is that every project is production-ready by default.</desc>

