<svg viewBox="0 0 768 576" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F2EEFB"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7D03E0"/>
      <stop offset="1" stop-color="#6D28D9"/>
    </linearGradient>
    <radialGradient id="hub" cx="50%" cy="40%" r="70%">
      <stop offset="0" stop-color="#3A1170"/>
      <stop offset="1" stop-color="#1E0B3B"/>
    </radialGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#2E1065" flood-opacity="0.14"/>
    </filter>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#7D03E0" flood-opacity="0.40"/>
    </filter>
  </defs>

  <rect width="768" height="576" fill="url(#bg)"/>
  <circle cx="712" cy="60" r="150" fill="#7D03E0" opacity="0.06"/>
  <circle cx="60" cy="544" r="150" fill="#2E1065" opacity="0.05"/>

  <!-- header -->
  <rect x="56" y="40" width="34" height="4" rx="2" fill="url(#brand)"/>
  <text x="98" y="45" font-size="13" font-weight="700" letter-spacing="3" fill="#6D28D9">ANATOMY OF A STANDARD</text>
  <text x="56" y="86" font-size="29" font-weight="800" fill="#2E1065">What a Standard Actually Looks Like</text>
  <text x="56" y="113" font-size="15.5" fill="#6B6480">A taxonomy of nodes — anchored by a concrete reference implementation.</text>

  <!-- connector lines -->
  <g stroke="#7D03E0" stroke-width="1.6" opacity="0.5">
    <line x1="238" y1="171" x2="384" y2="300"/>
    <line x1="238" y1="231" x2="384" y2="300"/>
    <line x1="238" y1="291" x2="384" y2="300"/>
    <line x1="238" y1="351" x2="384" y2="300"/>
    <line x1="238" y1="411" x2="384" y2="300"/>
    <line x1="530" y1="171" x2="384" y2="300"/>
    <line x1="530" y1="231" x2="384" y2="300"/>
    <line x1="530" y1="291" x2="384" y2="300"/>
    <line x1="530" y1="351" x2="384" y2="300"/>
    <line x1="530" y1="411" x2="384" y2="300"/>
  </g>

  <!-- central hub -->
  <circle cx="384" cy="300" r="92" fill="#7D03E0" opacity="0.12" filter="url(#glow)"/>
  <circle cx="384" cy="300" r="80" fill="url(#hub)" stroke="#9F5BF0" stroke-width="3"/>
  <text x="384" y="276" font-size="15" fill="#C9A6F7" text-anchor="middle">★</text>
  <text x="384" y="300" font-size="17" font-weight="800" fill="#FFFFFF" text-anchor="middle" letter-spacing="0.5">REFERENCE</text>
  <text x="384" y="320" font-size="14.5" font-weight="800" fill="#FFFFFF" text-anchor="middle" letter-spacing="0.5">IMPLEMENTATION</text>
  <text x="384" y="344" font-size="11.5" fill="#C9A6F7" text-anchor="middle">the concrete build</text>

  <!-- left badges -->
  <g>
    <g transform="translate(56,150)"><rect width="182" height="42" rx="21" fill="#FFFFFF" filter="url(#shadow)"/><circle cx="24" cy="21" r="5" fill="#7D03E0"/><text x="40" y="26" font-size="13" font-weight="700" fill="#2E1065">Statement</text></g>
    <g transform="translate(56,210)"><rect width="182" height="42" rx="21" fill="#FFFFFF" filter="url(#shadow)"/><circle cx="24" cy="21" r="5" fill="#7D03E0"/><text x="40" y="26" font-size="13" font-weight="700" fill="#2E1065">Problem</text></g>
    <g transform="translate(56,270)"><rect width="182" height="42" rx="21" fill="#FFFFFF" filter="url(#shadow)"/><circle cx="24" cy="21" r="5" fill="#7D03E0"/><text x="40" y="26" font-size="13" font-weight="700" fill="#2E1065">Solution</text></g>
    <g transform="translate(56,330)"><rect width="182" height="42" rx="21" fill="#FFFFFF" filter="url(#shadow)"/><circle cx="24" cy="21" r="5" fill="#7D03E0"/><text x="40" y="26" font-size="13" font-weight="700" fill="#2E1065">Maturity Level</text></g>
    <g transform="translate(56,390)"><rect width="182" height="42" rx="21" fill="#FFFFFF" filter="url(#shadow)"/><circle cx="24" cy="21" r="5" fill="#7D03E0"/><text x="40" y="26" font-size="13" font-weight="700" fill="#2E1065">Applicability</text></g>
  </g>

  <!-- right badges -->
  <g>
    <g transform="translate(530,150)"><rect width="182" height="42" rx="21" fill="#FFFFFF" filter="url(#shadow)"/><circle cx="158" cy="21" r="5" fill="#7D03E0"/><text x="144" y="26" font-size="13" font-weight="700" fill="#2E1065" text-anchor="end">Criticality</text></g>
    <g transform="translate(530,210)"><rect width="182" height="42" rx="21" fill="#FFFFFF" filter="url(#shadow)"/><circle cx="158" cy="21" r="5" fill="#7D03E0"/><text x="144" y="26" font-size="13" font-weight="700" fill="#2E1065" text-anchor="end">Ownership</text></g>
    <g transform="translate(530,270)"><rect width="182" height="42" rx="21" fill="#FFFFFF" filter="url(#shadow)"/><circle cx="158" cy="21" r="5" fill="#7D03E0"/><text x="144" y="26" font-size="13" font-weight="700" fill="#2E1065" text-anchor="end">Enforcement Gates</text></g>
    <g transform="translate(530,330)"><rect width="182" height="42" rx="21" fill="#FFFFFF" filter="url(#shadow)"/><circle cx="158" cy="21" r="5" fill="#7D03E0"/><text x="144" y="26" font-size="13" font-weight="700" fill="#2E1065" text-anchor="end">Framework Mappings</text></g>
    <g transform="translate(530,390)"><rect width="182" height="42" rx="21" fill="#FFFFFF" filter="url(#shadow)"/><circle cx="158" cy="21" r="5" fill="#7D03E0"/><text x="144" y="26" font-size="13" font-weight="700" fill="#2E1065" text-anchor="end">ARB Evidence</text></g>
  </g>

  <!-- footer -->
  <rect x="74" y="498" width="620" height="46" rx="23" fill="url(#brand)"/>
  <text x="384" y="526" font-size="14.5" font-weight="700" fill="#FFFFFF" text-anchor="middle">Concrete Reference Implementation — enforced at the ARB &amp; CI gates.</text>
</svg>
