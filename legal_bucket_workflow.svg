<svg xmlns="http://www.w3.org/2000/svg" width="680" height="652" viewBox="0 0 680 652" role="img">
<title>Workflow for identifying standards in the legal/compliance bucket</title>
<desc>Five-stage pipeline: start with EU AI Act obligations as the spine, classify each system, map to ISO 42001, map to GenAI Lens, then tag with NIST and sweep for coverage. Customer-experience and cost buckets are built from scratch or via GenAI Lens.</desc>
<style>
.th{font-family:Arial,Helvetica,sans-serif;font-size:14px;font-weight:500}
.ts{font-family:Arial,Helvetica,sans-serif;font-size:12px;font-weight:400}
</style>
<rect x="0" y="0" width="680" height="652" fill="#FFFFFF"/>

<text class="th" x="40" y="30" fill="#2C2C2A">Legal / compliance bucket — identifying the standards</text>
<text class="ts" x="40" y="52" fill="#5F5E5A">coral = source of truth   ·   teal = mapping step   ·   grey = supporting</text>

<rect x="40" y="96" width="100" height="28" rx="6" fill="#F5C4B3" stroke="#D85A30" stroke-width="0.5"/>
<text class="th" x="90" y="114" text-anchor="middle" fill="#4A1B0C">anchor</text>
<rect x="160" y="78" width="460" height="64" rx="8" fill="#FAECE7" stroke="#D85A30" stroke-width="0.5"/>
<text class="th" x="178" y="106" fill="#712B13">1 · EU AI Act: list the obligations</text>
<text class="ts" x="178" y="126" fill="#993C1D">Art 9–17, 43, 49, 50, 72  (+ UK GDPR, FCA)</text>
<line x1="390" y1="142" x2="390" y2="162" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="40" y="182" width="100" height="28" rx="6" fill="#D3D1C7" stroke="#888780" stroke-width="0.5"/>
<text class="th" x="90" y="200" text-anchor="middle" fill="#2C2C2A">gate</text>
<rect x="160" y="164" width="460" height="64" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text class="th" x="178" y="192" fill="#444441">2 · Classify each system</text>
<text class="ts" x="178" y="212" fill="#5F5E5A">risk tier  ·  automated decision  ·  sector</text>
<line x1="390" y1="228" x2="390" y2="248" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="40" y="268" width="100" height="28" rx="6" fill="#9FE1CB" stroke="#1D9E75" stroke-width="0.5"/>
<text class="th" x="90" y="286" text-anchor="middle" fill="#04342C">govern</text>
<rect x="160" y="250" width="460" height="64" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
<text class="th" x="178" y="278" fill="#085041">3 · Map to ISO 42001</text>
<text class="ts" x="178" y="298" fill="#0F6E56">govern &amp; evidence each obligation</text>
<line x1="390" y1="314" x2="390" y2="334" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="40" y="354" width="100" height="28" rx="6" fill="#9FE1CB" stroke="#1D9E75" stroke-width="0.5"/>
<text class="th" x="90" y="372" text-anchor="middle" fill="#04342C">build</text>
<rect x="160" y="336" width="460" height="64" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
<text class="th" x="178" y="364" fill="#085041">4 · Map to GenAI Lens</text>
<text class="ts" x="178" y="384" fill="#0F6E56">build each control — your principles</text>
<line x1="390" y1="400" x2="390" y2="420" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="40" y="440" width="100" height="28" rx="6" fill="#D3D1C7" stroke="#888780" stroke-width="0.5"/>
<text class="th" x="90" y="458" text-anchor="middle" fill="#2C2C2A">index</text>
<rect x="160" y="422" width="460" height="64" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text class="th" x="178" y="450" fill="#444441">5 · Tag with NIST, then sweep</text>
<text class="ts" x="178" y="470" fill="#5F5E5A">neutral index  +  coverage check</text>

<rect x="40" y="508" width="600" height="48" rx="8" fill="#FAECE7" stroke="#D85A30" stroke-width="0.5"/>
<text class="th" x="58" y="537" fill="#712B13">Rule: anchor the spine to the source of truth — the law, not NIST.</text>

<rect x="40" y="572" width="600" height="60" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text class="ts" x="58" y="598" fill="#5F5E5A">Customer-experience &amp; cost buckets: no legal source of truth.</text>
<text class="ts" x="58" y="618" fill="#5F5E5A">Build from scratch or via GenAI Lens — NIST &amp; 42001 mostly drop out.</text>

<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
</svg>
