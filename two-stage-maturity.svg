<svg viewBox="0 0 768 576" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#EEF3F4"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#16B0A6"/>
      <stop offset="1" stop-color="#0E8F93"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#0F2A38" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="768" height="576" fill="url(#bg)"/>
  <circle cx="712" cy="64" r="160" fill="#16B0A6" opacity="0.05"/>
  <circle cx="58" cy="544" r="150" fill="#0F2A38" opacity="0.04"/>

  <!-- header -->
  <rect x="56" y="60" width="34" height="4" rx="2" fill="url(#teal)"/>
  <text x="98" y="65" font-size="13" font-weight="700" letter-spacing="3" fill="#0E8F93">AI DELIVERY MATURITY</text>
  <text x="56" y="108" font-size="30" font-weight="800" fill="#0F2A38">Reliable Project by Project</text>
  <text x="56" y="138" font-size="16" fill="#5B6B73">Most teams climb from stage one to stage two — and assume two is the destination.</text>

  <!-- STAGE 1 -->
  <g transform="translate(56,248)">
    <rect width="300" height="220" rx="16" fill="#FFFFFF" filter="url(#shadow)"/>
    <rect x="0" y="0" width="300" height="6" rx="3" fill="#E0564B"/>
    <circle cx="50" cy="60" r="26" fill="#0F2A38"/>
    <text x="50" y="67" font-size="20" font-weight="800" fill="#FFFFFF" text-anchor="middle">01</text>
    <text x="92" y="48" font-size="13" font-weight="700" letter-spacing="2" fill="#9AA7AD">STRUGGLING</text>
    <text x="92" y="72" font-size="19" font-weight="800" fill="#0F2A38">Works in Dev,</text>
    <text x="92" y="94" font-size="19" font-weight="800" fill="#0F2A38">Fails in Production</text>
    <g transform="translate(28,128)">
      <circle cx="6" cy="6" r="6" fill="#E0564B"/>
      <text x="22" y="11" font-size="13.5" font-weight="700" fill="#E0564B">Breaks in production</text>
    </g>
    <text x="28" y="168" font-size="13.5" fill="#5B6B73">Demos impress — then break under</text>
    <text x="28" y="188" font-size="13.5" fill="#5B6B73">real load, data and users. Readiness</text>
    <text x="28" y="208" font-size="13.5" fill="#5B6B73">is an afterthought.</text>
  </g>

  <!-- connector -->
  <g transform="translate(384,358)">
    <circle cx="0" cy="0" r="16" fill="#16B0A6"/>
    <path d="M-5 -7 l8 7 l-8 7" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- STAGE 2 -->
  <g transform="translate(412,248)">
    <rect width="300" height="220" rx="16" fill="#FFFFFF" filter="url(#shadow)"/>
    <rect x="0" y="0" width="300" height="6" rx="3" fill="#E8A04A"/>
    <circle cx="50" cy="60" r="26" fill="#0F2A38"/>
    <text x="50" y="67" font-size="20" font-weight="800" fill="#FFFFFF" text-anchor="middle">02</text>
    <text x="92" y="48" font-size="13" font-weight="700" letter-spacing="2" fill="#9AA7AD">MATURING</text>
    <text x="92" y="72" font-size="19" font-weight="800" fill="#0F2A38">Optimized</text>
    <text x="92" y="94" font-size="19" font-weight="800" fill="#0F2A38">Project by Project</text>
    <g transform="translate(28,128)">
      <circle cx="6" cy="6" r="6" fill="#E8A04A"/>
      <text x="22" y="11" font-size="13.5" font-weight="700" fill="#C7842A">Reliable — one project at a time</text>
    </g>
    <text x="28" y="168" font-size="13.5" fill="#5B6B73">Properly engineered — evals,</text>
    <text x="28" y="188" font-size="13.5" fill="#5B6B73">guardrails, monitoring. But the</text>
    <text x="28" y="208" font-size="13.5" fill="#5B6B73">discipline is reinvented team by team.</text>
  </g>

  <!-- footer hook -->
  <rect x="150" y="502" width="468" height="40" rx="20" fill="#0F2A38"/>
  <text x="384" y="527" font-size="15" font-weight="700" fill="#FFFFFF" text-anchor="middle">Every project is reliable. So where's the enterprise problem?</text>
</svg>
