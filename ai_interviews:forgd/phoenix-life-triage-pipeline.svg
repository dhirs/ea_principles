<svg viewBox="0 0 1200 610" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="Model B triage pipeline — stateless reasoning agent in Bedrock, orchestrated by Step Functions">
  <rect x="0" y="0" width="1200" height="610" fill="#ffffff"/>
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,4 L0,8 Z" fill="#334155"/>
    </marker>
    <marker id="arrowGreen" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,4 L0,8 Z" fill="#059669"/>
    </marker>
    <marker id="arrowRed" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,4 L0,8 Z" fill="#ef4444"/>
    </marker>
  </defs>

  <text x="20" y="30" fill="#0f172a" font-size="15" font-weight="700">Model B — stateless reasoning agent in Bedrock, orchestrated end-to-end by Step Functions</text>

  <!-- Bedrock AgentCore (Zone 2) -->
  <rect x="430" y="52" width="300" height="176" rx="12" fill="#ecfdf5" stroke="#34d399" stroke-width="2"/>
  <text x="446" y="72" fill="#047857" font-size="11" font-weight="700">BEDROCK AGENTCORE</text>
  <text x="446" y="88" fill="#065f46" font-size="9.5">Stateless LangGraph agent · steps 3–4 only</text>
  <rect x="446" y="98" width="268" height="28" rx="6" fill="#ffffff" stroke="#34d399"/>
  <text x="580" y="116" text-anchor="middle" fill="#1e293b" font-size="11">Segment intents + extract fields</text>
  <rect x="446" y="132" width="268" height="28" rx="6" fill="#ffffff" stroke="#34d399"/>
  <text x="580" y="150" text-anchor="middle" fill="#1e293b" font-size="11">Vulnerability &amp; priority (LLM)</text>
  <rect x="446" y="166" width="268" height="28" rx="6" fill="#ffffff" stroke="#34d399"/>
  <text x="580" y="184" text-anchor="middle" fill="#1e293b" font-size="11">Grounding check + retry loop</text>
  <text x="580" y="214" text-anchor="middle" fill="#475569" font-size="9.5" font-style="italic">runs → returns → terminates · no durable state</text>

  <!-- request / response arrows to Invoke Agent task -->
  <line x1="515" y1="358" x2="515" y2="230" stroke="#059669" stroke-width="1.8" marker-end="url(#arrowGreen)"/>
  <line x1="580" y1="228" x2="580" y2="358" stroke="#059669" stroke-width="1.8" marker-end="url(#arrowGreen)"/>
  <text x="508" y="300" text-anchor="end" fill="#059669" font-size="9">redacted case</text>
  <text x="588" y="320" fill="#059669" font-size="9">intents · vuln · grounding</text>

  <!-- Step Functions container -->
  <rect x="8" y="300" width="1000" height="252" rx="14" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="24" y="322" fill="#334155" font-size="11.5" font-weight="700">AWS STEP FUNCTIONS — orchestration · durable state · immutable audit (execution history)</text>

  <!-- state row -->
  <rect x="20" y="360" width="104" height="76" rx="10" fill="#1e293b"/>
  <text x="72" y="392" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="600">Inbound</text>
  <text x="72" y="410" text-anchor="middle" fill="#cbd5e1" font-size="8.5">letters·email·portal</text>

  <rect x="140" y="360" width="150" height="76" rx="10" fill="#eef2ff" stroke="#818cf8"/>
  <text x="215" y="390" text-anchor="middle" fill="#1e293b" font-size="11" font-weight="600">① Ingest &amp; normalise</text>
  <text x="215" y="408" text-anchor="middle" fill="#64748b" font-size="9.5">Textract / Lambda</text>
  <text x="215" y="425" text-anchor="middle" fill="#4338ca" font-size="9">[Task]</text>

  <rect x="306" y="360" width="150" height="76" rx="10" fill="#eef2ff" stroke="#818cf8"/>
  <text x="381" y="390" text-anchor="middle" fill="#1e293b" font-size="11" font-weight="600">② PII detect &amp; redact</text>
  <text x="381" y="408" text-anchor="middle" fill="#64748b" font-size="8.5">Comprehend / Guardrails</text>
  <text x="381" y="425" text-anchor="middle" fill="#4338ca" font-size="9">[Task]</text>

  <rect x="472" y="360" width="150" height="76" rx="10" fill="#ffffff" stroke="#34d399" stroke-width="2" stroke-dasharray="6 3"/>
  <text x="547" y="390" text-anchor="middle" fill="#1e293b" font-size="11" font-weight="600">③–④ Invoke agent</text>
  <text x="547" y="408" text-anchor="middle" fill="#047857" font-size="9">→ Bedrock · Zone 2</text>
  <text x="547" y="425" text-anchor="middle" fill="#047857" font-size="9">[Task]</text>

  <rect x="638" y="360" width="140" height="76" rx="10" fill="#fff7ed" stroke="#fb923c"/>
  <text x="708" y="390" text-anchor="middle" fill="#1e293b" font-size="11" font-weight="600">⑤ Routing</text>
  <text x="708" y="408" text-anchor="middle" fill="#c2410c" font-size="9.5">[Choice state]</text>
  <text x="708" y="425" text-anchor="middle" fill="#64748b" font-size="9">team + priority</text>

  <rect x="794" y="360" width="170" height="76" rx="10" fill="#fff7ed" stroke="#f59e0b" stroke-width="2"/>
  <text x="879" y="389" text-anchor="middle" fill="#1e293b" font-size="11" font-weight="700">⑥ Human gate</text>
  <text x="879" y="407" text-anchor="middle" fill="#c2410c" font-size="9.5">.waitForTaskToken</text>
  <text x="879" y="424" text-anchor="middle" fill="#64748b" font-size="9">SFN holds the pause</text>

  <!-- horizontal flow arrows -->
  <line x1="124" y1="398" x2="140" y2="398" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="290" y1="398" x2="306" y2="398" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="456" y1="398" x2="472" y2="398" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="622" y1="398" x2="638" y2="398" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="778" y1="398" x2="794" y2="398" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- triage officer + task-token loop -->
  <rect x="794" y="470" width="170" height="42" rx="9" fill="#fffbeb" stroke="#f59e0b"/>
  <text x="879" y="496" text-anchor="middle" fill="#1e293b" font-size="10.5">Triage officer queue</text>
  <line x1="855" y1="436" x2="855" y2="470" stroke="#334155" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="903" y1="470" x2="903" y2="436" stroke="#334155" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="879" y="530" text-anchor="middle" fill="#64748b" font-size="9">pause ↓ / resume ↑ (task token)</text>

  <text x="632" y="452" fill="#94a3b8" font-size="9" font-style="italic">flagged → gate · clean items auto-route →</text>

  <!-- downstream teams -->
  <rect x="1030" y="330" width="162" height="44" rx="9" fill="#f1f5f9" stroke="#94a3b8"/>
  <text x="1111" y="352" text-anchor="middle" fill="#1e293b" font-size="11" font-weight="600">Policy Admin</text>
  <text x="1111" y="367" text-anchor="middle" fill="#64748b" font-size="9">servicing</text>
  <rect x="1030" y="384" width="162" height="44" rx="9" fill="#fee2e2" stroke="#ef4444"/>
  <text x="1111" y="406" text-anchor="middle" fill="#1e293b" font-size="11" font-weight="600">Claims Mgmt</text>
  <text x="1111" y="421" text-anchor="middle" fill="#b91c1c" font-size="9">urgent · vulnerable</text>
  <rect x="1030" y="438" width="162" height="44" rx="9" fill="#f1f5f9" stroke="#94a3b8"/>
  <text x="1111" y="460" text-anchor="middle" fill="#1e293b" font-size="11" font-weight="600">Underwriting</text>
  <text x="1111" y="475" text-anchor="middle" fill="#64748b" font-size="9">minor · closed book</text>
  <rect x="1030" y="492" width="162" height="44" rx="9" fill="#f1f5f9" stroke="#94a3b8"/>
  <text x="1111" y="514" text-anchor="middle" fill="#1e293b" font-size="11" font-weight="600">Complaints</text>
  <text x="1111" y="529" text-anchor="middle" fill="#64748b" font-size="9">Consumer Duty</text>

  <!-- dispatch fan-out -->
  <text x="997" y="392" text-anchor="middle" fill="#64748b" font-size="9">dispatch</text>
  <path d="M964,406 L1030,352" fill="none" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M964,406 L1030,406" fill="none" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <path d="M964,406 L1030,460" fill="none" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M964,406 L1030,514" fill="none" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- legend -->
  <rect x="20" y="574" width="14" height="14" rx="3" fill="#eef2ff" stroke="#818cf8"/>
  <text x="40" y="585" fill="#475569" font-size="10">Zone 1 · pre-model (Step Functions)</text>
  <rect x="320" y="574" width="14" height="14" rx="3" fill="#ecfdf5" stroke="#34d399"/>
  <text x="340" y="585" fill="#475569" font-size="10">Zone 2 · reasoning (Bedrock, stateless)</text>
  <rect x="640" y="574" width="14" height="14" rx="3" fill="#fff7ed" stroke="#fb923c"/>
  <text x="660" y="585" fill="#475569" font-size="10">Zone 3 · post-model (Step Functions)</text>
</svg>
