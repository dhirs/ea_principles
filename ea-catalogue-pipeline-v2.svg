<svg viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <rect width="1280" height="720" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="64" y="60" font-size="36" font-weight="800" fill="#1B2A4A" letter-spacing="-0.5">How the EA Team Builds the Catalogue</text>
  <text x="64" y="94" font-size="16" font-weight="400" fill="#6B7280">Principles &#8594; Standards &#8594; RI Blueprint &#8594; Prioritize &#8594; RI Build. The catalogue runs continuously; builds run as quarterly sprints.</text>

  <!-- Phase backgrounds -->
  <rect x="52" y="164" width="726" height="212" rx="16" fill="#F6F4FF"/>
  <rect x="924" y="164" width="304" height="212" rx="16" fill="#FCF1FE"/>

  <!-- Phase labels -->
  <text x="415" y="190" font-size="12" font-weight="700" fill="#7C3AED" letter-spacing="1.4" text-anchor="middle">CATALOGUE &#183; BAU &#183; CONTINUOUS</text>
  <text x="1076" y="190" font-size="12" font-weight="700" fill="#C026D3" letter-spacing="1.4" text-anchor="middle">QUARTERLY SPRINT</text>

  <!-- Card 1 Principles -->
  <rect x="66" y="208" width="216" height="158" rx="12" fill="#FFFFFF" stroke="#E5E0F5" stroke-width="1.5"/>
  <circle cx="94" cy="238" r="15" fill="#7C3AED"/><text x="94" y="243" font-size="15" font-weight="800" fill="#FFFFFF" text-anchor="middle">1</text>
  <text x="82" y="284" font-size="16" font-weight="800" fill="#1B2A4A">Principles</text>
  <text x="82" y="309" font-size="12" fill="#374151">The durable why, at high</text>
  <text x="82" y="327" font-size="12" fill="#374151">abstraction. EA-authored</text>
  <text x="82" y="345" font-size="12" fill="#374151">&#8212; not from AWS.</text>

  <path d="M286 285 l10 8 l-10 8" fill="none" stroke="#7C3AED" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Card 2 Standards -->
  <rect x="310" y="208" width="216" height="158" rx="12" fill="#FFFFFF" stroke="#E5E0F5" stroke-width="1.5"/>
  <circle cx="338" cy="238" r="15" fill="#7C3AED"/><text x="338" y="243" font-size="15" font-weight="800" fill="#FFFFFF" text-anchor="middle">2</text>
  <text x="326" y="284" font-size="16" font-weight="800" fill="#1B2A4A">Standards</text>
  <text x="326" y="309" font-size="12" fill="#374151">The enforceable what.</text>
  <text x="326" y="327" font-size="12" fill="#374151">Each principle yields</text>
  <text x="326" y="345" font-size="12" fill="#374151">one or more standards.</text>

  <path d="M530 285 l10 8 l-10 8" fill="none" stroke="#7C3AED" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Card 3 RI Blueprint -->
  <rect x="554" y="208" width="216" height="158" rx="12" fill="#FFFFFF" stroke="#C9BEF0" stroke-width="2"/>
  <circle cx="582" cy="238" r="15" fill="#7C3AED"/><text x="582" y="243" font-size="15" font-weight="800" fill="#FFFFFF" text-anchor="middle">3</text>
  <text x="570" y="284" font-size="16" font-weight="800" fill="#1B2A4A">RI Blueprint</text>
  <text x="570" y="307" font-size="12" fill="#374151">Sized sketch &#8212; enough to</text>
  <text x="570" y="324" font-size="12" fill="#374151">estimate effort, not built.</text>
  <text x="570" y="341" font-size="12" fill="#374151">Lives in the catalogue.</text>
  <text x="570" y="360" font-size="10" font-style="italic" fill="#7C3AED">BAU &#183; not in the sprint</text>

  <!-- arrow into gate -->
  <path d="M774 285 l10 8 l-10 8" fill="none" stroke="#1B2A4A" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Prioritization gate -->
  <rect x="792" y="208" width="120" height="158" rx="12" fill="#FFFFFF" stroke="#1B2A4A" stroke-width="2"/>
  <text x="852" y="252" font-size="12" font-weight="800" fill="#1B2A4A" text-anchor="middle" letter-spacing="0.3">PRIORITIZE</text>
  <text x="852" y="269" font-size="9.5" font-style="italic" fill="#6B7280" text-anchor="middle">the gate</text>
  <text x="852" y="300" font-size="11" fill="#374151" text-anchor="middle">sets the fixed</text>
  <text x="852" y="316" font-size="11" fill="#374151" text-anchor="middle">quarterly agenda</text>
  <text x="852" y="344" font-size="9.5" font-style="italic" fill="#6B7280" text-anchor="middle">ranks sized</text>
  <text x="852" y="358" font-size="9.5" font-style="italic" fill="#6B7280" text-anchor="middle">blueprints</text>

  <!-- big arrow into sprint -->
  <path d="M914 283 l13 11 l-13 11" fill="none" stroke="#C026D3" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Card 4 RI Build -->
  <rect x="940" y="208" width="272" height="158" rx="12" fill="#FFFFFF" stroke="#F2D9F6" stroke-width="2"/>
  <circle cx="968" cy="238" r="15" fill="#C026D3"/><text x="968" y="243" font-size="15" font-weight="800" fill="#FFFFFF" text-anchor="middle">4</text>
  <text x="956" y="284" font-size="16" font-weight="800" fill="#1B2A4A">RI Build</text>
  <text x="956" y="307" font-size="12" fill="#374151">The full implementation:</text>
  <text x="956" y="324" font-size="12" fill="#374151">artefacts, paths, CI gates.</text>
  <text x="956" y="341" font-size="12" fill="#374151">Audit-ready.</text>
  <text x="956" y="360" font-size="10" font-style="italic" fill="#C026D3">the sprint output</text>

  <!-- ===== Governance band ===== -->
  <rect x="56" y="400" width="1156" height="70" rx="12" fill="#EEF1F6"/>
  <text x="80" y="430" font-size="14" font-weight="800" fill="#1B2A4A">GOVERNANCE</text>
  <text x="80" y="451" font-size="11.5" fill="#6B7280">Runs alongside</text>
  <text x="340" y="430" font-size="13" fill="#374151">Review, approval, change control, RACI. Not architecture &#8212; but it&#8217;s what keeps the catalogue alive.</text>
  <text x="340" y="451" font-size="13" fill="#374151">Different owners, a different cadence from the build team.</text>

  <!-- ===== Operating model band ===== -->
  <rect x="56" y="480" width="1156" height="78" rx="12" fill="#F4F1FE"/>
  <rect x="56" y="480" width="6" height="78" fill="#7C3AED"/>
  <text x="80" y="509" font-size="14" font-weight="800" fill="#7C3AED" letter-spacing="0.3">OPERATING MODEL &#8212; QUARTERLY SPRINTS</text>
  <text x="80" y="532" font-size="13.5" fill="#374151">Each prioritised blueprint becomes one funded mini-project &#8212; its own budget, a named owner, a RACI chart &#8212;</text>
  <text x="80" y="551" font-size="13.5" fill="#374151">built out into a full reference implementation.</text>

  <!-- ===== Bottom callout ===== -->
  <rect x="56" y="572" width="1156" height="54" rx="12" fill="#1B2A4A"/>
  <text x="634" y="605" font-size="14" font-weight="600" fill="#FFFFFF" text-anchor="middle">The catalogue carries principles, standards and sized blueprints. Prioritisation picks the quarter&#8217;s builds &#8212; each ships as a funded, enforceable reference implementation.</text>

  <!-- Footer -->
  <text x="64" y="664" font-size="12" fill="#9CA3AF">www.datawhistl.com</text>
</svg>
