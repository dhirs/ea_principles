<svg viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <rect width="1280" height="720" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="64" y="62" font-size="38" font-weight="800" fill="#1B2A4A" letter-spacing="-0.5">How the EA Team Builds the Catalogue</text>
  <text x="64" y="98" font-size="17" font-weight="400" fill="#6B7280">Principles &#8594; Standards &#8594; Prioritize &#8594; Reference Implementations. Built like sprints, not documents.</text>

  <!-- ===== Phase group backgrounds ===== -->
  <rect x="56" y="160" width="584" height="240" rx="16" fill="#F6F4FF"/>
  <rect x="648" y="160" width="584" height="240" rx="16" fill="#FCF1FE"/>

  <!-- Phase labels -->
  <text x="348" y="186" font-size="12" font-weight="700" fill="#7C3AED" letter-spacing="1.5" text-anchor="middle">PHASE 1 &#183; WRITE THE CATALOGUE</text>
  <text x="940" y="186" font-size="12" font-weight="700" fill="#C026D3" letter-spacing="1.5" text-anchor="middle">PHASE 2 &#183; RUN THE SPRINTS</text>

  <!-- ===== Cards ===== -->
  <!-- Card 1 Principles -->
  <rect x="70" y="206" width="266" height="178" rx="12" fill="#FFFFFF" stroke="#E5E0F5" stroke-width="1.5"/>
  <circle cx="100" cy="240" r="15" fill="#7C3AED"/>
  <text x="100" y="245" font-size="15" font-weight="800" fill="#FFFFFF" text-anchor="middle">1</text>
  <text x="86" y="285" font-size="17" font-weight="800" fill="#1B2A4A">Principles</text>
  <text x="86" y="312" font-size="12.5" fill="#374151">The durable why, at high</text>
  <text x="86" y="331" font-size="12.5" fill="#374151">abstraction. Authored by EA &#8212;</text>
  <text x="86" y="350" font-size="12.5" fill="#374151">not lifted from AWS. Vendor</text>
  <text x="86" y="369" font-size="12.5" fill="#374151">lenses inform; they don&#8217;t define.</text>

  <!-- arrow 1->2 -->
  <path d="M344 285 l10 8 l-10 8" fill="none" stroke="#7C3AED" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Card 2 Standards -->
  <rect x="360" y="206" width="266" height="178" rx="12" fill="#FFFFFF" stroke="#E5E0F5" stroke-width="1.5"/>
  <circle cx="390" cy="240" r="15" fill="#7C3AED"/>
  <text x="390" y="245" font-size="15" font-weight="800" fill="#FFFFFF" text-anchor="middle">2</text>
  <text x="376" y="285" font-size="17" font-weight="800" fill="#1B2A4A">Standards</text>
  <text x="376" y="312" font-size="12.5" fill="#374151">The enforceable what. Each</text>
  <text x="376" y="331" font-size="12.5" fill="#374151">principle spawns one or more</text>
  <text x="376" y="350" font-size="12.5" fill="#374151">standards &#8212; where a belief</text>
  <text x="376" y="369" font-size="12.5" fill="#374151">becomes checkable.</text>

  <!-- big phase arrow 2->3 -->
  <path d="M632 282 l13 11 l-13 11" fill="none" stroke="#C026D3" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Card 3 Prioritization -->
  <rect x="654" y="206" width="266" height="178" rx="12" fill="#FFFFFF" stroke="#F2D9F6" stroke-width="1.5"/>
  <circle cx="684" cy="240" r="15" fill="#C026D3"/>
  <text x="684" y="245" font-size="15" font-weight="800" fill="#FFFFFF" text-anchor="middle">3</text>
  <text x="670" y="285" font-size="17" font-weight="800" fill="#1B2A4A">Prioritization</text>
  <text x="670" y="312" font-size="12.5" fill="#374151">Which standards are in scope,</text>
  <text x="670" y="331" font-size="12.5" fill="#374151">and in what order. Day-one vs</text>
  <text x="670" y="350" font-size="12.5" fill="#374151">wait-for-scale vs never-applies.</text>

  <!-- arrow 3->4 -->
  <path d="M928 285 l10 8 l-10 8" fill="none" stroke="#C026D3" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Card 4 Reference Implementations -->
  <rect x="944" y="206" width="266" height="178" rx="12" fill="#FFFFFF" stroke="#F2D9F6" stroke-width="1.5"/>
  <circle cx="974" cy="240" r="15" fill="#C026D3"/>
  <text x="974" y="245" font-size="15" font-weight="800" fill="#FFFFFF" text-anchor="middle">4</text>
  <text x="960" y="283" font-size="17" font-weight="800" fill="#1B2A4A">Reference</text>
  <text x="960" y="303" font-size="17" font-weight="800" fill="#1B2A4A">Implementations</text>
  <text x="960" y="330" font-size="12.5" fill="#374151">For each in-scope standard:</text>
  <text x="960" y="349" font-size="12.5" fill="#374151">artefacts, paths, CI gates.</text>
  <text x="960" y="368" font-size="12.5" fill="#374151">The audit-ready build.</text>

  <!-- ===== Governance band ===== -->
  <rect x="56" y="418" width="1168" height="74" rx="12" fill="#EEF1F6"/>
  <text x="80" y="450" font-size="14" font-weight="800" fill="#1B2A4A">GOVERNANCE</text>
  <text x="80" y="471" font-size="11.5" fill="#6B7280">Runs alongside</text>
  <text x="360" y="450" font-size="13" fill="#374151">Review, approval, change control, RACI. Not architecture &#8212; but it&#8217;s what keeps the catalogue alive.</text>
  <text x="360" y="471" font-size="13" fill="#374151">Different owners, a different cadence from the build team.</text>

  <!-- ===== Operating model band ===== -->
  <rect x="56" y="502" width="1168" height="84" rx="12" fill="#F4F1FE"/>
  <rect x="56" y="502" width="6" height="84" fill="#7C3AED"/>
  <text x="80" y="533" font-size="14" font-weight="800" fill="#7C3AED" letter-spacing="0.3">OPERATING MODEL &#8212; SPRINTS, NOT DOCUMENTS</text>
  <text x="80" y="557" font-size="13.5" fill="#374151">EA turns in-scope standards into RIs through SCRUM sprints. Each standard runs like a mini-project &#8212;</text>
  <text x="80" y="577" font-size="13.5" fill="#374151">its own budget, a named owner, and a RACI chart.</text>

  <!-- ===== Bottom callout ===== -->
  <rect x="56" y="600" width="1168" height="56" rx="12" fill="#1B2A4A"/>
  <text x="640" y="634" font-size="14.5" font-weight="600" fill="#FFFFFF" text-anchor="middle">Not a PDF of best practices &#8212; principles and standards, delivered as funded mini-projects that ship enforceable reference implementations.</text>

  <!-- Footer -->
  <text x="64" y="694" font-size="12" fill="#9CA3AF">www.datawhistl.com</text>
</svg>
